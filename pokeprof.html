<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokeProf v0.15</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background:#1a1a2e; color:#e0e0e0; font-family:'Courier New',monospace; font-size:13px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #header { background:#16213e; border-bottom:2px solid #e63946; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  #header h1 { font-size:15px; color:#e63946; letter-spacing:2px; text-transform:uppercase; }
  .funds { font-size:14px; color:#f4d03f; font-weight:bold; }
  .income-rate { font-size:10px; color:#9090b0; }
  #save-indicator { font-size:10px; color:#555; text-align:right; }
  #save-indicator.saving { color:#2ecc71; }
  #save-indicator.error { color:#e63946; }

  #offline-banner { display:none; background:#1a3a1a; border-bottom:1px solid #2ecc71; padding:10px 14px; flex-shrink:0; }
  #offline-banner .ob-title { color:#2ecc71; font-weight:bold; font-size:12px; margin-bottom:4px; }
  #offline-banner .ob-body { color:#a0c0a0; font-size:11px; line-height:1.6; }
  #offline-banner button { margin-top:8px; }

  #tab-bar { display:flex; background:#0f3460; border-bottom:1px solid #1a4a80; flex-shrink:0; }
  .tab-btn { flex:1; padding:10px 4px; text-align:center; font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#6080a0; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; }
  .tab-btn.active { color:#e0e0e0; border-bottom-color:#e63946; }
  .tab-icon { display:block; font-size:16px; margin-bottom:2px; }

  #panels { flex:1; overflow:hidden; }
  .panel { display:none; flex-direction:column; height:100%; overflow:hidden; }
  .panel.active { display:flex; }
  .panel-title { background:#0f3460; padding:6px 12px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a0a0c0; flex-shrink:0; }

  #aide-info { padding:10px 12px; border-bottom:1px solid #0f3460; background:#16213e; flex-shrink:0; }
  #aide-info .aide-name { color:#e63946; font-size:14px; margin-bottom:3px; }
  #aide-info .aide-location { color:#a0a0c0; font-size:11px; }

  #party-list { overflow-y:auto; flex:1; padding:8px; background:#16213e; }
  .party-slot { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:10px; margin-bottom:8px; }
  .party-slot.fainted { opacity:0.5; border-color:#e63946; }
  .party-slot .poke-name { font-size:13px; color:#fff; margin-bottom:3px; }
  .party-slot .poke-level { color:#a0c4ff; font-size:11px; margin-bottom:4px; }
  .hp-bar-wrap { background:#0a0a1a; border-radius:3px; height:7px; margin:5px 0 3px; overflow:hidden; }
  .hp-bar { height:100%; border-radius:3px; transition:width 0.3s; }
  .hp-text { font-size:10px; color:#a0a0c0; }
  .exp-bar-wrap { background:#0a0a1a; border-radius:3px; height:3px; margin-top:5px; overflow:hidden; }
  .exp-bar { height:100%; background:#9b59b6; border-radius:3px; }

  #controls { background:#16213e; border-top:1px solid #0f3460; padding:10px 12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }

  button { background:#0f3460; color:#e0e0e0; border:1px solid #1a4a80; border-radius:4px; padding:8px 14px; font-family:'Courier New',monospace; font-size:11px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:background 0.15s; }
  button:active { background:#1a4a80; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  button.danger { border-color:#e63946; color:#e63946; }
  button.danger:active { background:#3a1020; }
  button.primary { border-color:#2ecc71; color:#2ecc71; }
  button.primary:active { background:#0a3020; }
  button.reset { border-color:#555; color:#777; font-size:10px; padding:5px 10px; }

  #encounter-display { background:#0f3460; border-bottom:1px solid #1a4a80; padding:10px 12px; flex-shrink:0; }
  .enc-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a0a0c0; margin-bottom:4px; }
  .enc-body { font-size:12px; color:#e0e0e0; min-height:18px; }

  #log { overflow-y:auto; flex:1; padding:8px; }
  .log-entry { padding:4px 6px; border-bottom:1px solid #0a0f1a; font-size:11px; color:#8090a0; }
  .log-entry.catch { color:#2ecc71; }
  .log-entry.evolve { color:#f4d03f; }
  .log-entry.damage { color:#e74c3c; }
  .log-entry.win { color:#3498db; }
  .log-entry.faint { color:#e63946; }
  .log-entry.fail { color:#e67e22; }
  .log-entry.exp { color:#9b59b6; }
  .log-entry.info { color:#5dade2; }

  #panel-dex { display:none; flex-direction:column; height:100%; overflow:hidden; }
  #panel-dex.active { display:flex; }
  #dex-stats { background:#0f3460; padding:6px 12px; font-size:10px; color:#a0a0c0; display:flex; gap:12px; flex-shrink:0; border-bottom:1px solid #1a4a80; }
  #dex-stats span { color:#e0e0e0; }
  .dex-entry { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:10px; margin-bottom:6px; }
  .dex-entry.unassigned { opacity:0.7; }
  .dex-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .dex-name { font-size:12px; color:#fff; }
  .dex-id { font-size:10px; color:#6080a0; }
  .dex-details { font-size:10px; color:#a0a0c0; }
  .dex-holder { font-size:10px; color:#5dade2; margin-top:2px; }
  .shiny-badge { color:#f4d03f; font-size:10px; margin-left:4px; }
  .aide-party-sprites { display:inline-flex; gap:4px; vertical-align:middle; margin-left:6px; }
  .aide-sprite-mini { width:28px; height:28px; }
  .party-sprite { width:56px; height:56px; image-rendering:pixelated; }

  #panel-map { display:none; flex-direction:column; height:100%; overflow:hidden; }
  #panel-map.active { display:flex; }

  #bag-display { background:#16213e; border-bottom:1px solid #0f3460; padding:6px 12px; font-size:10px; color:#a0a0c0; flex-shrink:0; }
</style>
</head>
<body>

<div id="header">
  <h1>PokeProf <span style="font-size:11px;color:#6080a0;">v0.15</span></h1>
  <div>
    <div class="funds">$<span id="funds-display">5.00</span></div>
    <div class="income-rate">$<span id="income-display">1.00</span>/min</div>
  </div>
  <div>
    <div id="save-indicator">⬤ Auto-save on</div>
    <div style="font-size:10px;color:#555;text-align:right;margin-top:2px;"><span id="dex-count">0</span> caught</div>
  </div>
</div>

<div id="offline-banner">
  <div class="ob-title">📬 Welcome back!</div>
  <div class="ob-body" id="offline-summary"></div>
  <button onclick="document.getElementById('offline-banner').style.display='none'">✔ Got it</button>
</div>

<div id="tab-bar">
  <button class="tab-btn active" id="tab-party" onclick="switchTab('party')"><span class="tab-icon">🧑‍🔬</span>Party</button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')"><span class="tab-icon">⚔</span>Log</button>
  <button class="tab-btn" id="tab-dex" onclick="switchTab('dex')"><span class="tab-icon">📖</span>Dex</button>
  <button class="tab-btn" id="tab-map" onclick="switchTab('map')"><span class="tab-icon">🗺️</span>Map</button>
</div>

<div id="panels">
  <!-- PARTY TAB -->
  <div class="panel active" id="panel-party">
    <div id="aide-info">
      <div class="aide-name">🧑‍🔬 Carl Oak</div>
      <div class="aide-location" id="aide-location">📍 Pallet Town — Idle</div>
      <div id="aide-bag-display" style="font-size:10px;color:#6080a0;margin-top:2px;"></div>
      <div id="bag-display" style="display:none;"></div>
      <div id="aide-bag-items" style="font-size:10px;color:#a0a0c0;margin-top:2px;"></div>
    </div>
    <div id="party-list"></div>
    <div id="controls">
      <button id="btn-start" onclick="startMission()">▶ Start Mission</button>
      <button id="btn-recall" onclick="recallMission()" disabled>⏹ Recall</button>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="color:#a0a0c0;font-size:10px;">Catches: <span id="total-catches">0</span></span>
        <span style="color:#a0a0c0;font-size:10px;">Seen: <span id="total-sightings">0</span></span>
      </div>
      <button class="reset" onclick="resetGame()">↺ Reset</button>
    </div>
  </div>

  <!-- LOG TAB -->
  <div class="panel" id="panel-log">
    <div id="encounter-display">
      <div class="enc-title">⚔ Encounter</div>
      <div class="enc-body" id="enc-body">No active encounter.</div>
    </div>
    <div id="log"></div>
  </div>

  <!-- DEX TAB -->
  <div class="panel" id="panel-dex">
    <div id="dex-stats">
      <span>Catches: <span id="dex-count-detail">0</span></span>
      <span>Families: <span id="dex-family-count">0</span></span>
    </div>
    <div style="background:#16213e;border-bottom:1px solid #0f3460;padding:6px 8px;display:flex;gap:6px;flex-shrink:0;">
      <button id="dex-back-btn" onclick="dexBack()" style="display:none;padding:5px 10px;font-size:10px;">◀ Back</button>
      <span id="dex-breadcrumb" style="color:#a0a0c0;font-size:10px;padding:6px 4px;flex:1;">Pokédex — Families</span>
      <button onclick="dexViewAll()" style="padding:5px 10px;font-size:10px;">All Catches</button>
    </div>
    <div id="dex-viewall-controls" style="display:none;padding:6px 8px;border-bottom:1px solid #0f3460;display:flex;gap:6px;flex-shrink:0;background:#16213e;">
      <select id="sort-select" onchange="renderDex()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:6px;border-radius:4px;flex:1;">
        <option value="id">Sort: Catch #</option>
        <option value="dexid">Sort: Dex #</option>
        <option value="level">Sort: Level</option>
        <option value="hp">Sort: HP</option>
        <option value="total">Sort: BST</option>
      </select>
      <select id="filter-select" onchange="renderDex()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:6px;border-radius:4px;flex:1;">
        <option value="all">All</option>
        <option value="unassigned">Unassigned</option>
        <option value="assigned">Assigned</option>
        <option value="shiny">✨ Shiny</option>
      </select>
    </div>
    <div id="dex-list" style="overflow-y:auto;flex:1;padding:6px;background:#16213e;"></div>
  </div>

  <!-- MAP TAB -->
  <div class="panel" id="panel-map">
    <div style="background:#0f3460;border-bottom:1px solid #1a4a80;padding:6px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a0a0c0;flex-shrink:0;">
      🗺️ Kanto — Discovered Locations
    </div>
    <div id="map-container" style="flex:1;overflow:hidden;position:relative;background:#0a0f1a;">
      <svg id="map-svg" style="width:100%;height:100%;" onclick="handleMapClick(event)"></svg>
    </div>
    <div id="map-detail" style="flex-shrink:0;background:#16213e;border-top:1px solid #0f3460;max-height:45%;overflow-y:auto;display:none;">
      <div id="map-detail-content" style="padding:12px;font-size:11px;"></div>
    </div>
  </div>
</div>

<script>
// ── SPECIES LOOKUP ──
const SPECIES = {};
if(typeof POKEDEX_DATA !== 'undefined'){
  POKEDEX_DATA.forEach(p => {
    const existing = SPECIES[p.name];
    if(!p.formName){
      if(!existing || p.growthRate) SPECIES[p.name] = p;
    } else {
      if(!existing) SPECIES[p.name] = p;
    }
  });
}

// ── POKEDEX ENTRY HELPER (Change #1: handles form-only species like Nidoran) ──
// Prefers the entry with formName===null; falls back to the first entry with that dexId
// This fixes species like Nidoran M/F where ALL entries have a non-null formName
function getPokemonEntry(dexId){
  if(typeof POKEDEX_DATA==='undefined') return null;
  const nullForm = POKEDEX_DATA.find(x=>x.dexId===dexId&&x.formName===null);
  if(nullForm) return nullForm;
  return POKEDEX_DATA.find(x=>x.dexId===dexId) || null;
}

// ── ENCOUNTER TABLE ──
function buildRouteTable(locationId){
  if(typeof ENCOUNTERS==='undefined'||!ENCOUNTERS.length) return [];
  return ENCOUNTERS
    .filter(e=>e.locationId===locationId)
    .filter(e=>{
      if(!e.requiresItem) return true;
      return !!(state.bag&&state.bag[e.requiresItem]&&state.bag[e.requiresItem]>0);
    })
    .map(e=>({dexId:e.dexId,minLv:e.minLevel,maxLv:e.maxLevel,weight:e.encounterRate,method:e.encounterMethod}));
}

const ENC_INTERVAL = 30;

// ── UNIT CONVERSION HELPERS ──
function metersToFeetStr(m){
  if(m===null||m===undefined||isNaN(m)) return null;
  const totalInches = m * 39.3701;
  const feet = Math.floor(totalInches / 12);
  const inches = Math.round(totalInches % 12);
  return feet+"'"+inches+'"';
}
function kgToLbsStr(kg){
  if(kg===null||kg===undefined||isNaN(kg)) return null;
  return (kg*2.20462).toFixed(1)+' lbs';
}

// ── ITEM HELPERS ──
function getItem(itemId){
  if(typeof ITEMS_DATA==='undefined') return null;
  return ITEMS_DATA.find(i=>i.itemId===itemId)||null;
}

function getBallCount(){
  if(!state.bag) return 0;
  let total=0;
  Object.entries(state.bag).forEach(([id,qty])=>{
    const item=getItem(id);
    if(item&&item.itemCategory==='ball') total+=qty;
  });
  return total;
}

// Potion selection: only use if 100% of HP benefit is received, smallest effective first
function getWeakestEffectivePotion(pokemon){
  if(!state.bag||!pokemon) return null;
  const missing=pokemon.maxHP-pokemon.currentHP;
  if(missing<=0) return null;
  const pct=(pokemon.currentHP/pokemon.maxHP)*100;
  if(pct>=(state.potionThreshold||75)) return null;
  const potions=[
    {id:'potion',        heal:20},
    {id:'super-potion',  heal:60},
    {id:'hyper-potion',  heal:120},
    {id:'max-potion',    heal:Infinity},
  ];
  for(const p of potions){
    if((state.bag[p.id]||0)<=0) continue;
    if(p.id==='max-potion'){
      if(missing>120) return p.id;
    } else {
      if(p.heal<=missing) return p.id;
    }
  }
  return null;
}

// ── STATE ──
let state={
  funds:5.00, totalCatches:0, totalSightings:0,
  missionActive:false, missionElapsed:0, nextEncounterIn:ENC_INTERVAL,
  incomeAccumulator:0, potionThreshold:75,
  party:[], dex:[], dexIdCounter:1, currentEncounter:null, log:[],
  missionDestination:'route1', missionBehavior:'research',
  missionOrigin:'palletTown', currentLocation:'palletTown', autoRepeat:false,
  travelPath:[], travelPathIndex:0, travelCyclesRemaining:0,
  bag:{},
  researchLog:{}, pendingFindings:[],
  discoveredLocations:new Set(['palletTown']),
  locationEncounterLog:{},
  lastHealLocation:'palletTown',
  dexHistory:{}  // Change #3: {[dexId]: count} all-time catches per species
};

// ── MAKE POKEMON ──
function makePokemon(sp,lv,gender,holder=null){
  let entry=null;
  if(typeof POKEDEX_DATA!=='undefined'){
    // Change #2: use getPokemonEntry fallback for form-only species
    entry=POKEDEX_DATA.find(p=>p.name===sp&&p.formName===null&&p.growthRate);
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp&&p.growthRate);
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp&&p.formName===null);
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp);
  }
  if(!entry) entry=SPECIES[sp];
  const dexId=entry?entry.dexId||entry.id:0;
  const growthRate=(entry&&entry.growthRate)||'mediumFast';
  const maxHP=calcMaxHP(sp,lv);
  const startExp=expToLevel(lv,growthRate);
  const ability=assignAbility(entry);
  return{id:state.dexIdCounter++,species:sp,pokedexId:dexId,level:lv,gender,
    currentHP:maxHP,maxHP,growthRate,
    exp:isNaN(startExp)?0:startExp,
    holder,
    ability:ability||null,
    friendship:0
  };
}

// ── SPRITES ──
const SPRITE_BASE='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
function getSpriteUrl(dexId,name,isShiny=false){
  if(typeof POKEDEX_DATA!=='undefined'){
    // Change #2: use getPokemonEntry to handle form-only species
    const entry=getPokemonEntry(dexId);
    if(entry&&entry.spriteUrl) return entry.spriteUrl;
  }
  if(!dexId||dexId===0) return '';
  return (isShiny?SPRITE_BASE+'/shiny':SPRITE_BASE)+'/'+dexId+'.png';
}

// ── PARTY SORT ──
// Lowest level leads; ties preserved by inertia (stable sort). Fainted go to back.
function sortParty(){
  state.party.sort((a,b)=>{
    const aFainted=a.currentHP<=0?1:0;
    const bFainted=b.currentHP<=0?1:0;
    if(aFainted!==bFainted) return aFainted-bFainted;
    return a.level-b.level;
  });
}

// ── TRAVEL ──
function buildTravelPath(fromId,toId){
  if(typeof CONNECTIONS_DATA!=='undefined'){
    const visited=new Set([fromId]);
    const queue=[[fromId,[]]];
    while(queue.length){
      const [cur,path]=queue.shift();
      const available=(CONNECTIONS_DATA||[]).filter(c=>{
        if(c.fromLocationId!==cur) return false;
        if(!c.requiresItem) return true;
        return (state.bag&&state.bag[c.requiresItem]&&state.bag[c.requiresItem]>0)||
               (state.trainerUnlocks&&state.trainerUnlocks[c.requiresItem]);
      });
      for(const conn of available){
        const n=conn.toLocationId;
        if(visited.has(n)) continue;
        visited.add(n);
        const newPath=[...path,n];
        if(n===toId) return newPath;
        queue.push([n,newPath]);
      }
    }
    return [];
  }
  if(typeof CONNECTIONS!=='undefined'&&typeof getConnectedLocations==='function'){
    const visited=new Set([fromId]);
    const queue=[[fromId,[]]];
    while(queue.length){
      const [cur,path]=queue.shift();
      const neighbors=getConnectedLocations(cur)||[];
      for(const n of neighbors){
        if(visited.has(n)) continue;
        visited.add(n);
        const newPath=[...path,n];
        if(n===toId) return newPath;
        queue.push([n,newPath]);
      }
    }
  }
  return [toId];
}

// BFS to find all discovered reachable locations (respecting requiresItem)
function getReachableDiscoveredLocations(fromId){
  const reachable=[];
  if(typeof CONNECTIONS_DATA==='undefined') return reachable;
  const visited=new Set([fromId]);
  const queue=[fromId];
  while(queue.length){
    const cur=queue.shift();
    const available=(CONNECTIONS_DATA||[]).filter(c=>{
      if(c.fromLocationId!==cur) return false;
      if(!c.requiresItem) return true;
      return (state.bag&&state.bag[c.requiresItem]&&state.bag[c.requiresItem]>0)||
             (state.trainerUnlocks&&state.trainerUnlocks[c.requiresItem]);
    });
    for(const conn of available){
      const n=conn.toLocationId;
      if(visited.has(n)) continue;
      visited.add(n);
      if(state.discoveredLocations.has(n)) reachable.push(n);
      queue.push(n);
    }
  }
  return reachable;
}

function arriveAtLocation(locId){
  state.currentLocation=locId;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const locName=locData?locData.name:locId;
  addLog('📍 Carl Oak arrived at '+locName+'!','info');

  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    state.lastHealLocation=locId;
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party healed at '+locName+'!','info');
    }
  }

  const cycles=locData&&locData.travelTime?parseInt(locData.travelTime):1;
  state.travelCyclesRemaining=Math.max(1,cycles);

  // Discover ALL adjacent locations regardless of requiresItem
  if(typeof CONNECTIONS_DATA!=='undefined'){
    (CONNECTIONS_DATA||[]).forEach(conn=>{
      if(conn.fromLocationId===locId){
        if(!state.discoveredLocations.has(conn.toLocationId)){
          state.discoveredLocations.add(conn.toLocationId);
          const newLoc=typeof LOCATIONS!=='undefined'?getLocation(conn.toLocationId):null;
          addLog('🗺️ New area discovered: '+(newLoc?newLoc.name:conn.toLocationId)+'!','info');
        }
      }
    });
  }

  if(document.getElementById('panel-map').classList.contains('active')) renderMap();
}

function advanceTravelPath(){
  if(!state.travelPath||state.travelPath.length===0) return;
  if(state.travelPathIndex>=state.travelPath.length) return;
  state.travelCyclesRemaining--;
  if(state.travelCyclesRemaining<=0){
    state.travelPathIndex++;
    if(state.travelPathIndex<state.travelPath.length){
      arriveAtLocation(state.travelPath[state.travelPathIndex]);
    } else {
      state.currentLocation=state.missionDestination;
      const locData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
      addLog('🏁 Carl Oak reached '+(locData?locData.name:state.missionDestination)+'!','info');
    }
  }
}

// ── ABILITY ASSIGNMENT ──
function assignAbility(entry){
  if(!entry) return null;
  const roll=Math.random();
  if(roll<0.45&&entry.ability1) return entry.ability1;
  if(roll<0.90&&entry.ability2) return entry.ability2;
  if(entry.hiddenAbility) return entry.hiddenAbility;
  if(entry.ability1) return entry.ability1;
  return null;
}

// ── EXP / LEVEL ──
function expToLevel(lv,r){
  if(lv<=1) return 0;
  if(r==='mediumFast') return Math.floor(Math.pow(lv,3));
  if(r==='mediumSlow') return Math.max(0,Math.floor((6/5)*Math.pow(lv,3)-(15*Math.pow(lv,2))+(100*lv)-140));
  if(r==='fast') return Math.floor((4*Math.pow(lv,3))/5);
  if(r==='slow') return Math.floor((5*Math.pow(lv,3))/4);
  if(r==='erratic') return lv<50?Math.floor((Math.pow(lv,3)*(100-lv))/50):lv<68?Math.floor((Math.pow(lv,3)*(150-lv))/100):lv<98?Math.floor((Math.pow(lv,3)*Math.floor((1911-10*lv)/3))/500):Math.floor((Math.pow(lv,3)*(160-lv))/100);
  if(r==='fluctuating') return lv<15?Math.floor((Math.pow(lv,3)*(Math.floor((lv+1)/3)+24))/50):lv<36?Math.floor((Math.pow(lv,3)*(lv+14))/50):Math.floor((Math.pow(lv,3)*(Math.floor(lv/2)+32))/50);
  return Math.floor(Math.pow(lv,3));
}

function calcMaxHP(sp,lv){
  const s=SPECIES[sp]; if(!s) return lv+10;
  return Math.floor((s.baseHP*2*lv)/100)+lv+10;
}

function calcBST(sp,lv){
  const s=SPECIES[sp]; if(!s) return 0;
  const st=(b)=>Math.floor(((b||0)*2*lv)/100)+5;
  return calcMaxHP(sp,lv)+st(s.baseAtk)+st(s.baseDef)+st(s.baseSpatk)+st(s.baseSpdef)+st(s.baseSpd);
}

// ── RESEARCH ──
function getResearch(dexId){
  if(!state.researchLog[dexId]) state.researchLog[dexId]={
    evolutionConfirmed:false, nonEvolutionConfirmed:false,
    confirmedMethod:null, confirmedIntoId:null,
    testedMethods:[], highestLevelObserved:0,
    knownSince:Date.now()
  };
  return state.researchLog[dexId];
}
function recordSighting(dexId,level){
  const r=getResearch(dexId);
  if(level>r.highestLevelObserved) r.highestLevelObserved=level;
}
function recordEvolution(fromDexId,toDexId,method,level){
  const r=getResearch(fromDexId);
  if(!r.evolutionConfirmed){
    r.evolutionConfirmed=true; r.confirmedMethod=method; r.confirmedIntoId=toDexId;
    if(method==='level') r.testedMethods.push('level');
    // Change #2: use getPokemonEntry for form-only species
    const fromEntry=getPokemonEntry(fromDexId);
    const toEntry=getPokemonEntry(toDexId);
    addFinding('evolution',fromEntry?fromEntry.name:'#'+fromDexId,toEntry?toEntry.name:'#'+toDexId,method,level);
  }
}
function recordNewSpecies(dexId,name){
  const r=getResearch(dexId);
  if(!r.firstSeen){ r.firstSeen=true; addFinding('species',name); }
}
function addFinding(type,...args){ state.pendingFindings.push({type,args,time:Date.now()}); }
function isSpeciesKnown(dexId){ return !!state.researchLog[dexId]; }

function getEvolutionDisplayText(dexId){
  const r=state.researchLog[dexId];
  if(!r) return 'Evolves into: ???';
  if(r.nonEvolutionConfirmed) return 'Does not evolve';
  if(r.evolutionConfirmed){
    // Change #2: use getPokemonEntry for form-only species
    const toEntry=getPokemonEntry(r.confirmedIntoId);
    const toName=toEntry?toEntry.name:'#'+r.confirmedIntoId;
    return 'Evolves into: #'+r.confirmedIntoId+' '+toName+' ('+r.confirmedMethod+(r.confirmedMethod==='level'?' Lv'+r.highestLevelObserved:'')+')';
  }
  return 'Evolves into: ??? (unconfirmed)';
}

// ── EVOLUTION ──
function checkEvolution(p){
  // Path 1: SPECIES lookup (simple linear evolutions from pokedex.js — active for all Gen 1)
  const s=SPECIES[p.species];
  if(s&&s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
    // Change #2: use getPokemonEntry for form-only targets
    const newEntry=getPokemonEntry(s.evolvesIntoId);
    if(newEntry){
      const old=p.species; const prevDexId=p.pokedexId;
      p.species=newEntry.name; p.pokedexId=newEntry.dexId;
      const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      if(!SPECIES[p.species]) SPECIES[p.species]=newEntry;
      recordEvolution(prevDexId,newEntry.dexId,'level',p.level);
      recordNewSpecies(newEntry.dexId,p.species);
      // Change #4: increment dexHistory for evolved-into species
      state.dexHistory[newEntry.dexId]=(state.dexHistory[newEntry.dexId]||0)+1;
      addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
      document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
      return;
    }
  }
  // Path 2: EVO_TREE lookup (branching evolutions — no-op for Gen 1, kept for future)
  if(typeof EVO_TREE!=='undefined'){
    const branches=getEvolutions(p.pokedexId).filter(b=>b.toDexId&&b.evolveMethod==='level'&&p.level>=b.evolveLevel);
    if(branches.length>0){
      const branch=branches[Math.floor(Math.random()*branches.length)];
      // Change #2: use getPokemonEntry for form-only targets
      const newEntry=getPokemonEntry(branch.toDexId);
      if(newEntry){
        const old=p.species; const prevDexId=p.pokedexId;
        p.species=newEntry.name; p.pokedexId=newEntry.dexId;
        const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
        p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
        if(!SPECIES[p.species]) SPECIES[p.species]=newEntry;
        recordEvolution(prevDexId,newEntry.dexId,'level',p.level);
        recordNewSpecies(newEntry.dexId,p.species);
        // Change #4: increment dexHistory for evolved-into species
        state.dexHistory[newEntry.dexId]=(state.dexHistory[newEntry.dexId]||0)+1;
        addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
        document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
      }
    }
  }
}

function giveExp(pokemon,amount){
  pokemon.exp+=amount;
  addLog(pokemon.species+' #'+pokemon.id+' +'+amount+' EXP','exp');
  let levelled=false;
  while(true){
    const s=SPECIES[pokemon.species];
    const gr=pokemon.growthRate||(s?s.growthRate:null)||'mediumFast';
    const need=expToLevel(pokemon.level+1,gr);
    if(pokemon.exp>=need&&pokemon.level<100){
      pokemon.level++; levelled=true;
      const om=pokemon.maxHP; pokemon.maxHP=calcMaxHP(pokemon.species,pokemon.level);
      pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+(pokemon.maxHP-om));
      addLog(pokemon.species+' #'+pokemon.id+' -> Lv'+pokemon.level+'!','evolve');
      checkEvolution(pokemon); saveGame();
    } else break;
  }
  if(levelled) renderDex();
}

function giveExpSilent(p,amount){
  p.exp+=amount;
  while(true){
    const s=SPECIES[p.species];
    const gr=p.growthRate||(s?s.growthRate:null)||'mediumFast';
    if(p.exp>=expToLevel(p.level+1,gr)&&p.level<100){
      p.level++;
      const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      const evolveS=SPECIES[p.species];
      if(evolveS&&evolveS.evolveMethod==='level'&&evolveS.evolvesIntoId&&p.level>=evolveS.evolveLevel){
        // Change #2: use getPokemonEntry for form-only targets
        const ne=getPokemonEntry(evolveS.evolvesIntoId);
        if(ne){
          const prevDexId=p.pokedexId;
          p.species=ne.name; p.pokedexId=ne.dexId;
          if(!SPECIES[p.species]) SPECIES[p.species]=ne;
          const om2=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om2));
          // Change #4: track evolution in dexHistory during offline
          state.dexHistory[ne.dexId]=(state.dexHistory[ne.dexId]||0)+1;
          recordEvolution(prevDexId,ne.dexId,'level',p.level);
          recordNewSpecies(ne.dexId,p.species);
        }
      }
    } else break;
  }
}

// ── OFFLINE PROCESSING ──
function processOfflineTime(secsAway){
  if(secsAway<10||!state.missionActive) return null;
  const summary={encounters:0,catches:0,wins:0,income:0,evolutions:[]};
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  const income=Math.round((perMin/60)*secsAway*100)/100;
  state.funds=Math.round((state.funds+income)*100)/100;
  summary.income=income;
  let remaining=secsAway, nextIn=state.nextEncounterIn;
  while(remaining>=nextIn){
    remaining-=nextIn; nextIn=ENC_INTERVAL; summary.encounters++;
    const enc=rollEncounter(); const lead=getLeadPokemon(); if(!lead) break;
    if(enc){
      const hasBalls=getBallCount()>0;
      if(hasBalls){
        const s_=SPECIES[enc.species];
        const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
        giveExpSilent(lead,exp);
        const caught=makePokemon(enc.species,enc.level,enc.gender);
        state.dex.push(caught); state.totalCatches++; state.totalSightings++;
        summary.catches++;
        // Change #3: track in dexHistory
        state.dexHistory[caught.pokedexId]=(state.dexHistory[caught.pokedexId]||0)+1;
        if(!isSpeciesKnown(caught.pokedexId)||!state.researchLog[caught.pokedexId].firstSeen)
          recordNewSpecies(caught.pokedexId,enc.species);
        recordSighting(enc.pokedexId||caught.pokedexId,enc.level);
      } else {
        const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
        lead.currentHP=Math.max(0,lead.currentHP-dmg);
        if(lead.currentHP>0){
          const s_=SPECIES[enc.species];
          const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
          giveExpSilent(lead,exp); summary.wins++;
        }
      }
    }
    advanceTravelPath();
  }
  state.nextEncounterIn=Math.max(1,nextIn-remaining);
  return summary;
}

function showOfflineBanner(secsAway,summary){
  const mins=Math.floor(secsAway/60), secs=secsAway%60;
  document.getElementById('offline-summary').innerHTML=
    'Away for '+mins+'m '+secs+'s · '+summary.encounters+' encounters · '+
    summary.catches+' catches · +$'+summary.income.toFixed(2);
  document.getElementById('offline-banner').style.display='block';
}

// ── ENCOUNTER ──
function rollEncounter(){
  const table=buildRouteTable(state.currentLocation);
  if(!table.length) return null;
  const hasGrass=table.some(e=>e.method==='grass'||!e.method);
  if(!hasGrass) return null;
  const grassTable=table.filter(e=>e.method==='grass'||!e.method);
  const totalW=grassTable.reduce((s,e)=>s+(e.weight||10),0);
  let r=Math.random()*totalW;
  for(const e of grassTable){
    r-=(e.weight||10);
    if(r<=0){
      const lv=Math.floor(Math.random()*(e.maxLv-e.minLv+1))+e.minLv;
      // Change #2: use getPokemonEntry for form-only species like Nidoran
      const entry=getPokemonEntry(e.dexId);
      const name=entry?entry.name:'#'+e.dexId;
      const genderMalePct=entry?entry.genderMalePct:50;
      let gender='M';
      if(genderMalePct===null||genderMalePct===undefined) gender='—';
      else if(genderMalePct===0) gender='F';
      else if(genderMalePct===100) gender='M';
      else gender=Math.random()*100<genderMalePct?'M':'F';
      return {species:name,level:lv,gender,pokedexId:e.dexId,baseSpd:entry?entry.baseSpd||50:50};
    }
  }
  return null;
}

function getLeadPokemon(){
  sortParty();
  return state.party.find(p=>p.currentHP>0)||null;
}

function checkLocationHeal(){
  if(!state.missionActive) return;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation):null;
  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party fully healed at '+locData.name+'!','info');
    }
  }
}

// ── COMBAT ──
function resolveEncounterStep(){
  const enc=state.currentEncounter; if(!enc) return;
  const lead=getLeadPokemon(); if(!lead){ endMission(); return; }
  const isShiny=Math.random()<(1/4096);
  if(isShiny){ catchPokemon(lead,enc,true); return; }
  const hasBalls=getBallCount()>0;
  const encSpd=enc.baseSpd||50;
  const leadSpd=(SPECIES[lead.species]?SPECIES[lead.species].baseSpd||50:50);
  const leadFaster=leadSpd>=encSpd;

  // Try potion before acting
  const potionId=getWeakestEffectivePotion(lead);
  if(potionId){
    const item=getItem(potionId);
    if(item){
      state.bag[potionId]--;
      if(item.effect==='heal-hp'){
        lead.currentHP=Math.min(lead.maxHP,lead.currentHP+(item.effectValue||0));
      } else if(item.effect==='heal-hp-full'){
        lead.currentHP=lead.maxHP;
      }
      addLog('Used '+item.name+' on '+lead.species+' ('+lead.currentHP+'/'+lead.maxHP+' HP)','info');
    }
  }

  if(hasBalls){
    if(leadFaster){
      // Faster: throw first
      throwBall(lead,enc);
    } else {
      // Slower: take hit first
      fight(lead,enc);
      if(lead.currentHP>0) throwBall(lead,enc);
    }
  } else {
    fight(lead,enc);
  }
}

function throwBall(lead,enc){
  const balls=Object.entries(state.bag||{}).filter(([id,qty])=>{
    const item=getItem(id); return item&&item.itemCategory==='ball'&&qty>0;
  });
  if(!balls.length){ fight(lead,enc); return; }
  const [ballId]=balls[0];
  const ball=getItem(ballId);
  state.bag[ballId]--;
  const catchRate=enc.catchRate||(getPokemonEntry(enc.pokedexId)?getPokemonEntry(enc.pokedexId).catchRate||45:45);
  const modifier=ball?ball.catchRateModifier||1:1;
  const chance=Math.min(0.95,(catchRate*modifier)/(255*3));
  if(Math.random()<chance){
    catchPokemon(lead,enc,false);
  } else {
    const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
    lead.currentHP=Math.max(0,lead.currentHP-dmg);
    addLog('Ball missed! '+enc.species+' Lv'+enc.level+' deals '+dmg+' HP. ('+lead.species+': '+lead.currentHP+'/'+lead.maxHP+' HP)','fail');
    document.getElementById('enc-body').textContent='Ball missed! '+lead.species+' at '+lead.currentHP+'/'+lead.maxHP+' HP';
    if(lead.currentHP<=0){ addLog(lead.species+' #'+lead.id+' fainted!','faint'); const next=getLeadPokemon(); if(!next) endMission(); }
  }
}

function catchPokemon(lead,enc,isShiny){
  const caught=makePokemon(enc.species,enc.level,enc.gender);
  caught.isShiny=isShiny;
  state.dex.push(caught); state.totalCatches++; state.totalSightings++;
  // Change #3: record in dexHistory on catch
  state.dexHistory[caught.pokedexId]=(state.dexHistory[caught.pokedexId]||0)+1;
  if(isShiny) addLog('✨ SHINY '+caught.species+' caught automatically! ✨','evolve');
  const s_=SPECIES[enc.species];
  const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
  giveExp(lead,exp);
  recordSighting(enc.pokedexId||caught.pokedexId,enc.level);
  if(!isSpeciesKnown(caught.pokedexId)||!state.researchLog[caught.pokedexId].firstSeen)
    recordNewSpecies(caught.pokedexId,enc.species);
  addLog('Caught '+enc.species+' #'+caught.id+' (Lv'+enc.level+' '+enc.gender+(isShiny?' ✨':'')+')! +'+exp+' EXP','catch');
  document.getElementById('total-catches').textContent=state.totalCatches;
  document.getElementById('total-sightings').textContent=state.totalSightings;
  if(!state.locationEncounterLog[state.currentLocation]) state.locationEncounterLog[state.currentLocation]={};
  const lid=caught.pokedexId;
  state.locationEncounterLog[state.currentLocation][lid]=(state.locationEncounterLog[state.currentLocation][lid]||0)+1;
  state.currentEncounter=null;
  advanceTravelPath();
  document.getElementById('enc-body').textContent='Caught '+enc.species+' Lv'+enc.level+(isShiny?' ✨ SHINY!':'!');
  saveGame();
}

function fight(lead,enc){
  const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
  lead.currentHP=Math.max(0,lead.currentHP-dmg);
  addLog(lead.species+' vs '+enc.species+' Lv'+enc.level+': took '+dmg+' dmg. ('+lead.currentHP+'/'+lead.maxHP+' HP)','damage');
  if(lead.currentHP<=0){
    addLog(lead.species+' #'+lead.id+' fainted!','faint');
    const next=getLeadPokemon(); if(!next){ endMission(); return; }
    addLog(enc.species+' fled.','info'); state.currentEncounter=null;
    advanceTravelPath();
    document.getElementById('enc-body').textContent=lead.species+' fainted. '+enc.species+' fled.';
  } else {
    const s_=SPECIES[enc.species];
    const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
    giveExp(lead,exp);
    addLog('Won vs '+enc.species+' Lv'+enc.level+'! +'+exp+' EXP','win');
    state.currentEncounter=null;
    advanceTravelPath();
    document.getElementById('enc-body').textContent='Won vs '+enc.species+' Lv'+enc.level+'.';
  }
}

// ── INCOME ──
function incomeTick(){
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  state.incomeAccumulator+=perMin/60;
  if(state.incomeAccumulator>=0.01){
    const c=Math.floor(state.incomeAccumulator*100);
    state.funds=Math.max(0,Math.round((state.funds+c/100)*100)/100);
    state.incomeAccumulator-=c/100;
  }
  if(state.funds<0||isNaN(state.funds)) state.funds=0;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  document.getElementById('income-display').textContent=perMin.toFixed(2);
}

// ── GAME TICK ──
function gameTick(){
  incomeTick();
  if(state.missionActive){
    state._friendshipTick=(state._friendshipTick||0)+1;
    if(state._friendshipTick>=180){
      state._friendshipTick=0;
      state.party.forEach(p=>{ if(p.currentHP>0) p.friendship=(p.friendship||0)+1; });
    }
  }
  if(!state.missionActive){ renderParty(); return; }
  state.missionElapsed++; state.nextEncounterIn--;
  if(state.currentEncounter){ resolveEncounterStep(); render(); return; }
  if(state.nextEncounterIn<=0){
    checkLocationHeal();
    state.currentEncounter=rollEncounter(); state.nextEncounterIn=ENC_INTERVAL;
    if(!state.currentEncounter){
      advanceTravelPath();
      state.nextEncounterIn=ENC_INTERVAL; updateLocation(); return;
    }
    const enc=state.currentEncounter;
    if(!state.locationEncounterLog[state.currentLocation]) state.locationEncounterLog[state.currentLocation]={};
    addLog('Wild '+enc.species+' appeared! Lv'+enc.level+' '+enc.gender,'info');
    document.getElementById('enc-body').textContent='Wild '+enc.species+' Lv'+enc.level+' ('+enc.gender+') appeared!';
    state.totalSightings++;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    render();
  } else { updateLocation(); renderParty(); }
}

// ── MISSION ──
function startMission(){
  if(state.missionActive) return;
  if(!state.party.find(p=>p.currentHP>0)){ addLog('No conscious Pokémon!','fail'); return; }
  showMissionModal();
}

  modal.innerHTML='<div style="background:#16213e;border:1px solid #5dade2;border-radius:8px;padding:16px;width:100%;max-width:340px;font-family:\'Courier New\',monospace;max-height:90vh;overflow-y:auto;"><div style="color:#5dade2;font-size:13px;font-weight:bold;margin-bottom:12px;">🗺 Choose Destination</div><div style="font-size:10px;color:#6080a0;margin-bottom:8px;">From: '+currentLoc+'</div><div style="max-height:220px;overflow-y:auto;">'+destOptions+'</div><div id="mission-summary" style="color:#a0a0c0;font-size:11px;margin:10px 0;min-height:18px;"></div>'+shopHtml+'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><input type="checkbox" id="auto-repeat-toggle" '+(state.autoRepeat?'checked':'')+' onchange="state.autoRepeat=this.checked" style="width:16px;height:16px;cursor:pointer;"><label for="auto-repeat-toggle" style="color:#a0a0c0;font-size:11px;cursor:pointer;">Auto-repeat on wipe</label></div><div style="display:flex;gap:8px;"><button onclick="document.getElementById(\'mission-modal\').remove()" style="flex:1;">✕ Cancel</button><button id="confirm-mission" onclick="confirmMission()" class="primary" style="flex:1;" disabled>▶ Dispatch</button></div></div>';
  document.body.appendChild(modal);
  state._missionDest=null;
}

function selectMissionDest(locId){
  state._missionDest=locId;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const name=locData?locData.name:locId;
  document.getElementById('mission-summary').textContent='Carl Oak → '+name+' (research on arrival)';
  document.getElementById('confirm-mission').disabled=false;
}

function confirmMission(){
  if(!state._missionDest) return;
  const modal=document.getElementById('mission-modal');
  if(modal) modal.remove();
  state.missionActive=true;
  state.missionBehavior='research';
  state.missionDestination=state._missionDest||'route1';
  state.missionOrigin=state.currentLocation||'palletTown';
  state.travelPath=buildTravelPath(state.missionOrigin,state.missionDestination);
  if(state.travelPath.length===0){
    addLog('⚠ Cannot reach that destination — missing required item.','fail');
    state.missionActive=false;
    document.getElementById('btn-start').disabled=false;
    document.getElementById('btn-recall').disabled=true;
    return;
  }
  sortParty();
  state.travelPathIndex=0;
  arriveAtLocation(state.travelPath[0]);
  state.nextEncounterIn=ENC_INTERVAL;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-recall').disabled=false;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
  addLog('Carl Oak dispatched to '+(locData?locData.name:state.missionDestination)+' (research on arrival).','info');
  state.pendingFindings=[];
  render();
}

function recallMission(){
  if(!state.missionActive) return;
  endMission('recall');
}

function endMission(reason='faint'){
  state.missionActive=false;
  state.currentEncounter=null;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-recall').disabled=true;
  const returnLocId=state.lastHealLocation||state.missionOrigin||'palletTown';
  state.currentLocation=returnLocId;
  const originLoc=typeof LOCATIONS!=='undefined'?getLocation(returnLocId):null;
  const originName=originLoc?originLoc.name:returnLocId;
  const msg=reason==='recall'?'Carl Oak recalled to '+originName+'.':'All fainted — Carl Oak returned to '+originName+'.';
  document.getElementById('enc-body').textContent=msg;
  addLog(msg,reason==='recall'?'info':'faint');
  if(originLoc&&(originLoc.heals==='TRUE'||originLoc.heals===true||originLoc.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party fully healed at '+originLoc.name+'!','info');
    }
  }
  showFindingsReport();
  updateLocation(); saveGame();
  if(reason==='faint'&&state.autoRepeat){
    setTimeout(()=>{
      if(!state.missionActive&&state.party.find(p=>p.currentHP>0)){
        addLog('🔄 Auto-repeating mission...','info');
        state.missionActive=true;
        sortParty();
        state.travelPath=buildTravelPath(state.currentLocation,state.missionDestination);
        state.travelPathIndex=0;
        if(state.travelPath.length>0){ arriveAtLocation(state.travelPath[0]); }
        else { state.currentLocation=state.missionDestination; }
        state.nextEncounterIn=ENC_INTERVAL;
        state.pendingFindings=[];
        document.getElementById('btn-start').disabled=true;
        document.getElementById('btn-recall').disabled=false;
        updateLocation(); render();
      }
    },2000);
  }
}

function updateLocation(){
  const el=document.getElementById('aide-location');
  if(state.missionActive){
    const m=Math.floor(state.nextEncounterIn/60), s=state.nextEncounterIn%60;
    const curLocData=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation):null;
    const curLocName=curLocData?curLocData.name:(state.currentLocation||'Route 1');
    const destLocData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
    const destLocName=destLocData?destLocData.name:state.missionDestination;
    const atDest=state.currentLocation===state.missionDestination;
    if(atDest){
      el.textContent='📍 '+curLocName+' — Researching · Next: '+m+':'+s.toString().padStart(2,'0');
    } else {
      el.textContent='📍 '+curLocName+' (→ '+destLocName+', '+(state.travelCyclesRemaining||0)+' enc left) · Next: '+m+':'+s.toString().padStart(2,'0');
    }
  } else {
    const idleLoc=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation||'palletTown'):null;
    el.textContent='📍 '+(idleLoc?idleLoc.name:'Pallet Town')+' — Idle';
  }
}

// ── POKEMON MANAGEMENT ──
function assignToAide(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  if(state.missionActive){ addLog('Cannot change party during a mission!','fail'); return; }
  if(state.party.length>=6){ addLog('Party is full (6 max)!','fail'); return; }
  p.holder='Carl Oak';
  state.party.push(p);
  addLog(p.species+' #'+p.id+' assigned to Carl Oak.','info');
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
}

function unassignPokemon(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  if(state.missionActive){ addLog('Cannot change party during a mission!','fail'); return; }
  p.holder=null;
  state.party=state.party.filter(x=>x.id!==catchId);
  addLog(p.species+' #'+p.id+' unassigned.','info');
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
}

function revivePokemon(catchId){
  if(state.funds<20){ addLog('Not enough funds to revive!','fail'); return; }
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  state.funds=Math.round((state.funds-20)*100)/100;
  p.currentHP=p.maxHP;
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
  addLog('💊 '+p.species+' #'+p.id+' revived!','info');
}

 onclick="document.getElementById(\'poke-modal\').remove()" style="flex:1;">Close</button></div></div>';

// ── BAG DISPLAY ──
function renderBagDisplay(){
  const el=document.getElementById('aide-bag-items'); if(!el) return;
  if(!state.bag||!Object.keys(state.bag).length){ el.textContent=''; return; }
  const parts=[];
  Object.entries(state.bag).forEach(([id,qty])=>{
    if(qty>0){ const item=getItem(id); parts.push((item?item.name:id)+' x'+qty); }
  });
  el.textContent=parts.length?'Bag: '+parts.join(', '):'';
}

function buyItem(itemId){
  const item=getItem(itemId);
  if(!item||!item.shopPrice) return;
  const price=parseFloat(item.shopPrice);
  if(state.funds<price){ addLog('Not enough funds for '+item.name+'!','fail'); return; }
  if(!state.bag) state.bag={};
  state.funds=Math.round((state.funds-price)*100)/100;
  state.bag[itemId]=(state.bag[itemId]||0)+1;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  const el=document.getElementById('bag-'+itemId);
  if(el) el.textContent=state.bag[itemId];
  addLog('Bought '+item.name+' ($'+price+')','info');
}

// ── RENDER ──
function render(){
  renderParty();
  renderDex();
  updateLocation();
}

function renderParty(){
  const c=document.getElementById('party-list'); c.innerHTML='';
  let spritesHtml='<div class="aide-party-sprites">';
  state.party.forEach(p=>{
    const hpPct=Math.max(0,(p.currentHP/p.maxHP)*100);
    const hpColor=hpPct>50?'#2ecc71':hpPct>20?'#f4d03f':'#e74c3c';
    const s=SPECIES[p.species];
    const gr=p.growthRate||(s?s.growthRate:null)||'mediumFast';
    const nextExp=expToLevel(p.level+1,gr);
    const curExp=expToLevel(p.level,gr);
    const ePct=nextExp>curExp?Math.min(100,Math.floor(((p.exp-curExp)/(nextExp-curExp))*100)):100;
    const fainted=p.currentHP<=0;
    const d=document.createElement('div');
    d.className='party-slot'+(fainted?' fainted':'');
    const spriteUrl=getSpriteUrl(p.pokedexId,p.species,p.isShiny||false);
    spritesHtml+='<img src="'+spriteUrl+'" class="aide-sprite-mini" style="opacity:'+(fainted?'0.3':'1')+';image-rendering:pixelated;" onerror="this.style.display=\'none\'">';
    d.innerHTML='<div style="display:flex;align-items:flex-start;gap:8px;"><img src="'+spriteUrl+'" class="party-sprite" onerror="this.style.display=\'none\'"><div style="flex:1;"><div class="poke-name">'+(fainted?'💀':'🐾')+' '+p.species+' #'+p.id+(p.isShiny?'<span class="shiny-badge">✨</span>':'')+'</div><div class="poke-level">Lv '+p.level+' · '+p.gender+(p.ability?' · '+p.ability:'')+'</div><div style="color:#6080a0;font-size:10px;">❤ '+(p.friendship||0)+' friendship</div><div class="hp-bar-wrap"><div class="hp-bar" style="width:'+hpPct+'%;background:'+hpColor+';"></div></div><div class="hp-text">HP: '+p.currentHP+'/'+p.maxHP+'</div><div class="exp-bar-wrap"><div class="exp-bar" style="width:'+ePct+'%;"></div></div></div></div>';
    d.onclick=()=>showPokemonDetail(p.id);
    c.appendChild(d);
  });
  spritesHtml+='</div>';
  const nameEl=document.querySelector('#aide-info .aide-name');
  if(nameEl) nameEl.innerHTML='🧑‍🔬 Carl Oak'+spritesHtml;
  const bagEl=document.getElementById('aide-bag-display');
  if(bagEl) bagEl.textContent='🏐 '+getBallCount()+' balls in bag';
  renderBagDisplay();
}

// ── DEX STATE ──
let dexView='families';
let dexSelectedFamily=null;
let dexSelectedDexId=null;

function renderDex(){
  document.getElementById('dex-count').textContent=state.dex.length;
  document.getElementById('dex-count-detail').textContent=state.totalCatches;
  // Change #5: count families using dexHistory too
  const seenFams=new Set();
  if(typeof POKEDEX_DATA!=='undefined'){
    // from live dex
    state.dex.forEach(p=>{ if(p.pokedexId){ const e=getPokemonEntry(p.pokedexId); if(e) seenFams.add(e.familyId); } });
    // from dexHistory (covers evolved-away species)
    Object.keys(state.dexHistory).forEach(dexId=>{ const e=getPokemonEntry(parseInt(dexId)); if(e) seenFams.add(e.familyId); });
  }
  document.getElementById('dex-family-count').textContent=seenFams.size;
  if(dexView==='families') renderDexFamilies();
  else if(dexView==='species') renderDexSpecies();
  else if(dexView==='detail') renderDexDetail();
  else if(dexView==='viewall') renderDexViewAll();
  updateDexChrome();
}

function dexBack(){
  if(dexView==='viewall'||dexView==='species') dexView='families';
  else if(dexView==='detail') dexView='species';
  else dexView='families';
  renderDex();
}

function dexViewAll(){ dexView='viewall'; renderDex(); }

function updateDexChrome(){
  const backBtn=document.getElementById('dex-back-btn');
  const vaCtrl=document.getElementById('dex-viewall-controls');
  const crumb=document.getElementById('dex-breadcrumb');
  backBtn.style.display=(dexView!=='families')?'inline-block':'none';
  vaCtrl.style.display=(dexView==='viewall')?'flex':'none';
  if(dexView==='families') crumb.textContent='Pokédex — Families';
  else if(dexView==='species'&&dexSelectedFamily!==null){
    // Change #2: use getPokemonEntry for form-only species in breadcrumb
    const fEntry=typeof POKEDEX_DATA!=='undefined'?POKEDEX_DATA.find(x=>x.familyId===dexSelectedFamily&&x.formName===null)||POKEDEX_DATA.find(x=>x.familyId===dexSelectedFamily):null;
    crumb.textContent='Family #'+dexSelectedFamily+(fEntry?' — '+fEntry.name+' line':'');
  } else if(dexView==='detail'&&dexSelectedDexId!==null){
    const dn=getPokemonEntry(dexSelectedDexId);
    crumb.textContent=(dn?dn.name:'#'+dexSelectedDexId)+' — Species Detail';
  } else if(dexView==='viewall') crumb.textContent='Pokédex — All Catches';
  else crumb.textContent='Pokédex';
}

// LAYER 1: Family cards
// Change #5: use dexHistory to count all-time species per family
function renderDexFamilies(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  if(typeof POKEDEX_DATA==='undefined'){ c.innerHTML='<div style="color:#e63946;padding:12px;font-size:11px;">Database not loaded. Check pokedex.js is in GitHub.</div>'; return; }

  // Build set of seen dexIds from both live dex AND dexHistory
  const seenDexIds=new Set();
  state.dex.forEach(p=>{ if(p.pokedexId) seenDexIds.add(p.pokedexId); });
  Object.keys(state.dexHistory).forEach(id=>{ seenDexIds.add(parseInt(id)); });

  const seenFamilies=new Set();
  seenDexIds.forEach(dexId=>{ const e=getPokemonEntry(dexId); if(e&&e.familyId) seenFamilies.add(e.familyId); });

  if(!seenFamilies.size){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No Pokémon discovered yet.</div>'; return; }
  [...seenFamilies].sort((a,b)=>a-b).forEach(famId=>{
    const allMembers=typeof getFamilyMembers!=='undefined'?getFamilyMembers(famId):[];
    if(!allMembers.length) return;
    const baseMember=allMembers[0];

    // Count: all live dex entries in this family + dexHistory entries not in live dex
    const liveInFamily=state.dex.filter(p=>p.pokedexId&&POKEDEX_DATA.find(x=>x.dexId===p.pokedexId&&x.familyId===famId));
    const speciesSeen=new Set(liveInFamily.map(p=>p.pokedexId));
    // Add from dexHistory
    Object.keys(state.dexHistory).forEach(id=>{
      const dexId=parseInt(id);
      if(POKEDEX_DATA.find(x=>x.dexId===dexId&&x.familyId===famId)) speciesSeen.add(dexId);
    });

    const knownMembers=allMembers.filter(m=>speciesSeen.has(m.dexId));
    const chainParts=knownMembers.map(m=>'#'+m.dexId+' '+m.name);
    const lastKnown=knownMembers[knownMembers.length-1];
    const lastR=lastKnown?state.researchLog[lastKnown.dexId]:null;
    if(!lastR||(!lastR.evolutionConfirmed&&!lastR.nonEvolutionConfirmed)) chainParts.push('???');
    const allFamKnown=allMembers.every(m=>speciesSeen.has(m.dexId))&&allMembers.length>0&&(lastR&&(lastR.evolutionConfirmed||lastR.nonEvolutionConfirmed));
    const speciesDisplay=allFamKnown?speciesSeen.size+'/'+allMembers.length:speciesSeen.size+'/?';

    // Total ever caught in family = sum of dexHistory counts for this family
    let totalEverCaught=0;
    speciesSeen.forEach(dexId=>{ totalEverCaught+=(state.dexHistory[dexId]||0); });
    // Add any live dex members not tracked in history (pre-v0.15 saves)
    liveInFamily.forEach(p=>{ if(!state.dexHistory[p.pokedexId]) totalEverCaught++; });

    const baseSprite=getSpriteUrl(baseMember.dexId,baseMember.name,false);
    const d=document.createElement('div');
    d.className='dex-entry'; d.style.cursor='pointer';
    d.innerHTML='<div style="display:flex;align-items:center;gap:10px;"><img src="'+baseSprite+'" style="width:48px;height:48px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display=\'none\'"><div style="flex:1;"><div class="dex-header"><span class="dex-name">Family #'+famId+' — '+baseMember.name+' Line</span><span class="dex-id">▶</span></div><div class="dex-details">'+speciesDisplay+' species · '+totalEverCaught+' total caught</div><div style="color:#5dade2;font-size:10px;margin-top:3px;">'+chainParts.join(' → ')+'</div></div></div>';
    d.onclick=()=>{ dexSelectedFamily=famId; dexView='species'; renderDex(); };
    c.appendChild(d);
  });
}

// LAYER 2: Species within a family
// Change #5: show species from dexHistory even if no live specimen exists
function renderDexSpecies(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  const allMembers=typeof getFamilyMembers!=='undefined'?getFamilyMembers(dexSelectedFamily):[];

  // Build seen dexIds from live dex + dexHistory
  const seenDexIds=new Set(state.dex.map(p=>p.pokedexId));
  Object.keys(state.dexHistory).forEach(id=>{ seenDexIds.add(parseInt(id)); });

  const visibleMembers=allMembers.filter(m=>seenDexIds.has(m.dexId));
  if(!visibleMembers.length){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No species encountered yet.</div>'; return; }
  visibleMembers.forEach(entry=>{
    const liveCount=state.dex.filter(p=>p.pokedexId===entry.dexId).length;
    const historyCount=state.dexHistory[entry.dexId]||0;
    // Total ever = max of history count vs live count (history may be 0 for pre-v0.15)
    const totalEver=Math.max(historyCount,liveCount);
    const sprite=getSpriteUrl(entry.dexId,entry.name,false);
    const d=document.createElement('div');
    d.className='dex-entry'; d.style.cursor='pointer';
    d.innerHTML='<div style="display:flex;align-items:center;gap:10px;"><img src="'+sprite+'" style="width:40px;height:40px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display=\'none\'"><div style="flex:1;"><div class="dex-header"><span class="dex-name">#'+entry.dexId+' '+entry.name+'</span><span class="dex-id">'+totalEver+' total ('+liveCount+' held) ▶</span></div><div class="dex-details">'+(entry.type1||'???')+(entry.type2?' / '+entry.type2:'')+' · BST '+(entry.bst||'?')+'</div><div style="color:#6080a0;font-size:10px;margin-top:2px;">'+getEvolutionDisplayText(entry.dexId)+'</div></div></div>';
    d.onclick=()=>{ dexSelectedDexId=entry.dexId; dexView='detail'; renderDex(); };
    c.appendChild(d);
  });
  const lastEntry=visibleMembers[visibleMembers.length-1];
  const lastR=state.researchLog[lastEntry.dexId];
  if(!lastR||(!lastR.evolutionConfirmed&&!lastR.nonEvolutionConfirmed)){
    const ph=document.createElement('div');
    ph.className='dex-entry'; ph.style.opacity='0.45';
    ph.innerHTML='<div style="display:flex;align-items:center;gap:10px;"><div style="width:40px;height:40px;background:#0f1a2a;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#333;font-size:20px;">?</div><div><div class="dex-name" style="color:#555;">??? — Unknown</div><div class="dex-details">Further research needed</div></div></div>';
    c.appendChild(ph);
  }
}

// LAYER 3: Species detail page
function renderDexDetail(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  // Change #2: use getPokemonEntry for form-only species
  const entry=getPokemonEntry(dexSelectedDexId);
  const caughtOfSpecies=state.dex.filter(p=>p.pokedexId===dexSelectedDexId);
  if(!entry&&!caughtOfSpecies.length){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No data found.</div>'; return; }
  const sprite=getSpriteUrl(dexSelectedDexId,entry?entry.name:'',false);
  const typeColors={'Normal':'#a8a878','Fire':'#f08030','Water':'#6890f0','Grass':'#78c850','Electric':'#f8d030','Ice':'#98d8d8','Fighting':'#c03028','Poison':'#a040a0','Ground':'#e0c068','Flying':'#a890f0','Psychic':'#f85888','Bug':'#a8b820','Rock':'#b8a038','Ghost':'#705898','Dragon':'#7038f8','Dark':'#705848','Steel':'#b8b8d0','Fairy':'#ee99ac'};
  const typeBadge=(t)=>t?'<span style="background:'+(typeColors[t]||'#444')+';color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;">'+t+'</span>':'';
  const heightDisplay=entry&&entry.heightM?metersToFeetStr(entry.heightM):null;
  const weightDisplay=entry&&entry.weightKg?kgToLbsStr(entry.weightKg):null;

  // Ability rarity

// View All: flat list with sort/filter
function renderDexViewAll(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  const sortEl=document.getElementById('sort-select');
  const filterEl=document.getElementById('filter-select');
  const sort=sortEl?sortEl.value:'id';
  const filter=filterEl?filterEl.value:'all';
  let entries=[...state.dex];
  if(filter==='unassigned') entries=entries.filter(p=>!p.holder);
  else if(filter==='assigned') entries=entries.filter(p=>!!p.holder);
  else if(filter==='shiny') entries=entries.filter(p=>!!p.isShiny);
  if(sort==='id') entries.sort((a,b)=>a.id-b.id);
  else if(sort==='dexid') entries.sort((a,b)=>(a.pokedexId||0)-(b.pokedexId||0));
  else if(sort==='level') entries.sort((a,b)=>b.level-a.level);
  else if(sort==='hp') entries.sort((a,b)=>b.maxHP-a.maxHP);
  else if(sort==='total') entries.sort((a,b)=>calcBST(b.species,b.level)-calcBST(a.species,a.level));
  if(!entries.length){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No entries.</div>'; return; }
  entries.forEach(p=>{
    const d=document.createElement('div');
    d.className='dex-entry'+(p.holder?'':' unassigned'); d.style.cursor='pointer';
    const sprite=getSpriteUrl(p.pokedexId,p.species,p.isShiny||false);
    d.innerHTML='<div style="display:flex;align-items:center;gap:8px;"><img src="'+sprite+'" style="width:36px;height:36px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display=\'none\'"><div style="flex:1;"><div class="dex-header"><span class="dex-name">#'+(p.pokedexId||'?')+' '+p.species+(p.isShiny?'<span class="shiny-badge">✨</span>':'')+' (catch #'+p.id+')</span><span class="dex-id">'+(p.holder?'👤':'📦')+'</span></div><div class="dex-details">Lv'+p.level+' · '+p.gender+' · HP '+p.currentHP+'/'+p.maxHP+' · BST '+calcBST(p.species,p.level)+'</div><div class="dex-holder">'+(p.holder?'Held by: '+p.holder:'Unassigned')+'</div></div></div>';
    d.onclick=()=>showPokemonDetail(p.id);
    c.appendChild(d);
  });
}

function showFindingsReport(){

  const existing=document.getElementById('findings-modal');
  if(existing) existing.remove();
  const modal=document.createElement('div');
  modal.id='findings-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  const lines=state.pendingFindings.map(f=>{
    if(f.type==='species') return '🆕 New Species: <span style="color:#2ecc71">'+f.args[0]+'</span>';
    if(f.type==='evolution') return '🔄 Evolution: <span style="color:#f4d03f">'+f.args[0]+' → '+f.args[1]+'</span>';
    return '📋 '+f.args.join(' ');
  }).join('<br>');

function addLog(msg,type=''){
  state.log.unshift({msg,type});
  if(state.log.length>200) state.log.pop();
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-entry '+type;
  d.textContent=msg;
  el.insertBefore(d,el.firstChild);
  if(el.children.length>200) el.removeChild(el.lastChild);
}

const SAVE_KEY='pokeprof_save';
const SAVE_VERSION=11; // v0.15: added dexHistory, bumped from 10
let saveTimer=0;

function saveGame(){
  if(window._resetting) return;
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      version:SAVE_VERSION, savedAt:Date.now(), missionWasActive:state.missionActive,
      state:{
        funds:state.funds, totalCatches:state.totalCatches, totalSightings:state.totalSightings,
        missionActive:state.missionActive, missionElapsed:state.missionElapsed,
        nextEncounterIn:state.nextEncounterIn, incomeAccumulator:state.incomeAccumulator,
        potionThreshold:state.potionThreshold, dexIdCounter:state.dexIdCounter,
        currentEncounter:null, party:state.party, dex:state.dex,
        log:state.log.slice(0,50), researchLog:state.researchLog,
        missionDestination:state.missionDestination, missionBehavior:state.missionBehavior,
        missionOrigin:state.missionOrigin, currentLocation:state.currentLocation,
        autoRepeat:state.autoRepeat||false, bag:state.bag||{},
        travelPath:state.travelPath||[], travelPathIndex:state.travelPathIndex||0,
        travelCyclesRemaining:state.travelCyclesRemaining||0,
        discoveredLocations:[...state.discoveredLocations],
        locationEncounterLog:state.locationEncounterLog||{},
        lastHealLocation:state.lastHealLocation||'palletTown',
        dexHistory:state.dexHistory||{}  // Change #3
      }
    }));
    setSaveIndicator('✔ Saved','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),2000);
  } catch(e){ setSaveIndicator('✘ Failed','error'); }
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
    const data=JSON.parse(raw); if(!data||data.version!==SAVE_VERSION) return false;
    const s=data.state;
    Object.assign(state,{
      funds:s.funds??5, totalCatches:s.totalCatches??0, totalSightings:s.totalSightings??0,
      missionActive:s.missionActive??false, missionElapsed:s.missionElapsed??0,
      nextEncounterIn:s.nextEncounterIn??ENC_INTERVAL, incomeAccumulator:s.incomeAccumulator??0,
      potionThreshold:s.potionThreshold??75, dexIdCounter:s.dexIdCounter??1,
      currentEncounter:null, party:s.party??[], dex:s.dex??[], log:s.log??[],
      researchLog:s.researchLog??{}, pendingFindings:[],
      missionDestination:s.missionDestination??'route1', missionBehavior:s.missionBehavior??'research',
      missionOrigin:s.missionOrigin??'palletTown', currentLocation:s.currentLocation??'palletTown',
      autoRepeat:s.autoRepeat??false, bag:s.bag??{},
      travelPath:s.travelPath??[], travelPathIndex:s.travelPathIndex??0,
      travelCyclesRemaining:s.travelCyclesRemaining??0,
      discoveredLocations:new Set(s.discoveredLocations??['palletTown','route1']),
      locationEncounterLog:s.locationEncounterLog??{},
      lastHealLocation:s.lastHealLocation??'palletTown',
      dexHistory:s.dexHistory??{}  // Change #7: backfill from save; empty obj for old saves
    });
    // Backfill missing fields on loaded pokemon
    state.dex.forEach(p=>{
      if(p.ability===undefined) p.ability=null;
      if(p.friendship===undefined) p.friendship=0;
    });
    // Change #7: backfill dexHistory from live dex for pre-v0.15 saves
    if(!s.dexHistory){
      state.dex.forEach(p=>{
        if(p.pokedexId) state.dexHistory[p.pokedexId]=(state.dexHistory[p.pokedexId]||0)+1;
      });
    }
    // Re-link party entries to their canonical dex objects by id
    state.party = state.party.map(pp => state.dex.find(d => d.id === pp.id) || pp);
    const secsAway=Math.floor((Date.now()-data.savedAt)/1000);
    let offSum=null;
    if(secsAway>10&&data.missionWasActive) offSum=processOfflineTime(secsAway);
    const logEl=document.getElementById('log'); logEl.innerHTML='';
    [...state.log].reverse().forEach(e=>{
      const d=document.createElement('div');
      d.className='log-entry '+(e.type||'');
      d.textContent=e.msg;
      logEl.appendChild(d);
    });
    document.getElementById('funds-display').textContent=state.funds.toFixed(2);
    document.getElementById('total-catches').textContent=state.totalCatches;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    document.getElementById('btn-recall').disabled=!state.missionActive;
    document.getElementById('btn-start').disabled=state.missionActive;
    const t=new Date(data.savedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSaveIndicator('⬤ Loaded ('+t+')','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),3000);
    if(offSum) showOfflineBanner(secsAway,offSum);
    return true;
  } catch(e){ setSaveIndicator('✘ Load error','error'); return false; }
}

function resetGame(){
  if(!confirm('Wipe ALL progress? This cannot be undone.')) return;
  clearInterval(window._gameTickInterval);
  clearInterval(window._autoSaveInterval);
  window._resetting=true;
  localStorage.clear();
  location.reload();
}

  const el=document.getElementById('save-indicator');

}

  recordNewSpecies(s.pokedexId,'Rattata');

}

function renderMap(){
  const svg=document.getElementById('map-svg');
  if(!svg) return;
  svg.innerHTML='';

  const discovered=[...state.discoveredLocations];
  if(!discovered.length){ svg.innerHTML='<text x="50%" y="50%" text-anchor="middle" fill="#555" font-size="12">No locations discovered yet.</text>'; return; }

  const visibleKeys=discovered.filter(id=>MAP_NODES[id]);
  if(!visibleKeys.length){ svg.innerHTML='<text x="50%" y="50%" text-anchor="middle" fill="#555" font-size="12" font-family="monospace">Map data for these locations coming soon.</text>'; return; }

  const cols=visibleKeys.map(k=>MAP_NODES[k].col);
  const rows=visibleKeys.map(k=>MAP_NODES[k].row);
  const minCol=Math.min(...cols), maxCol=Math.max(...cols);
  const minRow=Math.min(...rows), maxRow=Math.max(...rows);

  const CELL=72, PAD=48;
  const gridW=(maxCol-minCol)*CELL+PAD*2;
  const gridH=(maxRow-minRow)*CELL+PAD*2;
  svg.setAttribute('viewBox','0 0 '+gridW+' '+gridH);

  function nodeX(k){ return (MAP_NODES[k].col-minCol)*CELL+PAD; }
  function nodeY(k){ return (MAP_NODES[k].row-minRow)*CELL+PAD; }

  if(typeof CONNECTIONS_DATA!=='undefined'){
    const drawn=new Set();
    (CONNECTIONS_DATA||[]).forEach(conn=>{
      const key=([conn.fromLocationId,conn.toLocationId].sort().join('|'));
      if(drawn.has(key)) return;
      if(!state.discoveredLocations.has(conn.fromLocationId)||!state.discoveredLocations.has(conn.toLocationId)) return;
      if(!MAP_NODES[conn.fromLocationId]||!MAP_NODES[conn.toLocationId]) return;
      drawn.add(key);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',nodeX(conn.fromLocationId));
      line.setAttribute('y1',nodeY(conn.fromLocationId));
      line.setAttribute('x2',nodeX(conn.toLocationId));
      line.setAttribute('y2',nodeY(conn.toLocationId));
      line.setAttribute('stroke',conn.requiresItem?'#9b59b6':'#1a4a80');
      line.setAttribute('stroke-width','2');
      if(conn.requiresItem) line.setAttribute('stroke-dasharray','4,4');
      svg.appendChild(line);
    });
  }

  visibleKeys.forEach(locId=>{
    const node=MAP_NODES[locId];
    const c=MAP_COLORS[node.type]||MAP_COLORS.route;
    const x=nodeX(locId), y=nodeY(locId);
    const isCurrent=state.currentLocation===locId;
    const isSelected=mapSelectedLoc===locId;

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';

    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x); circle.setAttribute('cy',y); circle.setAttribute('r','14');
    circle.setAttribute('fill',isCurrent?'#1a3a5a':c.fill);
    circle.setAttribute('stroke',isSelected?'#f4d03f':c.stroke);
    circle.setAttribute('stroke-width',isSelected?'3':'2');
    g.appendChild(circle);

    if(isCurrent){
      const carl=document.createElementNS('http://www.w3.org/2000/svg','text');
      carl.setAttribute('x',x); carl.setAttribute('y',y+5);
      carl.setAttribute('text-anchor','middle'); carl.setAttribute('font-size','12');
      carl.textContent='🧑';
      g.appendChild(carl);
    }

    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',x); text.setAttribute('y',y+26);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('font-size','9');
    text.setAttribute('font-family','Courier New, monospace');
    text.setAttribute('fill',isCurrent?'#f4d03f':c.label);
    text.textContent=node.label;
    g.appendChild(text);

    g.onclick=(e)=>{ e.stopPropagation(); mapSelectedLoc=locId; renderMap(); showMapDetail(locId); };
    svg.appendChild(g);
  });
}

function handleMapClick(e){
  if(e.target===document.getElementById('map-svg')){
    mapSelectedLoc=null;
    document.getElementById('map-detail').style.display='none';
    renderMap();
  }
}

function showMapDetail(locId){
  const detail=document.getElementById('map-detail');
  const content=document.getElementById('map-detail-content');
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const name=locData?locData.name:locId;
  const heals=locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true');
  const shop=locData?locData.shopTier:null;
  const isCurrent=state.currentLocation===locId;

  // Encounter data for this location
  const encLog=state.locationEncounterLog[locId]||{};
  let encHtml='';
  if(Object.keys(encLog).length){
    const table=buildRouteTable(locId);
    const totalSeen=Object.values(encLog).reduce((a,b)=>a+b,0);
    const rows=Object.entries(encLog).map(([dexId,cnt])=>{
      // Change #2: use getPokemonEntry for form-only species
      const entry=getPokemonEntry(parseInt(dexId));
      const name=entry?entry.name:'#'+dexId;
      const pct=totalSeen>0?Math.round((cnt/totalSeen)*100):0;
      const sprite=getSpriteUrl(parseInt(dexId),name,false);
      const tableEntry=table.find(e=>e.dexId===parseInt(dexId));
      const lvRange=tableEntry?'Lv '+tableEntry.minLv+'-'+tableEntry.maxLv:'';
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #0f3460;"><img src="'+sprite+'" style="width:28px;height:28px;image-rendering:pixelated;" onerror="this.style.display=\'none\'"><div style="flex:1;"><div style="font-size:11px;color:#e0e0e0;">'+name+'</div><div style="font-size:10px;color:#5dade2;">'+lvRange+' · '+tableEntry?(tableEntry.method||'grass'):'grass'+'</div></div><div style="text-align:right;"><div style="font-size:12px;color:#f4d03f;">'+pct+'%</div><div style="font-size:10px;color:#a0a0c0;">('+cnt+' seen)</div></div></div>';
    });
    encHtml='<div style="margin-top:10px;"><div style="color:#a0a0c0;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Encounters</div>'+rows.join('')+'</div>';
  }

  content.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="color:#e0e0e0;font-size:13px;font-weight:bold;">'+name+'</div><button onclick="document.getElementById(\'map-detail\').style.display=\'none\'" style="padding:3px 8px;font-size:10px;">✕</button></div><div style="font-size:11px;color:#a0a0c0;line-height:1.8;">'+(isCurrent?'<span style="color:#f4d03f;">📍 Carl is here</span><br>':'')+(heals?'<span style="color:#2ecc71;">🏥 Heals party</span><br>':'')+(shop?'<span style="color:#f4d03f;">🛒 Shop: '+shop+'</span>':'')+'</div>'+encHtml;

  detail.style.display='block';
}

// ── LOCATION HELPERS ──
function getLocation(locId){
  if(typeof LOCATIONS==='undefined') return null;
  return LOCATIONS.find?LOCATIONS.find(l=>l.locationId===locId):LOCATIONS[locId]||null;
}

function getShopItems(locId){
  if(typeof ITEMS_DATA==='undefined') return [];
  const loc=getLocation(locId);
  if(!loc||!loc.shopTier) return [];
  return ITEMS_DATA.filter(i=>i.shopTier&&i.shopTier<=loc.shopTier&&i.shopPrice);
}

// Boot intervals — set AFTER loadGame/init completes, never inside confirmMission
window._autoSaveInterval=setInterval(autoSaveTick,1000);
window._gameTickInterval=setInterval(gameTick,1000);

let _hiddenAt=null;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    _hiddenAt=Date.now();
    saveGame();
  } else {
    if(_hiddenAt&&state.missionActive){
      const secsAway=Math.floor((Date.now()-_hiddenAt)/1000);
      if(secsAway>5){
        const summary=processOfflineTime(secsAway);
        if(summary&&(summary.encounters>0||summary.income>0)) showOfflineBanner(secsAway,summary);
        render(); saveGame();
      }
    }
    _hiddenAt=null;
  }
});
</script>
