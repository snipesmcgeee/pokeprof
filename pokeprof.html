<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokeProf</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background:#1a1a2e; color:#e0e0e0; font-family:'Courier New',monospace; font-size:13px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #header { background:#16213e; border-bottom:2px solid #e63946; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  #header h1 { font-size:15px; color:#e63946; letter-spacing:2px; text-transform:uppercase; }
  .funds { font-size:14px; color:#f4d03f; font-weight:bold; }
  .income-rate { font-size:10px; color:#9090b0; }
  #save-indicator { font-size:10px; color:#555; text-align:right; }
  #save-indicator.saving { color:#2ecc71; }
  #save-indicator.error { color:#e63946; }

  #offline-banner { display:none; background:#1a3a1a; border-bottom:1px solid #2ecc71; padding:10px 14px; flex-shrink:0; }
  #offline-banner .ob-title { color:#2ecc71; font-weight:bold; font-size:12px; margin-bottom:4px; }
  #offline-banner .ob-body { color:#a0c0a0; font-size:11px; line-height:1.6; }
  #offline-banner button { margin-top:8px; }

  #tab-bar { display:flex; background:#0f3460; border-bottom:1px solid #1a4a80; flex-shrink:0; }
  .tab-btn { flex:1; padding:10px 4px; text-align:center; font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#6080a0; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; }
  .tab-btn.active { color:#e0e0e0; border-bottom-color:#e63946; }
  .tab-icon { display:block; font-size:16px; margin-bottom:2px; }

  #panels { flex:1; overflow:hidden; }
  .panel { display:none; flex-direction:column; height:100%; overflow:hidden; }
  .panel.active { display:flex; }

  .panel-title { background:#0f3460; padding:6px 12px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a0a0c0; flex-shrink:0; }

  #aide-info { padding:10px 12px; border-bottom:1px solid #0f3460; background:#16213e; flex-shrink:0; }
  #aide-info .aide-name { color:#e63946; font-size:14px; margin-bottom:3px; }
  #aide-info .aide-location { color:#a0a0c0; font-size:11px; }

  #party-list { overflow-y:auto; flex:1; padding:8px; background:#16213e; }
  .party-slot { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:10px; margin-bottom:8px; }
  .party-slot.fainted { opacity:0.5; border-color:#e63946; }
  .party-slot .poke-name { font-size:13px; color:#fff; margin-bottom:3px; }
  .party-slot .poke-level { color:#a0c4ff; font-size:11px; margin-bottom:4px; }
  .hp-bar-wrap { background:#0a0a1a; border-radius:3px; height:7px; margin:5px 0 3px; overflow:hidden; }
  .hp-bar { height:100%; border-radius:3px; transition:width 0.3s; }
  .hp-text { font-size:10px; color:#a0a0c0; }
  .exp-bar-wrap { background:#0a0a1a; border-radius:3px; height:3px; margin-top:5px; overflow:hidden; }
  .exp-bar { height:100%; background:#9b59b6; border-radius:3px; }

  #controls { background:#16213e; border-top:1px solid #0f3460; padding:10px 12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }

  button { background:#0f3460; color:#e0e0e0; border:1px solid #1a4a80; border-radius:4px; padding:8px 14px; font-family:'Courier New',monospace; font-size:11px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:background 0.15s; }
  button:active { background:#1a4a80; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  button.danger { border-color:#e63946; color:#e63946; }
  button.danger:active { background:#3a1020; }
  button.primary { border-color:#2ecc71; color:#2ecc71; }
  button.primary:active { background:#0a3020; }
  button.reset { border-color:#555; color:#777; font-size:10px; padding:5px 10px; }

  .potion-threshold { display:flex; align-items:center; gap:6px; color:#a0a0c0; font-size:11px; }
  .potion-threshold input { width:46px; background:#0f3460; border:1px solid #1a4a80; color:#e0e0e0; font-family:'Courier New',monospace; font-size:11px; padding:5px 6px; border-radius:4px; }

  #encounter-display { background:#16213e; border-bottom:1px solid #0f3460; padding:10px 14px; flex-shrink:0; min-height:72px; }
  #encounter-display .enc-title { color:#e63946; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
  #encounter-display .enc-body { color:#c0c0d0; font-size:12px; line-height:1.6; }

  #log { flex:1; overflow-y:auto; padding:10px 14px; background:#12112a; }
  .log-entry { padding:3px 0; line-height:1.6; color:#9090b0; font-size:11px; border-bottom:1px solid #1a1a35; }
  .log-entry.catch  { color:#2ecc71; }
  .log-entry.damage { color:#e74c3c; }
  .log-entry.exp    { color:#9b59b6; }
  .log-entry.evolve { color:#f4d03f; font-weight:bold; }
  .log-entry.fail   { color:#e67e22; }
  .log-entry.info   { color:#5dade2; }
  .log-entry.faint  { color:#e63946; font-weight:bold; }
  .log-entry.win    { color:#27ae60; }

  #dex-stats { padding:6px 10px; border-bottom:1px solid #0f3460; font-size:10px; color:#a0a0c0; display:flex; gap:14px; flex-shrink:0; background:#16213e; }
  #dex-stats span { color:#f4d03f; }
  #dex-controls { padding:8px; border-bottom:1px solid #0f3460; display:flex; gap:6px; flex-shrink:0; background:#16213e; }
  #dex-controls select { background:#0f3460; border:1px solid #1a4a80; color:#e0e0e0; font-family:'Courier New',monospace; font-size:11px; padding:6px; border-radius:4px; flex:1; }
  #dex-list { overflow-y:auto; flex:1; padding:6px; background:#16213e; }
  .dex-entry { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:11px; }
  .dex-entry .dex-header { display:flex; justify-content:space-between; margin-bottom:3px; }
  .dex-entry .dex-name { color:#fff; font-weight:bold; }
  .dex-entry .dex-id { color:#5dade2; }
  .dex-entry .dex-details { color:#9090b0; line-height:1.5; }
  .dex-entry .dex-holder { color:#2ecc71; font-size:10px; margin-top:3px; }
  .dex-entry.unassigned .dex-holder { color:#e67e22; }
</style>
<!-- External database files — must be in same GitHub repo -->
<script src="pokedex.js"></script>
<script src="encounters.js"></script>
<script src="locations.js"></script>
<script src="connections.js"></script>
<script src="typechart.js"></script>
<script src="evotree.js"></script>
<script src="formtriggers.js"></script>
</head>
<body>

<div id="header">
  <h1>🎓 PokeProf</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="reset" onclick="resetGame()">⚠ Reset</button>
    <div style="text-align:right;">
      <div class="funds">💰 $<span id="funds-display">5.00</span></div>
      <div class="income-rate">+$<span id="income-display">1.00</span>/min</div>
      <div id="save-indicator">⬤ New game</div>
    </div>
  </div>
</div>

<div id="offline-banner">
  <div class="ob-title">📋 Welcome back, Professor!</div>
  <div class="ob-body" id="offline-summary"></div>
  <button onclick="document.getElementById('offline-banner').style.display='none'">✔ Got it</button>
</div>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('aide')" id="tab-aide"><span class="tab-icon">🧑‍🔬</span>Aide</button>
  <button class="tab-btn" onclick="switchTab('log')" id="tab-log"><span class="tab-icon">📋</span>Log</button>
  <button class="tab-btn" onclick="switchTab('dex')" id="tab-dex"><span class="tab-icon">📓</span>Dex (<span id="dex-count">0</span>)</button>
</div>

<div id="panels">
  <div class="panel active" id="panel-aide">
    <div class="panel-title">Aide Status</div>
    <div id="aide-info">
      <div class="aide-name">🧑‍🔬 Aide #1</div>
      <div class="aide-location" id="aide-location">📍 Pallet Town — Idle</div>
    </div>
    <div class="panel-title">Party</div>
    <div id="party-list"></div>
    <div id="controls">
      <button class="primary" id="btn-start" onclick="startMission()">▶ Start Mission</button>
      <button class="danger" id="btn-recall" onclick="recallAide()" disabled>⏎ Recall</button>
      <div class="potion-threshold">🧪 Potion at <input type="number" id="potion-threshold" value="75" min="1" max="100">%</div>
    </div>
  </div>

  <div class="panel" id="panel-log">
    <div id="encounter-display">
      <div class="enc-title">Current Encounter</div>
      <div class="enc-body" id="enc-body">Awaiting first encounter...</div>
    </div>
    <div id="log"></div>
  </div>

  <div class="panel" id="panel-dex" style="background:#16213e;">
    <div class="panel-title" id="dex-breadcrumb">Pokédex</div>
    <div id="dex-stats">Catches: <span id="total-catches">0</span> &nbsp;|&nbsp; Sightings: <span id="total-sightings">0</span></div>
    <div id="dex-controls">
      <button id="dex-back-btn" onclick="dexBack()" style="display:none;padding:5px 10px;font-size:11px;">◀ Back</button>
      <button onclick="dexViewAll()" style="padding:5px 10px;font-size:11px;">≡ View All</button>
    </div>
    <!-- View All controls (hidden by default) -->
    <div id="dex-viewall-controls" style="display:none;padding:6px 8px;border-bottom:1px solid #0f3460;gap:6px;flex-wrap:wrap;background:#16213e;">
      <select id="sort-select" onchange="renderViewAll()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:5px;border-radius:4px;flex:1;">
        <option value="id">Sort: Catch ID</option>
        <option value="dexid">Sort: Dex #</option>
        <option value="level">Sort: Level</option>
        <option value="hp">Sort: HP</option>
        <option value="total">Sort: BST</option>
      </select>
      <select id="filter-select" onchange="renderViewAll()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:5px;border-radius:4px;flex:1;">
        <option value="all">All</option>
        <option value="unassigned">Unassigned</option>
        <option value="assigned">Assigned</option>
      </select>
    </div>
    <div id="dex-list" style="overflow-y:auto;flex:1;padding:6px;background:#16213e;"></div>
  </div>
</div>

<script>
// ── DATABASE BRIDGE ──
// POKEDEX_DATA, dexByName(), getForms(), getFamilyMembers() provided by pokedex.js
// ENCOUNTERS provided by encounters.js
// TYPE_CHART + getTypeEffectiveness() provided by typechart.js
// EVO_TREE + getEvolutions() provided by evotree.js
// FORM_TRIGGERS provided by formtriggers.js

// Build SPECIES lookup by name (base forms only) for game logic
const SPECIES = {};
if(typeof POKEDEX_DATA !== 'undefined'){
  POKEDEX_DATA.forEach(p => {
    // Map by name — base form (no formName) takes priority
    if(!p.formName || !SPECIES[p.name]) SPECIES[p.name] = p;
  });
} else {
  console.error('pokedex.js not loaded — check GitHub file is uploaded');
}

// Build route encounter table from ENCOUNTERS data (fallback to hardcoded if empty)
function buildRouteTable(locationId){
  if(typeof ENCOUNTERS !== 'undefined' && ENCOUNTERS.length > 0){
    return ENCOUNTERS.filter(e=>e.locationId===locationId).map(e=>({
      dexId: e.dexId, minLv: e.minLevel, maxLv: e.maxLevel, weight: e.encounterRate
    }));
  }
  // Fallback for Route 1 until encounters.js is populated
  return [{dexId:19,minLv:2,maxLv:4,weight:50},{dexId:16,minLv:2,maxLv:5,weight:50}];
}
const ROUTE1 = buildRouteTable('route1');
const ENC_INTERVAL = 180;

function expToLevel(lv,rate){
  if(lv<=1)return 0;
  if(rate==='mediumFast')return Math.floor(Math.pow(lv,3));
  if(rate==='mediumSlow')return Math.max(0,Math.floor((6/5)*Math.pow(lv,3)-15*Math.pow(lv,2)+100*lv-140));
  return Math.floor(Math.pow(lv,3));
}
function calcMaxHP(sp,lv){
  const s=SPECIES[sp];if(!s)return lv+10;
  return Math.floor((s.baseHP*2*lv)/100)+lv+10;
}
function calcBST(sp,lv){
  const s=SPECIES[sp];if(!s)return 0;
  const st=(b)=>Math.floor(((b||0)*2*lv)/100)+5;
  return calcMaxHP(sp,lv)+st(s.baseAtk)+st(s.baseDef)+st(s.baseSpatk)+st(s.baseSpdef)+st(s.baseSpd);
}

let state={
  funds:5.00,totalCatches:0,totalSightings:0,
  missionActive:false,missionElapsed:0,nextEncounterIn:ENC_INTERVAL,
  incomeAccumulator:0,potionThreshold:75,
  party:[],dex:[],dexIdCounter:1,currentEncounter:null,log:[]
};

function makePokemon(sp,lv,gender,holder=null){
  const entry=SPECIES[sp]||dexByName(sp);
  const dexId=entry?entry.dexId||entry.id:0;
  const maxHP=calcMaxHP(sp,lv);
  const growthRate=entry?entry.growthRate:'mediumFast';
  return{id:state.dexIdCounter++,species:sp,pokedexId:dexId,level:lv,gender,currentHP:maxHP,maxHP,exp:expToLevel(lv,growthRate),holder};
}

function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function addLog(msg,type=''){
  state.log.unshift({msg,type});
  if(state.log.length>200)state.log.pop();
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-entry '+type;
  d.textContent=msg;
  el.insertBefore(d,el.firstChild);
  if(el.children.length>200)el.removeChild(el.lastChild);
}

function startMission(){
  if(state.missionActive)return;
  if(!state.party.find(p=>p.currentHP>0)){addLog('No conscious Pokemon!','fail');return;}
  state.missionActive=true;
  state.nextEncounterIn=ENC_INTERVAL;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-recall').disabled=false;
  addLog('Aide dispatched to Route 1.','info');
  updateLocation();render();
}

function recallAide(){
  if(!state.missionActive)return;
  state.missionActive=false;state.currentEncounter=null;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-recall').disabled=true;
  document.getElementById('enc-body').textContent='Aide recalled to Pallet Town.';
  addLog('Aide recalled.','info');
  updateLocation();saveGame();render();
}

function getLeadPokemon(){return state.party.find(p=>p.currentHP>0)||null;}
function allFainted(){return state.party.every(p=>p.currentHP<=0);}

function endMission(){
  state.missionActive=false;state.currentEncounter=null;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-recall').disabled=true;
  document.getElementById('enc-body').textContent='All fainted. Aide returned to Pallet Town.';
  addLog('All fainted — aide returned.','faint');
  updateLocation();saveGame();
}

function updateLocation(){
  const el=document.getElementById('aide-location');
  if(state.missionActive){
    const m=Math.floor(state.nextEncounterIn/60),s=state.nextEncounterIn%60;
    el.textContent='📍 Route 1 — Next: '+m+':'+s.toString().padStart(2,'0');
  }else{el.textContent='📍 Pallet Town — Idle';}
}

function incomeTick(){
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  state.incomeAccumulator+=perMin/60;
  if(state.incomeAccumulator>=0.01){
    const c=Math.floor(state.incomeAccumulator*100);
    state.funds+=c/100;
    state.incomeAccumulator-=c/100;
  }
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  document.getElementById('income-display').textContent=perMin.toFixed(2);
}

function rollEncounter(){
  let roll=Math.random()*100,cum=0;
  const table=ROUTE1;
  for(const e of table){cum+=e.weight;if(roll<cum){
    const entry=POKEDEX_DATA?POKEDEX_DATA.find(p=>p.dexId===e.dexId&&!p.formName):null;
    if(!entry)continue;
    return{species:entry.name,pokedexId:e.dexId,level:e.minLv+Math.floor(Math.random()*(e.maxLv-e.minLv+1)),gender:Math.random()<0.5?'M':'F'};
  }}
}

function resolveEncounterStep(){
  const enc=state.currentEncounter;if(!enc)return;
  const lead=getLeadPokemon();if(!lead){endMission();return;}
  const thr=parseInt(document.getElementById('potion-threshold').value)||75;
  if((lead.currentHP/lead.maxHP)*100<thr&&state.funds>=1.00)usePotion(lead);
  if(state.funds>=1.00)throwBall(lead,enc);else fight(lead,enc);
}

function throwBall(lead,enc){
  state.funds=Math.round((state.funds-1.00)*100)/100;
  if(Math.random()<0.75){
    const caught=makePokemon(enc.species,enc.level,enc.gender);
    state.dex.push(caught);state.totalCatches++;state.totalSightings++;
    const s_=SPECIES[enc.species];const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
    giveExp(lead,exp);
    addLog('Caught '+enc.species+' #'+caught.id+' (Lv'+enc.level+' '+enc.gender+')! +'+exp+' EXP','catch');
    document.getElementById('total-catches').textContent=state.totalCatches;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    state.currentEncounter=null;
    document.getElementById('enc-body').textContent='Caught '+enc.species+' Lv'+enc.level+'!';
    saveGame();
  }else{
    const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*0.25*lead.maxHP));
    lead.currentHP=Math.max(0,lead.currentHP-dmg);
    addLog('Ball failed! '+enc.species+' Lv'+enc.level+' deals '+dmg+' HP. ('+lead.species+': '+lead.currentHP+'/'+lead.maxHP+' HP)','fail');
    document.getElementById('enc-body').textContent='Ball missed! '+lead.species+' at '+lead.currentHP+'/'+lead.maxHP+' HP';
    if(lead.currentHP<=0){addLog(lead.species+' #'+lead.id+' fainted!','faint');const next=getLeadPokemon();if(!next)endMission();}
  }
}

function fight(lead,enc){
  const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
  lead.currentHP=Math.max(0,lead.currentHP-dmg);
  addLog(lead.species+' vs '+enc.species+' Lv'+enc.level+': took '+dmg+' dmg. ('+lead.currentHP+'/'+lead.maxHP+' HP)','damage');
  if(lead.currentHP<=0){
    addLog(lead.species+' #'+lead.id+' fainted!','faint');
    const next=getLeadPokemon();if(!next){endMission();return;}
    addLog(enc.species+' fled.','info');state.currentEncounter=null;
    document.getElementById('enc-body').textContent=lead.species+' fainted. '+enc.species+' fled.';
  }else{
    const s_=SPECIES[enc.species];const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
    giveExp(lead,exp);
    addLog('Won vs '+enc.species+' Lv'+enc.level+'! +'+exp+' EXP (no data)','win');
    state.currentEncounter=null;
    document.getElementById('enc-body').textContent='Won vs '+enc.species+' Lv'+enc.level+'. No Pokedex data.';
  }
}

function usePotion(p){
  state.funds=Math.round((state.funds-1.00)*100)/100;
  const h=Math.min(20,p.maxHP-p.currentHP);
  p.currentHP=Math.min(p.maxHP,p.currentHP+20);
  addLog('Potion used on '+p.species+': +'+h+' HP ('+p.currentHP+'/'+p.maxHP+')','info');
}

function giveExp(pokemon,amount){
  pokemon.exp+=amount;
  addLog(pokemon.species+' #'+pokemon.id+' +'+amount+' EXP','exp');
  let lv=false;
  while(true){
    const s=SPECIES[pokemon.species];
    const need=expToLevel(pokemon.level+1,s.growthRate);
    if(pokemon.exp>=need&&pokemon.level<100){
      pokemon.level++;lv=true;
      const om=pokemon.maxHP;pokemon.maxHP=calcMaxHP(pokemon.species,pokemon.level);
      pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+(pokemon.maxHP-om));
      addLog(pokemon.species+' #'+pokemon.id+' -> Lv'+pokemon.level+'! HP:'+pokemon.maxHP,'info');
      checkEvolution(pokemon);saveGame();
    }else break;
  }
  if(lv)renderDex();
}

function checkEvolution(p){
  const s=SPECIES[p.species];
  if(!s)return;
  // Check simple level evolution
  if(s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
    const newEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===s.evolvesIntoId&&!x.formName):null;
    if(newEntry){
      const old=p.species;
      p.species=newEntry.name;p.pokedexId=newEntry.dexId;
      const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      // Update SPECIES shim for new form
      if(!SPECIES[p.species])SPECIES[p.species]=newEntry;
      addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
      document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
    }
  }
  // Check branching evolutions via EVO_TREE
  if(typeof EVO_TREE!=='undefined'){
    const branches=getEvolutions(p.pokedexId);
    if(branches.length>0){
      const branch=branches[Math.floor(Math.random()*branches.length)];
      if(branch.evolveMethod==='level'&&p.level>=branch.evolveLevel){
        const newEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===branch.toDexId&&!x.formName):null;
        if(newEntry){
          const old=p.species;
          p.species=newEntry.name;p.pokedexId=newEntry.dexId;
          const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
          if(!SPECIES[p.species])SPECIES[p.species]=newEntry;
          addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
          document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
        }
      }
    }
  }
}

// ── OFFLINE TIME PROCESSING ──
function giveExpSilent(p,amount){
  p.exp+=amount;
  while(true){
    const s=SPECIES[p.species];if(!s)break;
    if(p.exp>=expToLevel(p.level+1,s.growthRate)&&p.level<100){
      p.level++;const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      // Silent evolution check
      if(s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
        const ne=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===s.evolvesIntoId&&!x.formName):null;
        if(ne){p.species=ne.name;p.pokedexId=ne.dexId;if(!SPECIES[p.species])SPECIES[p.species]=ne;
          const om2=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om2));}
      }
    }else break;
  }
}

function processOfflineTime(secsAway){
  if(secsAway<10||!state.missionActive)return null;
  const summary={encounters:0,catches:0,wins:0,income:0,evolutions:[]};
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  const income=Math.round((perMin/60)*secsAway*100)/100;
  state.funds=Math.round((state.funds+income)*100)/100;
  summary.income=income;
  let remaining=secsAway,nextIn=state.nextEncounterIn;
  while(remaining>=nextIn){
    remaining-=nextIn;nextIn=ENC_INTERVAL;summary.encounters++;
    const enc=rollEncounter();const lead=getLeadPokemon();if(!lead)break;
    const oldSp=lead.species;let resolved=false,tries=0;
    while(!resolved&&tries<20){
      tries++;
      const thr=state.potionThreshold;
      if((lead.currentHP/lead.maxHP)*100<thr&&state.funds>=1.00){
        state.funds=Math.round((state.funds-1.00)*100)/100;
        lead.currentHP=Math.min(lead.maxHP,lead.currentHP+20);
      }
      if(state.funds>=1.00){
        state.funds=Math.round((state.funds-1.00)*100)/100;
        if(Math.random()<0.75){
          const caught=makePokemon(enc.species,enc.level,enc.gender);
          state.dex.push(caught);state.totalCatches++;state.totalSightings++;
          const se1=SPECIES[enc.species];giveExpSilent(lead,Math.floor(((se1?se1.baseExpYield||se1.baseExp:51)*enc.level)/7));
          if(lead.species!==oldSp)summary.evolutions.push(oldSp+' → '+lead.species);
          summary.catches++;resolved=true;
        }else{
          const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*0.25*lead.maxHP));
          lead.currentHP=Math.max(0,lead.currentHP-dmg);
          if(lead.currentHP<=0)resolved=true;
        }
      }else{
        const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
        lead.currentHP=Math.max(0,lead.currentHP-dmg);
        if(lead.currentHP<=0){resolved=true;}
        else{const se2=SPECIES[enc.species];giveExpSilent(lead,Math.floor(((se2?se2.baseExpYield||se2.baseExp:51)*enc.level)/7));if(lead.species!==oldSp)summary.evolutions.push(oldSp+' → '+lead.species);summary.wins++;resolved=true;}
      }
    }
    if(allFainted()){state.missionActive=false;break;}
  }
  state.nextEncounterIn=Math.max(1,Math.min(ENC_INTERVAL,nextIn-remaining));
  document.getElementById('total-catches').textContent=state.totalCatches;
  document.getElementById('total-sightings').textContent=state.totalSightings;
  if(!state.missionActive){document.getElementById('btn-start').disabled=false;document.getElementById('btn-recall').disabled=true;}
  return summary;
}

function showOfflineBanner(secs,summary){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  const t=h>0?h+'h '+m+'m':m+'m';
  let txt='Away for '+t+': '+summary.encounters+' encounter'+(summary.encounters!==1?'s':'')+', '+summary.catches+' catch'+(summary.catches!==1?'es':'')+', +$'+summary.income.toFixed(2)+'.';
  if(summary.evolutions.length)txt+=' 🌟 '+summary.evolutions.join(', ')+'!';
  if(!state.missionActive)txt+=' Aide returned (all fainted).';
  document.getElementById('offline-summary').textContent=txt;
  document.getElementById('offline-banner').style.display='block';
}

function render(){renderParty();renderDex();updateDexChrome();document.getElementById('dex-count').textContent=state.dex.length;updateLocation();}

function renderParty(){
  const c=document.getElementById('party-list');c.innerHTML='';
  if(!state.party.length){c.innerHTML='<div style="color:#555;padding:10px;font-size:11px;">No Pokemon in party</div>';return;}
  state.party.forEach(p=>{
    const hpPct=Math.max(0,(p.currentHP/p.maxHP)*100);
    const hpColor=hpPct>50?'#2ecc71':hpPct>20?'#f4d03f':'#e74c3c';
    const s=SPECIES[p.species];
    const ec=p.exp-expToLevel(p.level,s.growthRate);
    const en=expToLevel(p.level+1,s.growthRate)-expToLevel(p.level,s.growthRate);
    const ePct=Math.min(100,(ec/Math.max(1,en))*100);
    const fainted=p.currentHP<=0;
    const d=document.createElement('div');
    d.className='party-slot'+(fainted?' fainted':'');
    d.innerHTML=`<div class="poke-name">${fainted?'💀':'🐾'} ${p.species} #${p.id} <span style="color:#a0a0c0">(${p.gender})</span></div>
<div class="poke-level">Lv${p.level} · BST ${calcBST(p.species,p.level)}</div>
<div class="hp-bar-wrap"><div class="hp-bar" style="width:${hpPct}%;background:${hpColor}"></div></div>
<div class="hp-text">HP: ${p.currentHP}/${p.maxHP}</div>
<div class="exp-bar-wrap"><div class="exp-bar" style="width:${ePct}%"></div></div>
<div class="hp-text" style="color:#9b59b6">EXP: ${ec}/${en}</div>`;
    c.appendChild(d);
  });
}

// ── DEX STATE ──
let dexView = 'families'; // 'families' | 'species' | 'individual' | 'viewall'
let dexSelectedFamily = null;
let dexSelectedDexId = null;
let dexSelectedCatchId = null;

function renderDex(){
  document.getElementById('dex-count').textContent=state.dex.length;
  if(dexView==='families') renderDexFamilies();
  else if(dexView==='species') renderDexSpecies();
  else if(dexView==='individual') renderDexIndividual();
  else if(dexView==='viewall') renderViewAll();
}

function dexBack(){
  if(dexView==='viewall'){ dexView='families'; }
  else if(dexView==='individual'){ dexView='species'; }
  else if(dexView==='species'){ dexView='families'; }
  else { dexView='families'; }
  renderDex(); updateDexChrome();
}

function dexViewAll(){
  dexView='viewall'; renderDex(); updateDexChrome();
}

function updateDexChrome(){
  const backBtn=document.getElementById('dex-back-btn');
  const vaCtrl=document.getElementById('dex-viewall-controls');
  const crumb=document.getElementById('dex-breadcrumb');
  backBtn.style.display=(dexView!=='families')?'inline-block':'none';
  vaCtrl.style.display=(dexView==='viewall')?'flex':'none';
  if(dexView==='families') crumb.textContent='Pokédex — Families';
  else if(dexView==='species'&&dexSelectedFamily!==null){
    const fEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.familyId===dexSelectedFamily&&!x.formName):null;
    crumb.textContent='Family #'+dexSelectedFamily+(fEntry?' — '+fEntry.name+' line':'');
  } else if(dexView==='individual'&&dexSelectedDexId!==null){
    const dn=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===dexSelectedDexId&&!x.formName):null;
    crumb.textContent=(dn?dn.name:'#'+dexSelectedDexId)+' — Caught';
  } else if(dexView==='viewall') crumb.textContent='Pokédex — All Catches';
  else crumb.textContent='Pokédex';
}

// LAYER 1: Families
function renderDexFamilies(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  if(typeof POKEDEX_DATA==='undefined'){ c.innerHTML='<div style="color:#e63946;padding:12px;font-size:11px;">Database not loaded. Check pokedex.js is uploaded to GitHub.</div>'; return; }
  // Get all families seen (by dexId of any caught pokemon)
  const seenFamilies=new Set();
  state.dex.forEach(p=>{ if(p.pokedexId){ const e=POKEDEX_DATA.find(x=>x.dexId===p.pokedexId&&!x.formName); if(e)seenFamilies.add(e.familyId); } });
  if(!seenFamilies.size){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No Pokémon discovered yet.</div>'; return; }
  [...seenFamilies].sort((a,b)=>a-b).forEach(famId=>{
    const members=getFamilyMembers(famId);
    const baseMember=members[0];
    // Count caught per family
    const caught=state.dex.filter(p=>p.pokedexId&&POKEDEX_DATA&&POKEDEX_DATA.find(x=>x.dexId===p.pokedexId&&x.familyId===famId));
    const speciesSeen=new Set(caught.map(p=>p.pokedexId));
    const d=document.createElement('div');
    d.className='dex-entry';
    d.style.cursor='pointer';
    d.innerHTML=`
      <div class="dex-header">
        <span class="dex-name">Family #${famId} — ${baseMember.name} line</span>
        <span class="dex-id">▶</span>
      </div>
      <div class="dex-details">${speciesSeen.size}/${members.length} species · ${caught.length} caught</div>
      <div class="dex-holder" style="color:#5dade2;">${members.map(m=>'#'+m.dexId+' '+m.name).join(' → ')}</div>`;
    d.onclick=()=>{ dexSelectedFamily=famId; dexView='species'; renderDex(); updateDexChrome(); };
    c.appendChild(d);
  });
}

// LAYER 2: Species within a family
function renderDexSpecies(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  const members=typeof getFamilyMembers!=='undefined'?getFamilyMembers(dexSelectedFamily):[];
  members.forEach(entry=>{
    const caught=state.dex.filter(p=>p.pokedexId===entry.dexId);
    const seen=caught.length>0;
    const d=document.createElement('div');
    d.className='dex-entry'+(seen?'':' unassigned');
    d.style.cursor=seen?'pointer':'default';
    d.innerHTML=`
      <div class="dex-header">
        <span class="dex-name">#${entry.dexId} ${entry.name}</span>
        <span class="dex-id">${seen?caught.length+' caught':'Not seen'}</span>
      </div>
      <div class="dex-details">${entry.type1}${entry.type2?' / '+entry.type2:''} · BST base: ${entry.baseHP+entry.baseAtk+entry.baseDef+entry.baseSpatk+entry.baseSpdef+entry.baseSpd}</div>
      ${seen?'<div class="dex-holder" style="color:#5dade2;">Click to see catches ▶</div>':'<div class="dex-holder" style="color:#555;">Not yet encountered</div>'}`;
    if(seen) d.onclick=()=>{ dexSelectedDexId=entry.dexId; dexView='individual'; renderDex(); updateDexChrome(); };
    c.appendChild(d);
  });
}

// LAYER 3: Individual catches of a species
function renderDexIndividual(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  const entry=POKEDEX[dexSelectedDexId];
  const caught=state.dex.filter(p=>p.pokedexId===dexSelectedDexId);
  if(!caught.length){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">None caught.</div>'; return; }
  caught.sort((a,b)=>a.id-b.id).forEach(p=>{
    const d=document.createElement('div');
    d.className='dex-entry'+(p.holder?'':' unassigned');
    d.style.cursor='pointer';
    d.innerHTML=`
      <div class="dex-header">
        <span class="dex-name">${p.species} #${p.id}</span>
        <span class="dex-id">${p.holder?'👤':'📦'}</span>
      </div>
      <div class="dex-details">Lv${p.level} · ${p.gender} · HP ${p.currentHP}/${p.maxHP} · BST ${calcBST(p.species,p.level)}</div>
      <div class="dex-holder">${p.holder?'Held by: '+p.holder:'Unassigned'}</div>`;
    d.onclick=()=>{ showPokemonDetail(p.id); };
    c.appendChild(d);
  });
}

// DETAIL MODAL: individual pokemon
function showPokemonDetail(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p)return;
  const entry=POKEDEX[p.pokedexId]||dexByName(p.species);
  const existing=document.getElementById('poke-modal');
  if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='poke-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML=`
    <div style="background:#16213e;border:1px solid #e63946;border-radius:8px;padding:16px;width:100%;max-width:340px;font-family:'Courier New',monospace;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="color:#e63946;font-size:14px;font-weight:bold;">#${p.pokedexId||'?'} ${p.species}${p.formName?' ('+p.formName+')':''} (catch #${p.id})</div>
        <button onclick="document.getElementById('poke-modal').remove()" style="padding:4px 10px;font-size:12px;">✕</button>
      </div>
      <div style="color:#a0a0c0;font-size:11px;line-height:2;border-bottom:1px solid #0f3460;margin-bottom:10px;padding-bottom:10px;">
        <div>Level: <span style="color:#fff">${p.level}</span> &nbsp;·&nbsp; Gender: <span style="color:#fff">${p.gender}</span></div>
        <div>Type: <span style="color:#fff">${entry?entry.type1+(entry.type2?' / '+entry.type2:''):'?'}</span></div>
        <div style="margin-top:6px;">
          <div>HP &nbsp;&nbsp;&nbsp;: <span style="color:#2ecc71">${p.currentHP}/${p.maxHP}</span></div>
          <div>ATK &nbsp;: <span style="color:#fff">${Math.floor(((entry?entry.baseAtk:50)*2*p.level)/100)+5}</span></div>
          <div>DEF &nbsp;: <span style="color:#fff">${Math.floor(((entry?entry.baseDef:50)*2*p.level)/100)+5}</span></div>
          <div>SpATK: <span style="color:#fff">${Math.floor(((entry?entry.baseSpatk:50)*2*p.level)/100)+5}</span></div>
          <div>SpDEF: <span style="color:#fff">${Math.floor(((entry?entry.baseSpdef:50)*2*p.level)/100)+5}</span></div>
          <div>SPD &nbsp;: <span style="color:#fff">${Math.floor(((entry?entry.baseSpd:50)*2*p.level)/100)+5}</span></div>
          <div>BST &nbsp;: <span style="color:#f4d03f">${calcBST(p.species,p.level)}</span></div>
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <div style="color:#a0a0c0;font-size:11px;margin-bottom:6px;">Assignment:</div>
        <div style="color:${p.holder?'#2ecc71':'#e67e22'};font-size:12px;margin-bottom:8px;">${p.holder?'👤 '+p.holder:'📦 Unassigned'}</div>
        ${p.holder
          ? '<button onclick="unassignPokemon('+p.id+')" class="danger" style="width:100%;padding:8px;">Unassign</button>'
          : '<button onclick="assignToAide('+p.id+')" class="primary" style="width:100%;padding:8px;">Assign to Aide #1</button>'}
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function assignToAide(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p)return;
  if(state.party.length>=6){addLog('Party is full (6 max)!','fail');return;}
  p.holder='Aide #1';
  if(!state.party.find(x=>x.id===catchId)) state.party.push(p);
  saveGame(); renderDex();
  document.getElementById('poke-modal').remove();
  addLog(p.species+' #'+p.id+' assigned to Aide #1.','info');
}

function unassignPokemon(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p)return;
  p.holder=null;
  state.party=state.party.filter(x=>x.id!==catchId);
  saveGame(); renderDex(); render();
  document.getElementById('poke-modal').remove();
  addLog(p.species+' #'+p.id+' unassigned.','info');
}

// VIEW ALL: flat list with sort/filter
function renderViewAll(){
  const sort=document.getElementById('sort-select')?document.getElementById('sort-select').value:'id';
  const filter=document.getElementById('filter-select')?document.getElementById('filter-select').value:'all';
  let entries=[...state.dex];
  if(filter==='unassigned') entries=entries.filter(p=>!p.holder);
  if(filter==='assigned') entries=entries.filter(p=>!!p.holder);
  if(sort==='id') entries.sort((a,b)=>a.id-b.id);
  else if(sort==='dexid') entries.sort((a,b)=>(a.pokedexId||0)-(b.pokedexId||0));
  else if(sort==='level') entries.sort((a,b)=>b.level-a.level);
  else if(sort==='hp') entries.sort((a,b)=>b.maxHP-a.maxHP);
  else if(sort==='total') entries.sort((a,b)=>calcBST(b.species,b.level)-calcBST(a.species,a.level));
  const c=document.getElementById('dex-list'); c.innerHTML='';
  if(!entries.length){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No entries.</div>'; return; }
  entries.forEach(p=>{
    const d=document.createElement('div');
    d.className='dex-entry'+(p.holder?'':' unassigned');
    d.style.cursor='pointer';
    d.innerHTML=`
      <div class="dex-header"><span class="dex-name">#${p.pokedexId||'?'} ${p.species} (catch #${p.id})</span><span class="dex-id">${p.holder?'👤':'📦'}</span></div>
      <div class="dex-details">Lv${p.level} · ${p.gender} · HP ${p.maxHP} · BST ${calcBST(p.species,p.level)}</div>
      <div class="dex-holder">${p.holder?'Held by: '+p.holder:'Unassigned'}</div>`;
    d.onclick=()=>showPokemonDetail(p.id);
    c.appendChild(d);
  });
}

function gameTick(){
  incomeTick();
  if(!state.missionActive){renderParty();return;}
  state.missionElapsed++;state.nextEncounterIn--;
  if(state.currentEncounter){resolveEncounterStep();render();return;}
  if(state.nextEncounterIn<=0){
    state.currentEncounter=rollEncounter();state.nextEncounterIn=ENC_INTERVAL;
    const enc=state.currentEncounter;
    addLog('Wild '+enc.species+' appeared! Lv'+enc.level+' '+enc.gender,'info');
    document.getElementById('enc-body').textContent='Wild '+enc.species+' Lv'+enc.level+' ('+enc.gender+') appeared!';
    state.totalSightings++;document.getElementById('total-sightings').textContent=state.totalSightings;
    render();
  }else{updateLocation();renderParty();}
}

const SAVE_KEY='pokeprof_save';const SAVE_VERSION=3;let saveTimer=0;

function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({version:SAVE_VERSION,savedAt:Date.now(),missionWasActive:state.missionActive,
      state:{funds:state.funds,totalCatches:state.totalCatches,totalSightings:state.totalSightings,
        missionActive:state.missionActive,missionElapsed:state.missionElapsed,nextEncounterIn:state.nextEncounterIn,
        incomeAccumulator:state.incomeAccumulator,potionThreshold:state.potionThreshold,
        dexIdCounter:state.dexIdCounter,currentEncounter:null,party:state.party,dex:state.dex,log:state.log.slice(0,50)}}));
    setSaveIndicator('✔ Saved','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),2000);
  }catch(e){setSaveIndicator('✘ Failed','error');}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;
    const data=JSON.parse(raw);if(!data||data.version!==SAVE_VERSION)return false;
    const s=data.state;
    Object.assign(state,{funds:s.funds??5,totalCatches:s.totalCatches??0,totalSightings:s.totalSightings??0,
      missionActive:s.missionActive??false,missionElapsed:s.missionElapsed??0,
      nextEncounterIn:s.nextEncounterIn??ENC_INTERVAL,incomeAccumulator:s.incomeAccumulator??0,
      potionThreshold:s.potionThreshold??75,dexIdCounter:s.dexIdCounter??1,
      currentEncounter:null,party:s.party??[],dex:s.dex??[],log:s.log??[]});
    const secsAway=Math.floor((Date.now()-data.savedAt)/1000);
    let offSum=null;
    if(secsAway>10&&data.missionWasActive)offSum=processOfflineTime(secsAway);
    const logEl=document.getElementById('log');logEl.innerHTML='';
    [...state.log].reverse().forEach(e=>{const d=document.createElement('div');d.className='log-entry '+(e.type||'');d.textContent=e.msg;logEl.appendChild(d);});
    document.getElementById('funds-display').textContent=state.funds.toFixed(2);
    document.getElementById('total-catches').textContent=state.totalCatches;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    document.getElementById('potion-threshold').value=state.potionThreshold;
    document.getElementById('btn-recall').disabled=!state.missionActive;
    document.getElementById('btn-start').disabled=state.missionActive;
    const t=new Date(data.savedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSaveIndicator('⬤ Loaded ('+t+')','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),3000);
    if(offSum)showOfflineBanner(secsAway,offSum);
    return true;
  }catch(e){setSaveIndicator('✘ Load error','error');return false;}
}

function resetGame(){if(!confirm('Wipe ALL progress? This cannot be undone.'))return;localStorage.removeItem(SAVE_KEY);location.reload();}
function setSaveIndicator(msg,cls){const el=document.getElementById('save-indicator');el.textContent=msg;el.className=cls||'';}
function autoSaveTick(){saveTimer++;if(saveTimer>=30){saveTimer=0;saveGame();}}

function init(){
  const s=makePokemon('Rattata',5,Math.random()<0.5?'M':'F','Aide #1');
  state.party.push(s);state.dex.push(s);
  addLog('Rattata #1 added to party as starter.','info');render();
}

const hasSave=loadGame();
if(!hasSave){init();setSaveIndicator('⬤ New game','');}else{render();}
setInterval(gameTick,1000);
setInterval(autoSaveTick,1000);
</script>
