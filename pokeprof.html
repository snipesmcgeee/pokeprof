<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokeProf v0.9</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background:#1a1a2e; color:#e0e0e0; font-family:'Courier New',monospace; font-size:13px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #header { background:#16213e; border-bottom:2px solid #e63946; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  #header h1 { font-size:15px; color:#e63946; letter-spacing:2px; text-transform:uppercase; }
  .funds { font-size:14px; color:#f4d03f; font-weight:bold; }
  .income-rate { font-size:10px; color:#9090b0; }
  #save-indicator { font-size:10px; color:#555; text-align:right; }
  #save-indicator.saving { color:#2ecc71; }
  #save-indicator.error { color:#e63946; }

  #offline-banner { display:none; background:#1a3a1a; border-bottom:1px solid #2ecc71; padding:10px 14px; flex-shrink:0; }
  #offline-banner .ob-title { color:#2ecc71; font-weight:bold; font-size:12px; margin-bottom:4px; }
  #offline-banner .ob-body { color:#a0c0a0; font-size:11px; line-height:1.6; }
  #offline-banner button { margin-top:8px; }

  #tab-bar { display:flex; background:#0f3460; border-bottom:1px solid #1a4a80; flex-shrink:0; }
  .tab-btn { flex:1; padding:10px 4px; text-align:center; font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#6080a0; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; }
  .tab-btn.active { color:#e0e0e0; border-bottom-color:#e63946; }
  .tab-icon { display:block; font-size:16px; margin-bottom:2px; }

  #panels { flex:1; overflow:hidden; }
  .panel { display:none; flex-direction:column; height:100%; overflow:hidden; }
  .panel.active { display:flex; }

  .panel-title { background:#0f3460; padding:6px 12px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a0a0c0; flex-shrink:0; }

  #aide-info { padding:10px 12px; border-bottom:1px solid #0f3460; background:#16213e; flex-shrink:0; }
  #aide-info .aide-name { color:#e63946; font-size:14px; margin-bottom:3px; }
  #aide-info .aide-location { color:#a0a0c0; font-size:11px; }

  #party-list { overflow-y:auto; flex:1; padding:8px; background:#16213e; }
  .party-slot { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:10px; margin-bottom:8px; }
  .party-slot.fainted { opacity:0.5; border-color:#e63946; }
  .party-slot .poke-name { font-size:13px; color:#fff; margin-bottom:3px; }
  .party-slot .poke-level { color:#a0c4ff; font-size:11px; margin-bottom:4px; }
  .hp-bar-wrap { background:#0a0a1a; border-radius:3px; height:7px; margin:5px 0 3px; overflow:hidden; }
  .hp-bar { height:100%; border-radius:3px; transition:width 0.3s; }
  .hp-text { font-size:10px; color:#a0a0c0; }
  .exp-bar-wrap { background:#0a0a1a; border-radius:3px; height:3px; margin-top:5px; overflow:hidden; }
  .exp-bar { height:100%; background:#9b59b6; border-radius:3px; }

  #controls { background:#16213e; border-top:1px solid #0f3460; padding:10px 12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }

  button { background:#0f3460; color:#e0e0e0; border:1px solid #1a4a80; border-radius:4px; padding:8px 14px; font-family:'Courier New',monospace; font-size:11px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:background 0.15s; }
  button:active { background:#1a4a80; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  button.danger { border-color:#e63946; color:#e63946; }
  button.danger:active { background:#3a1020; }
  button.primary { border-color:#2ecc71; color:#2ecc71; }
  button.primary:active { background:#0a3020; }
  button.reset { border-color:#555; color:#777; font-size:10px; padding:5px 10px; }

  .potion-threshold { display:flex; align-items:center; gap:6px; color:#a0a0c0; font-size:11px; }
  .potion-threshold input { width:46px; background:#0f3460; border:1px solid #1a4a80; color:#e0e0e0; font-family:'Courier New',monospace; font-size:11px; padding:5px 6px; border-radius:4px; }

  #encounter-display { background:#16213e; border-bottom:1px solid #0f3460; padding:10px 14px; flex-shrink:0; min-height:72px; }
  #encounter-display .enc-title { color:#e63946; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
  #encounter-display .enc-body { color:#c0c0d0; font-size:12px; line-height:1.6; }

  #log { flex:1; overflow-y:auto; padding:10px 14px; background:#12112a; }
  .log-entry { padding:3px 0; line-height:1.6; color:#9090b0; font-size:11px; border-bottom:1px solid #1a1a35; }
  .log-entry.catch  { color:#2ecc71; }
  .log-entry.damage { color:#e74c3c; }
  .log-entry.exp    { color:#9b59b6; }
  .log-entry.evolve { color:#f4d03f; font-weight:bold; }
  .log-entry.fail   { color:#e67e22; }
  .log-entry.info   { color:#5dade2; }
  .log-entry.faint  { color:#e63946; font-weight:bold; }
  .log-entry.win    { color:#27ae60; }

  #dex-stats { padding:6px 10px; border-bottom:1px solid #0f3460; font-size:10px; color:#a0a0c0; display:flex; gap:14px; flex-shrink:0; background:#16213e; }
  #dex-stats span { color:#f4d03f; }
  #dex-controls { padding:8px; border-bottom:1px solid #0f3460; display:flex; gap:6px; flex-shrink:0; background:#16213e; }
  #dex-controls select { background:#0f3460; border:1px solid #1a4a80; color:#e0e0e0; font-family:'Courier New',monospace; font-size:11px; padding:6px; border-radius:4px; flex:1; }
  #dex-list { overflow-y:auto; flex:1; padding:6px; background:#16213e; }
  .dex-entry { background:#0f3460; border:1px solid #1a4a80; border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:11px; }
  .dex-entry .dex-header { display:flex; justify-content:space-between; margin-bottom:3px; }
  .dex-entry .dex-name { color:#fff; font-weight:bold; }
  .dex-entry .dex-id { color:#5dade2; }
  .dex-entry .dex-details { color:#9090b0; line-height:1.5; }
  .dex-entry .dex-holder { color:#2ecc71; font-size:10px; margin-top:3px; }
  .dex-entry.unassigned .dex-holder { color:#e67e22; }
  .party-sprite { width:64px;height:64px;image-rendering:pixelated;flex-shrink:0; }
  .aide-party-sprites { display:flex;gap:2px;flex-wrap:wrap;margin-top:4px; }
  .aide-sprite-mini { width:48px;height:48px;image-rendering:pixelated; }
  .shiny-badge { color:#f4d03f;font-size:10px;margin-left:2px; }
</style>
<!-- External database files — must be in same GitHub repo -->
<script src="pokedex.js"></script>
<script src="encounters.js"></script>
<script src="locations.js"></script>
<script src="connections.js"></script>
<script src="typechart.js"></script>
<script src="evotree.js"></script>

</head>
<body>

<div id="header">
  <h1>🎓 PokeProf v0.9</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="reset" onclick="resetGame()">⚠ Reset</button>
    <div style="text-align:right;">
      <div class="funds">💰 $<span id="funds-display">5.00</span></div>
      <div class="income-rate">+$<span id="income-display">1.00</span>/min</div>
      <div id="save-indicator">⬤ New game</div>
    </div>
  </div>
</div>

<div id="offline-banner">
  <div class="ob-title">📋 Welcome back, Professor!</div>
  <div class="ob-body" id="offline-summary"></div>
  <button onclick="document.getElementById('offline-banner').style.display='none'">✔ Got it</button>
</div>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('aide')" id="tab-aide"><span class="tab-icon">🧑‍🔬</span>Aides</button>
  <button class="tab-btn" onclick="switchTab('log')" id="tab-log"><span class="tab-icon">📋</span>Log</button>
  <button class="tab-btn" onclick="switchTab('dex')" id="tab-dex"><span class="tab-icon">📓</span>Dex (<span id="dex-count">0</span>)</button>
</div>

<div id="panels">
  <div class="panel active" id="panel-aide">
    <div class="panel-title">Aides</div>
    <div id="aide-info">
      <div class="aide-name">🧑‍🔬 Carl Oak</div>
      <div class="aide-location" id="aide-location">📍 Pallet Town — Idle</div>
      <div id="aide-bag-display" style="font-size:10px;color:#5dade2;margin-top:2px;">🏐 0 balls in bag</div>
    </div>
    <div class="panel-title" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="togglePartyList()">
      <span>Carl Oak's Party</span><span id="party-toggle-icon">▼</span>
    </div>
    <div id="party-list"></div>
    <div id="controls">
      <button class="primary" id="btn-start" onclick="startMission()">▶ Start Mission</button>
      <button class="danger" id="btn-recall" onclick="recallAide()" disabled>⏎ Recall</button>
      <div id="bag-display" style="font-size:10px;color:#a0a0c0;"></div>
    </div>
  </div>

  <div class="panel" id="panel-log">
    <div id="encounter-display">
      <div class="enc-title">Current Encounter</div>
      <div class="enc-body" id="enc-body">Awaiting first encounter...</div>
    </div>
    <div id="log"></div>
  </div>

  <div class="panel" id="panel-dex" style="background:#16213e;">
    <div class="panel-title" id="dex-breadcrumb">Pokédex</div>
    <div id="dex-stats">Catches: <span id="total-catches">0</span> &nbsp;|&nbsp; Sightings: <span id="total-sightings">0</span></div>
    <div id="dex-controls">
      <button id="dex-back-btn" onclick="dexBack()" style="display:none;padding:5px 10px;font-size:11px;">◀ Back</button>
      <button onclick="dexViewAll()" style="padding:5px 10px;font-size:11px;">≡ View All</button>
    </div>
    <!-- View All controls (hidden by default) -->
    <div id="dex-viewall-controls" style="display:none;padding:6px 8px;border-bottom:1px solid #0f3460;gap:6px;flex-wrap:wrap;background:#16213e;">
      <select id="sort-select" onchange="renderViewAll()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:5px;border-radius:4px;flex:1;">
        <option value="id">Sort: Catch ID</option>
        <option value="dexid">Sort: Dex #</option>
        <option value="level">Sort: Level</option>
        <option value="hp">Sort: HP</option>
        <option value="total">Sort: BST</option>
      </select>
      <select id="filter-select" onchange="renderViewAll()" style="background:#0f3460;border:1px solid #1a4a80;color:#e0e0e0;font-family:'Courier New',monospace;font-size:11px;padding:5px;border-radius:4px;flex:1;">
        <option value="all">All</option>
        <option value="unassigned">Unassigned</option>
        <option value="assigned">Assigned</option>
        <option value="shiny">✨ Shiny</option>
      </select>
    </div>
    <div id="dex-list" style="overflow-y:auto;flex:1;padding:6px;background:#16213e;"></div>
  </div>
</div>

<script>
// ── DATABASE BRIDGE ──
// POKEDEX_DATA, dexByName(), getForms(), getFamilyMembers() provided by pokedex.js
// ENCOUNTERS provided by encounters.js
// TYPE_CHART + getTypeEffectiveness() provided by typechart.js
// EVO_TREE + getEvolutions() provided by evotree.js
// FORM_TRIGGERS provided by formtriggers.js

// Build SPECIES lookup by name (base forms only) for game logic
const SPECIES = {};
if(typeof POKEDEX_DATA !== 'undefined'){
  POKEDEX_DATA.forEach(p => {
    // Base form (no formName) takes priority, but only if it has complete data
    const existing = SPECIES[p.name];
    if(!p.formName){
      // Base form: always prefer over alternate forms, but keep existing if new entry has no growthRate
      if(!existing || p.growthRate) SPECIES[p.name] = p;
    } else {
      // Alternate form: only set if no entry exists yet
      if(!existing) SPECIES[p.name] = p;
    }
  });
} else {
  console.error('pokedex.js not loaded — check GitHub file is uploaded');
}

// Build encounter table for a location from encounters.js
// Also filter by requiresItem if Carl has that item in his bag
function buildRouteTable(locationId){
  if(typeof ENCOUNTERS==='undefined'||!ENCOUNTERS.length) return [];
  return ENCOUNTERS
    .filter(e=>e.locationId===locationId)
    .filter(e=>{
      if(!e.requiresItem) return true; // no requirement
      return !!(state.bag&&state.bag[e.requiresItem]&&state.bag[e.requiresItem]>0);
    })
    .map(e=>({dexId:e.dexId,minLv:e.minLevel,maxLv:e.maxLevel,weight:e.encounterRate,method:e.encounterMethod}));
}
const ENC_INTERVAL = 30;



// ── ITEM SYSTEM ──
function getItem(itemId){
  if(typeof ITEMS_DATA==='undefined') return null;
  return ITEMS_DATA.find(i=>i.itemId===itemId)||null;
}

// getShopItems provided by items.js

function getBallCount(){
  if(!state.bag) return 0;
  let total=0;
  Object.entries(state.bag).forEach(([id,qty])=>{
    const item=getItem(id);
    if(item&&item.itemCategory==='ball') total+=qty;
  });
  return total;
}

function getWeakestEffectivePotion(pokemon){
  // Returns itemId of weakest potion that can help, or null
  if(!state.bag) return null;
  const missing=pokemon.maxHP-pokemon.currentHP;
  if(missing<=0) return null;
  const potionOrder=['potion','super-potion','max-potion'];
  const healAmounts={potion:20,'super-potion':60,'max-potion':Infinity};
  for(const id of potionOrder){
    if((state.bag[id]||0)>0&&healAmounts[id]>=missing) return id;
  }
  // If nothing covers it exactly, use next best
  for(const id of potionOrder){
    if((state.bag[id]||0)>0) return id;
  }
  return null;
}

function useItemFromBag(itemId, pokemon){
  if(!state.bag||!state.bag[itemId]) return false;
  const item=getItem(itemId);
  if(!item) return false;
  if(item.itemCategory==='ball'){
    state.bag[itemId]--;
    if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true; // caller handles catch logic
  }
  if(item.effect==='heal-hp'){
    const heal=parseInt(item.effectValue)||20;
    const healed=Math.min(heal,pokemon.maxHP-pokemon.currentHP);
    pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+heal);
    addLog(item.name+' used on '+pokemon.species+': +'+healed+' HP ('+pokemon.currentHP+'/'+pokemon.maxHP+')','info');
  } else if(item.effect==='heal-hp-full'){
    const healed=pokemon.maxHP-pokemon.currentHP;
    pokemon.currentHP=pokemon.maxHP;
    addLog(item.name+' used on '+pokemon.species+': +'+healed+' HP (full)','info');
  } else if(item.effect==='revive-half'){
    pokemon.currentHP=Math.floor(pokemon.maxHP/2);
    addLog(item.name+' used: '+pokemon.species+' revived to '+pokemon.currentHP+' HP','info');
  } else if(item.effect==='revive-full'){
    pokemon.currentHP=pokemon.maxHP;
    addLog(item.name+' used: '+pokemon.species+' fully revived','info');
  }
  state.bag[itemId]--;
  if(state.bag[itemId]<=0) delete state.bag[itemId];
  return true;
}

function renderBagDisplay(){
  const el=document.getElementById('bag-display');
  if(!el) return;
  if(!state.bag||!Object.keys(state.bag).length){ el.textContent='Bag: empty'; return; }
  const parts=Object.entries(state.bag).map(([id,qty])=>{
    const item=getItem(id);
    const name=item?item.name:id;
    return qty+'× '+name;
  });
  el.innerHTML='🎒 '+parts.join(' · ')+'<br><span style="color:#5dade2;">🏐 '+getBallCount()+' balls</span>';
}

// ── RESEARCH LOG ──
function getResearch(dexId){
  if(!state.researchLog[dexId]) state.researchLog[dexId]={
    evolutionConfirmed:false, nonEvolutionConfirmed:false,
    confirmedMethod:null, confirmedIntoId:null,
    testedMethods:[], highestLevelObserved:0,
    knownSince:Date.now()
  };
  return state.researchLog[dexId];
}

function recordSighting(dexId, level){
  const r=getResearch(dexId);
  if(level>r.highestLevelObserved) r.highestLevelObserved=level;
  // At level 100 with no evolution, rule out level-based evolution
  if(level>=100&&!r.evolutionConfirmed&&!r.nonEvolutionConfirmed){
    const entry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===dexId&&!x.formName):null;
    if(entry&&!entry.evolvesIntoId){ r.nonEvolutionConfirmed=true; r.testedMethods.push('level'); }
  }
}

function recordEvolution(fromDexId, toDexId, method, level){
  const r=getResearch(fromDexId);
  if(!r.evolutionConfirmed){
    r.evolutionConfirmed=true;
    r.confirmedMethod=method;
    r.confirmedIntoId=toDexId;
    if(method==='level') r.testedMethods.push('level');
    // Queue finding
    const fromEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===fromDexId&&!x.formName):null;
    const toEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===toDexId&&!x.formName):null;
    addFinding('evolution', fromEntry?fromEntry.name:'#'+fromDexId, toEntry?toEntry.name:'#'+toDexId, method, level);
  }
}

function recordNewSpecies(dexId, name){
  const r=getResearch(dexId);
  // First time seen
  if(!r.firstSeen){ r.firstSeen=true; addFinding('species', name); }
}

function addFinding(type, ...args){
  state.pendingFindings.push({type, args, time:Date.now()});
}

function isSpeciesKnown(dexId){
  return !!state.researchLog[dexId];
}

function isEvolutionKnown(dexId){
  const r=state.researchLog[dexId];
  return r&&(r.evolutionConfirmed||r.nonEvolutionConfirmed);
}


function showFindingsReport(){
  if(!state.pendingFindings||!state.pendingFindings.length)return;
  const existing=document.getElementById('findings-modal');
  if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='findings-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  const lines=state.pendingFindings.map(f=>{
    if(f.type==='species') return '🆕 New Species: <span style="color:#2ecc71">'+f.args[0]+'</span>';
    if(f.type==='evolution') return '🔄 Evolution Confirmed: <span style="color:#f4d03f">'+f.args[0]+' → '+f.args[1]+'</span><br><span style="color:#9090b0;font-size:10px;padding-left:16px;">Method: '+f.args[2]+(f.args[3]?' at Lv'+f.args[3]:'')+'</span>';
    if(f.type==='encounter') return '📍 New Encounter: <span style="color:#5dade2">'+f.args[0]+'</span>';
    return '📋 '+f.args.join(' ');
  }).join('<br>');
  modal.innerHTML=`
    <div style="background:#16213e;border:1px solid #2ecc71;border-radius:8px;padding:16px;width:100%;max-width:340px;font-family:'Courier New',monospace;">
      <div style="color:#2ecc71;font-size:13px;font-weight:bold;margin-bottom:12px;">📋 Carl Oak's Findings</div>
      <div style="font-size:11px;line-height:2;margin-bottom:14px;">${lines}</div>
      <button onclick="document.getElementById('findings-modal').remove()" class="primary" style="width:100%;padding:10px;">✔ Got it</button>
    </div>`;
  document.body.appendChild(modal);
  state.pendingFindings=[];
}


function getEvolutionDisplayText(dexId){
  const r=state.researchLog[dexId];
  if(!r) return 'Evolves into: ???';
  if(r.nonEvolutionConfirmed) return 'Does not evolve';
  if(r.evolutionConfirmed){
    const toEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===r.confirmedIntoId&&!x.formName):null;
    const toName=toEntry?toEntry.name:'#'+r.confirmedIntoId;
    return 'Evolves into: '+toName+' ('+r.confirmedMethod+(r.confirmedMethod==='level'?' Lv'+r.highestLevelObserved:'')+')'
  }
  return 'Evolves into: ??? (unconfirmed)';
}


// ── SPRITE SYSTEM ──
const SPRITE_BASE='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
function getSpriteUrl(dexId, name, isShiny=false){
  // Check for custom spriteUrl in DB first (for regional forms)
  if(POKEDEX_DATA){
    const entry=POKEDEX_DATA.find(x=>x.dexId===dexId&&!x.formName);
    if(entry&&entry.spriteUrl) return entry.spriteUrl;
  }
  const base=isShiny?SPRITE_BASE+'/shiny':SPRITE_BASE;
  return base+'/'+dexId+'.png';
}


function checkLocationHeal(){
  if(!state.missionActive)return;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{
        p.currentHP=p.maxHP; // full heal including fainted
      });
      addLog('🏥 Party fully healed at '+locData.name+'!','info');
      render();
    }
  }
}


// ── TRAVEL SYSTEM ──
function buildTravelPath(fromId, toId){
  // BFS through connections, filtering out paths requiring items Carl doesn't have
  if(typeof CONNECTIONS==='undefined'||typeof CONNECTIONS_DATA==='undefined') {
    // Simple adjacency — no requiresItem check possible
    if(typeof CONNECTIONS!=='undefined'){
      const visited=new Set([fromId]);
      const queue=[[fromId,[]]];
      while(queue.length){
        const [cur,path]=queue.shift();
        const neighbors=getConnectedLocations(cur)||[];
        for(const n of neighbors){
          if(visited.has(n))continue;
          visited.add(n);
          const newPath=[...path,n];
          if(n===toId) return newPath;
          queue.push([n,newPath]);
        }
      }
    }
    return [toId];
  }
  // Full BFS with requiresItem check
  const visited=new Set([fromId]);
  const queue=[[fromId,[]]];
  while(queue.length){
    const [cur,path]=queue.shift();
    // Get connections from this location that Carl can use
    const available=(CONNECTIONS_DATA||[]).filter(c=>{
      if(c.fromLocationId!==cur) return false;
      if(!c.requiresItem) return true;
      return (state.bag&&state.bag[c.requiresItem]&&state.bag[c.requiresItem]>0)||
             (state.trainerUnlocks&&state.trainerUnlocks[c.requiresItem]);
    });
    for(const conn of available){
      const n=conn.toLocationId;
      if(visited.has(n))continue;
      visited.add(n);
      const newPath=[...path,n];
      if(n===toId) return newPath;
      queue.push([n,newPath]);
    }
  }
  return []; // empty = unreachable
}

function arriveAtLocation(locId){
  // Carl arrives at a new location
  state.currentLocation=locId;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const locName=locData?locData.name:locId;
  addLog('📍 Carl Oak arrived at '+locName+'!','info');
  // Heal if this location heals
  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party healed at '+locName+'!','info');
    }
  }
  // Set travelCycles for this location
  const cycles=locData&&locData.travelTime?parseInt(locData.travelTime):1;
  state.travelCyclesRemaining=Math.max(1,cycles);
}

function advanceTravelPath(){
  // Called AFTER each encounter — decrement cycles, advance when done
  if(!state.travelPath||state.travelPath.length===0) return;
  if(state.travelPathIndex>=state.travelPath.length) return; // at destination already
  state.travelCyclesRemaining--;
  if(state.travelCyclesRemaining<=0){
    // Move to next location in path
    state.travelPathIndex++;
    if(state.travelPathIndex<state.travelPath.length){
      arriveAtLocation(state.travelPath[state.travelPathIndex]);
    } else {
      // Arrived at final destination
      state.currentLocation=state.missionDestination;
      addLog('🏁 Carl Oak reached '+( (typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null)||{name:state.missionDestination}).name+'!','info');
    }
  }
}

function isAtDestination(){
  return state.currentLocation===state.missionDestination;
}

function expToLevel(lv,rate){
  if(lv<=1)return 0;
  const r=rate||'mediumFast'; // fallback if growthRate missing from DB
  if(r==='mediumFast')return Math.floor(Math.pow(lv,3));
  if(r==='mediumSlow')return Math.max(0,Math.floor((6/5)*Math.pow(lv,3)-15*Math.pow(lv,2)+100*lv-140));
  if(r==='fast')return Math.floor((4*Math.pow(lv,3))/5);
  if(r==='slow')return Math.floor((5*Math.pow(lv,3))/4);
  if(r==='erratic')return lv<50?Math.floor((Math.pow(lv,3)*(100-lv))/50):lv<68?Math.floor((Math.pow(lv,3)*(150-lv))/100):lv<98?Math.floor((Math.pow(lv,3)*Math.floor((1911-10*lv)/3))/500):Math.floor((Math.pow(lv,3)*(160-lv))/100);
  if(r==='fluctuating')return lv<15?Math.floor((Math.pow(lv,3)*(Math.floor((lv+1)/3)+24))/50):lv<36?Math.floor((Math.pow(lv,3)*(lv+14))/50):Math.floor((Math.pow(lv,3)*(Math.floor(lv/2)+32))/50);
  return Math.floor(Math.pow(lv,3)); // mediumFast as final fallback
}
function calcMaxHP(sp,lv){
  const s=SPECIES[sp];if(!s)return lv+10;
  return Math.floor((s.baseHP*2*lv)/100)+lv+10;
}
function calcBST(sp,lv){
  const s=SPECIES[sp];if(!s)return 0;
  const st=(b)=>Math.floor(((b||0)*2*lv)/100)+5;
  return calcMaxHP(sp,lv)+st(s.baseAtk)+st(s.baseDef)+st(s.baseSpatk)+st(s.baseSpdef)+st(s.baseSpd);
}

let state={
  funds:5.00,totalCatches:0,totalSightings:0,
  missionActive:false,missionElapsed:0,nextEncounterIn:ENC_INTERVAL,
  incomeAccumulator:0,potionThreshold:75,
  party:[],dex:[],dexIdCounter:1,currentEncounter:null,log:[],
  missionDestination:'route1', missionBehavior:'research',
  missionOrigin:'palletTown', currentLocation:'palletTown', autoRepeat:false,
  travelPath:[], travelPathIndex:0, travelCyclesRemaining:0,
  researchLog:{},   // keyed by dexId: {evolutionConfirmed,nonEvolutionConfirmed,confirmedMethod,confirmedIntoId,testedMethods,highestLevelObserved,knownSince}
  pendingFindings:[] // queue of findings to show after mission
};

function makePokemon(sp,lv,gender,holder=null){
  // Find best entry: prefer base form with growthRate populated
  let entry=null;
  if(typeof POKEDEX_DATA!=='undefined'){
    // First try: base form with growthRate
    entry=POKEDEX_DATA.find(p=>p.name===sp&&!p.formName&&p.growthRate);
    // Second try: any form with growthRate
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp&&p.growthRate);
    // Third try: any entry at all
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp&&!p.formName);
    if(!entry) entry=POKEDEX_DATA.find(p=>p.name===sp);
  }
  if(!entry) entry=SPECIES[sp];
  const dexId=entry?entry.dexId||entry.id:0;
  const growthRate=(entry&&entry.growthRate)||'mediumFast';
  const maxHP=calcMaxHP(sp,lv);
  const startExp=expToLevel(lv,growthRate);
  return{id:state.dexIdCounter++,species:sp,pokedexId:dexId,level:lv,gender,
    currentHP:maxHP,maxHP,growthRate,  // store growthRate on pokemon object
    exp:isNaN(startExp)?expToLevel(lv,'mediumFast'):startExp,
    holder};
}

function startMission(){
  if(state.missionActive)return;
  if(!state.party.find(p=>p.currentHP>0)){addLog('No conscious Pokemon!','fail');return;}
  showMissionModal();
}

function showMissionModal(){

  const allConnected=typeof CONNECTIONS!=='undefined'?getConnectedLocations(currentLoc):['route1'];
  const connected=allConnected.filter(loc=>{
    if(typeof CONNECTIONS_DATA==='undefined') return true;
    const conn=(CONNECTIONS_DATA||[]).find(c=>c.fromLocationId===currentLoc&&c.toLocationId===loc);
    if(!conn||!conn.requiresItem) return true;
    return (state.bag&&state.bag[conn.requiresItem]&&state.bag[conn.requiresItem]>0)||
           (state.trainerUnlocks&&state.trainerUnlocks[conn.requiresItem]);
  });
  const modal=document.createElement('div');

  const destOptions=connected.map(loc=>{

      <div style="color:#a0a0c0;font-size:11px;margin-bottom:8px;">DESTINATION</div>
      ${destOptions}
      <div id="mission-summary" style="color:#6080a0;font-size:10px;margin:12px 0 8px;">Select a destination above.</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#0f1a2a;padding:8px;border-radius:4px;">
        <input type="checkbox" id="auto-repeat-toggle" ${state.autoRepeat?'checked':''} onchange="state.autoRepeat=this.checked" style="width:16px;height:16px;cursor:pointer;">
        <label for="auto-repeat-toggle" style="color:#a0a0c0;font-size:11px;cursor:pointer;">Auto-repeat on wipe</label>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="document.getElementById('mission-modal').remove()" style="flex:1;">✕ Cancel</button>
        <button id="confirm-mission" onclick="confirmMission()" class="primary" style="flex:1;" disabled>▶ Dispatch</button>
      </div>
    </div>`;

function buyItem(itemId){
  const item=getItem(itemId);
  if(!item||!item.shopPrice) return;
  const price=parseFloat(item.shopPrice);
  if(state.funds<price){ addLog('Not enough funds for '+item.name+'!','fail'); return; }
  state.funds=Math.round((state.funds-price)*100)/100;
  state.bag[itemId]=(state.bag[itemId]||0)+1;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  // Update count in modal
  const el=document.getElementById('bag-'+itemId);
  if(el) el.textContent=state.bag[itemId];
  addLog('Bought '+item.name+' ($'+price+')','info');
}

function selectMissionDest(locId){
  state._missionDest=locId;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const name=locData?locData.name:locId;
  document.getElementById('mission-summary').textContent='Carl Oak → '+name+' (research on arrival)';
  document.getElementById('confirm-mission').disabled=false;
}

function confirmMission(){
  if(!state._missionDest)return;
  const modal=document.getElementById('mission-modal');
  if(modal)modal.remove();
  state.missionActive=true;
  state.missionBehavior='research';
  state.missionDestination=state._missionDest||'route1';
  state.missionOrigin=state.currentLocation||'palletTown';
  // Build travel path
  state.travelPath=buildTravelPath(state.missionOrigin, state.missionDestination);
  if(state.travelPath.length===0){
    addLog('⚠ Cannot reach that destination — missing required item.','fail');
    state.missionActive=false;
    document.getElementById('btn-start').disabled=false;
    document.getElementById('btn-recall').disabled=true;
    return;
  }
  state.travelPathIndex=0;
  // Arrive at first location immediately
  arriveAtLocation(state.travelPath[0]);
  state.nextEncounterIn=ENC_INTERVAL;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-recall').disabled=false;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
  const destName=locData?locData.name:state.missionDestination;
  addLog('Carl Oak dispatched to '+destName+' (research on arrival).','info');
  state.pendingFindings=[];
  updateLocation();render();
}

function recallAide(){
  if(!state.missionActive)return;
  state.missionActive=false;state.currentEncounter=null;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-recall').disabled=true;
  document.getElementById('enc-body').textContent='Aide recalled to Pallet Town.';
  endMission('recall');
  render();
}

function getLeadPokemon(){return state.party.find(p=>p.currentHP>0)||null;}
function allFainted(){return state.party.every(p=>p.currentHP<=0);}

function endMission(reason='faint'){
  state.missionActive=false;state.currentEncounter=null;
  // Return Carl to origin location
  const originLocId=state.missionOrigin||'palletTown';
  state.currentLocation=originLocId;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-recall').disabled=true;
  const msg=reason==='recall'?'Carl Oak recalled to Pallet Town.':'All fainted — Carl Oak returned to Pallet Town.';
  document.getElementById('enc-body').textContent=msg;
  addLog(msg, reason==='recall'?'info':'faint');
  // Heal party if origin location heals
  const originLoc=typeof LOCATIONS!=='undefined'?getLocation(originLocId):null;
  if(originLoc&&(originLoc.heals==='TRUE'||originLoc.heals===true||originLoc.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party fully healed at '+originLoc.name+'!','info');
    }
  }
  showFindingsReport();
  updateLocation();saveGame();
  // Auto-repeat: restart mission if wipe and autoRepeat is on
  if(reason==='faint'&&state.autoRepeat){
    setTimeout(()=>{
      if(!state.missionActive&&state.party.find(p=>p.currentHP>0)){
        addLog('🔄 Auto-repeating mission to '+(getLocation(state.missionDestination)||{name:state.missionDestination}).name+'...','info');
        // Restart same mission
        state.missionActive=true;
        state.travelPath=buildTravelPath(state.missionOrigin, state.missionDestination);
        state.travelPathIndex=0;
        if(state.travelPath.length>0){
          arriveAtLocation(state.travelPath[0]);
        } else {
          state.currentLocation=state.missionDestination;
        }
        state.nextEncounterIn=ENC_INTERVAL;
        state.pendingFindings=[];
        document.getElementById('btn-start').disabled=true;
        document.getElementById('btn-recall').disabled=false;
        updateLocation();render();
      }
    },2000); // 2 second pause before repeating
  }
}

function updateLocation(){
  const el=document.getElementById('aide-location');
  if(state.missionActive){
    const m=Math.floor(state.nextEncounterIn/60),s=state.nextEncounterIn%60;
    const curLocData=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation):null;
    const curLocName=curLocData?curLocData.name:(state.currentLocation||'Route 1');
    const destLocData=typeof LOCATIONS!=='undefined'?getLocation(state.missionDestination):null;
    const destLocName=destLocData?destLocData.name:state.missionDestination;
    const atDest=state.currentLocation===state.missionDestination;
    const cyclesLeft=state.travelCyclesRemaining||0;
    if(atDest){
      el.textContent='📍 '+curLocName+' — Researching · Next: '+m+':'+s.toString().padStart(2,'0');
    } else {
      el.textContent='📍 '+curLocName+' (→ '+destLocName+', '+cyclesLeft+' enc left) · Next: '+m+':'+s.toString().padStart(2,'0');
    }
  }else{
    const idleLoc=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation||'palletTown'):null;
    el.textContent='📍 '+(idleLoc?idleLoc.name:'Pallet Town')+' — Idle';
  }
}

function incomeTick(){
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  state.incomeAccumulator+=perMin/60;
  if(state.incomeAccumulator>=0.01){
    const c=Math.floor(state.incomeAccumulator*100);
    state.funds=Math.max(0, Math.round((state.funds+c/100)*100)/100);
    state.incomeAccumulator-=c/100;
  }
  // Safety: funds should never go below 0
  if(state.funds<0||isNaN(state.funds)) state.funds=0;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  document.getElementById('income-display').textContent=perMin.toFixed(2);
}

function rollEncounter(){
  const dest=state.currentLocation||state.missionDestination||'route1';
  const table=buildRouteTable(dest);
  if(!table||!table.length)return null;
  let roll=Math.random()*100,cum=0;
  for(const e of table){cum+=e.weight;if(roll<cum){
    const entry=POKEDEX_DATA?POKEDEX_DATA.find(p=>p.dexId===e.dexId&&!p.formName):null;
    if(!entry)continue;
    return{species:entry.name,pokedexId:e.dexId,level:e.minLv+Math.floor(Math.random()*(e.maxLv-e.minLv+1)),gender:Math.random()<0.5?'M':'F'};
  }}
  return null;
}

function resolveEncounterStep(){
  const enc=state.currentEncounter;if(!enc)return;
  const lead=getLeadPokemon();if(!lead){endMission();return;}
  // Auto-revive fainted lower-level pokemon first
  if(lead.currentHP<=0){
    const fainted=state.party.filter(p=>p.currentHP<=0).sort((a,b)=>a.level-b.level);
    for(const fp of fainted){
      if((state.bag['revive']||0)>0){useItemFromBag('revive',fp);break;}
      if((state.bag['max-revive']||0)>0){useItemFromBag('max-revive',fp);break;}
    }
  }
  // Auto-potion: use weakest effective potion
  const potionId=getWeakestEffectivePotion(lead);
  if(potionId)useItemFromBag(potionId,lead);
  // Auto-ball or fight
  const hasBalls=getBallCount()>0;
  if(hasBalls){throwBall(lead,enc);}else{fight(lead,enc);}
}

function throwBall(lead,enc){
  // Shiny auto-catch — no ball consumed
  const isShiny=Math.random()<(1/4096);
  if(isShiny){
    catchPokemon(lead,enc,true,false); // auto catch, no ball used
    return;
  }
  // Pick best available ball
  const ballPriority=['master-ball','ultra-ball','great-ball','poke-ball'];
  let ballUsed=null;
  for(const b of ballPriority){
    if((state.bag[b]||0)>0){ ballUsed=b; break; }
  }
  if(!ballUsed){ fight(lead,enc); return; }
  useItemFromBag(ballUsed,null); // consume ball (no pokemon target)
  const ballItem=getItem(ballUsed);
  const modifier=ballItem&&ballItem.catchRateModifier?parseFloat(ballItem.catchRateModifier):1;
  const catchRate=modifier>=255?1:Math.min(0.99,0.75*modifier); // base 75% × modifier
  if(Math.random()<catchRate){
    catchPokemon(lead,enc,false,false);
  }else{
    const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*0.25*lead.maxHP));
    lead.currentHP=Math.max(0,lead.currentHP-dmg);
    addLog('Ball failed! '+enc.species+' Lv'+enc.level+' deals '+dmg+' HP. ('+lead.species+': '+lead.currentHP+'/'+lead.maxHP+' HP)','fail');
    document.getElementById('enc-body').textContent='Ball missed! '+lead.species+' at '+lead.currentHP+'/'+lead.maxHP+' HP';
    if(lead.currentHP<=0){addLog(lead.species+' #'+lead.id+' fainted!','faint');const next=getLeadPokemon();if(!next)endMission();}
  }
}

function catchPokemon(lead,enc,isShiny,ballUsed){
  const caught=makePokemon(enc.species,enc.level,enc.gender);
  caught.isShiny=isShiny;
  state.dex.push(caught);state.totalCatches++;state.totalSightings++;
  if(isShiny) addLog('✨ SHINY '+caught.species+' caught automatically! ✨','evolve');
  const s_=SPECIES[enc.species];const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
  giveExp(lead,exp);
  recordSighting(enc.pokedexId||caught.pokedexId,enc.level);
  if(!isSpeciesKnown(caught.pokedexId)||!state.researchLog[caught.pokedexId].firstSeen)
    recordNewSpecies(caught.pokedexId,enc.species);
  addLog('Caught '+enc.species+' #'+caught.id+' (Lv'+enc.level+' '+enc.gender+(isShiny?' ✨':'')+')! +'+exp+' EXP','catch');
  document.getElementById('total-catches').textContent=state.totalCatches;
  document.getElementById('total-sightings').textContent=state.totalSightings;
  state.currentEncounter=null;
  advanceTravelPath(); // advance travel after each resolved encounter
  document.getElementById('enc-body').textContent='Caught '+enc.species+' Lv'+enc.level+(isShiny?' ✨ SHINY!':'!');;
  saveGame();
}

function fight(lead,enc){
  const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
  lead.currentHP=Math.max(0,lead.currentHP-dmg);
  addLog(lead.species+' vs '+enc.species+' Lv'+enc.level+': took '+dmg+' dmg. ('+lead.currentHP+'/'+lead.maxHP+' HP)','damage');
  if(lead.currentHP<=0){
    addLog(lead.species+' #'+lead.id+' fainted!','faint');
    const next=getLeadPokemon();if(!next){endMission();return;}
    addLog(enc.species+' fled.','info');state.currentEncounter=null;
    advanceTravelPath();
    document.getElementById('enc-body').textContent=lead.species+' fainted. '+enc.species+' fled.';
  }else{
    const s_=SPECIES[enc.species];const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
    giveExp(lead,exp);
    addLog('Won vs '+enc.species+' Lv'+enc.level+'! +'+exp+' EXP (no data)','win');
    state.currentEncounter=null;
    advanceTravelPath(); // advance travel after each resolved encounter
    document.getElementById('enc-body').textContent='Won vs '+enc.species+' Lv'+enc.level+'. No Pokedex data.';
  }
}

// usePotion removed — handled by useItemFromBag

function giveExp(pokemon,amount){
  pokemon.exp+=amount;
  addLog(pokemon.species+' #'+pokemon.id+' +'+amount+' EXP','exp');
  let lv=false;
  while(true){
    const s=SPECIES[pokemon.species];
    const gr=pokemon.growthRate||(s?s.growthRate:null)||'mediumFast';
    const need=expToLevel(pokemon.level+1,gr);
    if(pokemon.exp>=need&&pokemon.level<100){
      pokemon.level++;lv=true;
      const om=pokemon.maxHP;pokemon.maxHP=calcMaxHP(pokemon.species,pokemon.level);
      pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+(pokemon.maxHP-om));
      addLog(pokemon.species+' #'+pokemon.id+' -> Lv'+pokemon.level+'! HP:'+pokemon.maxHP,'info');
      checkEvolution(pokemon);saveGame();
    }else break;
  }
  if(lv)renderDex();
}

function checkEvolution(p){
  const s=SPECIES[p.species];
  if(!s)return;
  // Check simple level evolution
  if(s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
    const newEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===s.evolvesIntoId&&!x.formName):null;
    if(newEntry){
      const old=p.species;const prevDexId=p.pokedexId;
      p.species=newEntry.name;p.pokedexId=newEntry.dexId;
      const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      // Update SPECIES shim for new form
      if(!SPECIES[p.species])SPECIES[p.species]=newEntry;
      recordEvolution(prevDexId, newEntry.dexId, 'level', p.level);
      recordNewSpecies(newEntry.dexId, p.species);
      addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
      document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
    }
  }
  // Check branching evolutions via EVO_TREE
  if(typeof EVO_TREE!=='undefined'){
    const branches=getEvolutions(p.pokedexId);
    if(branches.length>0){
      const branch=branches[Math.floor(Math.random()*branches.length)];
      if(branch.evolveMethod==='level'&&p.level>=branch.evolveLevel){
        const newEntry=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===branch.toDexId&&!x.formName):null;
        if(newEntry){
          const old=p.species;
          p.species=newEntry.name;p.pokedexId=newEntry.dexId;
          const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
          if(!SPECIES[p.species])SPECIES[p.species]=newEntry;
          recordEvolution(prevDexId, newEntry.dexId, 'level', p.level);
      recordNewSpecies(newEntry.dexId, p.species);
      addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
          document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
        }
      }
    }
  }
}

// ── OFFLINE TIME PROCESSING ──
function giveExpSilent(p,amount){
  p.exp+=amount;
  while(true){
    const s=SPECIES[p.species];
    const gr=p.growthRate||(s?s.growthRate:null)||'mediumFast';
    if(p.exp>=expToLevel(p.level+1,gr)&&p.level<100){
      p.level++;const om=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      // Silent evolution check
      if(s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
        const ne=POKEDEX_DATA?POKEDEX_DATA.find(x=>x.dexId===s.evolvesIntoId&&!x.formName):null;
        if(ne){p.species=ne.name;p.pokedexId=ne.dexId;if(!SPECIES[p.species])SPECIES[p.species]=ne;
          const om2=p.maxHP;p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om2));}
      }
    }else break;
  }
}

function processOfflineTime(secsAway){
  if(secsAway<10||!state.missionActive)return null;
  const summary={encounters:0,catches:0,wins:0,income:0,evolutions:[]};
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  const income=Math.round((perMin/60)*secsAway*100)/100;
  state.funds=Math.round((state.funds+income)*100)/100;
  summary.income=income;
  let remaining=secsAway,nextIn=state.nextEncounterIn;
  while(remaining>=nextIn){
    remaining-=nextIn;nextIn=ENC_INTERVAL;summary.encounters++;
    const enc=rollEncounter();const lead=getLeadPokemon();if(!lead)break;
    const oldSp=lead.species;let resolved=false,tries=0;
    while(!resolved&&tries<20){
      tries++;
      // Auto-potion from bag
      const potId=getWeakestEffectivePotion(lead);
      if(potId){ useItemFromBag(potId,lead); }
      const hasBalls=getBallCount()>0;
      if(hasBalls){
        // Use cheapest ball
        const ballId=state.bag['poke-ball']>0?'poke-ball':state.bag['great-ball']>0?'great-ball':'ultra-ball';
        state.bag[ballId]=Math.max(0,(state.bag[ballId]||1)-1);
        if(Math.random()<0.75){
          const caught=makePokemon(enc.species,enc.level,enc.gender);
          caught.isShiny=Math.random()<(1/4096);
          state.dex.push(caught);state.totalCatches++;state.totalSightings++;
          const se1=SPECIES[enc.species];giveExpSilent(lead,Math.floor(((se1?se1.baseExpYield||se1.baseExp:51)*enc.level)/7));
          if(lead.species!==oldSp)summary.evolutions.push(oldSp+' → '+lead.species);
          summary.catches++;resolved=true;
        }else{
          const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*0.25*lead.maxHP));
          lead.currentHP=Math.max(0,lead.currentHP-dmg);
          if(lead.currentHP<=0)resolved=true;
        }
      }else{
        const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
        lead.currentHP=Math.max(0,lead.currentHP-dmg);
        if(lead.currentHP<=0){resolved=true;}
        else{const se2=SPECIES[enc.species];giveExpSilent(lead,Math.floor(((se2?se2.baseExpYield||se2.baseExp:51)*enc.level)/7));if(lead.species!==oldSp)summary.evolutions.push(oldSp+' → '+lead.species);summary.wins++;resolved=true;}
      }
    }
    if(allFainted()){state.missionActive=false;break;}
  }
  state.nextEncounterIn=Math.max(1,Math.min(ENC_INTERVAL,nextIn-remaining));
  document.getElementById('total-catches').textContent=state.totalCatches;
  document.getElementById('total-sightings').textContent=state.totalSightings;
  if(!state.missionActive){document.getElementById('btn-start').disabled=false;document.getElementById('btn-recall').disabled=true;}
  return summary;
}

function showOfflineBanner(secs,summary){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  const t=h>0?h+'h '+m+'m':m+'m';
  let txt='Away for '+t+': '+summary.encounters+' encounter'+(summary.encounters!==1?'s':'')+', '+summary.catches+' catch'+(summary.catches!==1?'es':'')+', +$'+summary.income.toFixed(2)+'.';
  if(summary.evolutions.length)txt+=' 🌟 '+summary.evolutions.join(', ')+'!';
  if(!state.missionActive)txt+=' Aide returned (all fainted).';
  document.getElementById('offline-summary').textContent=txt;
  document.getElementById('offline-banner').style.display='block';
}

// LAYER 1: Families
function renderDexFamilies(){
  const c=document.getElementById('dex-list'); c.innerHTML='';
  if(typeof POKEDEX_DATA==='undefined'){ c.innerHTML='<div style="color:#e63946;padding:12px;font-size:11px;">Database not loaded. Check pokedex.js is uploaded to GitHub.</div>'; return; }
  // Get all families seen (by dexId of any caught pokemon)
  const seenFamilies=new Set();
  state.dex.forEach(p=>{ if(p.pokedexId){ const e=POKEDEX_DATA.find(x=>x.dexId===p.pokedexId&&!x.formName); if(e)seenFamilies.add(e.familyId); } });
  if(!seenFamilies.size){ c.innerHTML='<div style="color:#555;padding:12px;font-size:11px;">No Pokémon discovered yet.</div>'; return; }
  [...seenFamilies].sort((a,b)=>a-b).forEach(famId=>{
    const allMembers=getFamilyMembers(famId); // full line from DB
    const baseMember=allMembers[0];
    // Only show members the professor has actually encountered
    const caught=state.dex.filter(p=>p.pokedexId&&POKEDEX_DATA&&POKEDEX_DATA.find(x=>x.dexId===p.pokedexId&&x.familyId===famId));
    const speciesSeen=new Set(caught.map(p=>p.pokedexId));
    const knownMembers=allMembers.filter(m=>speciesSeen.has(m.dexId));
    // Build evolution chain display — only show known species, ??? for unknowns beyond
    const chainParts=knownMembers.map(m=>'#'+m.dexId+' '+m.name);
    // If any known member has a confirmed evolution, show ??? at end
    const lastKnown=knownMembers[knownMembers.length-1];
    const lastResearch=lastKnown?state.researchLog[lastKnown.dexId]:null;
    if(lastKnown&&lastResearch&&!lastResearch.evolutionConfirmed&&!lastResearch.nonEvolutionConfirmed){
      chainParts.push('???');
    }
    const d=document.createElement('div');
    d.className='dex-entry';
    d.style.cursor='pointer';
    // Species count: show X/? since we don't reveal total until fully known
    const totalKnown=allMembers.every(m=>speciesSeen.has(m.dexId));
    const speciesDisplay=totalKnown?speciesSeen.size+'/'+allMembers.length:speciesSeen.size+'/?';
    d.innerHTML=`
      <div class="dex-header">
        <span class="dex-name">Family #${famId} — ${baseMember.name} line</span>
        <span class="dex-id">▶</span>
      </div>
      <div class="dex-details">${speciesDisplay} species · ${caught.length} caught</div>
      <div class="dex-holder" style="color:#5dade2;">${chainParts.join(' → ')}</div>`;
    d.onclick=()=>{ dexSelectedFamily=famId; dexView='species'; renderDex(); updateDexChrome(); };
    c.appendChild(d);
  });
}

  if(!visibleMembers.length){

  // Show ??? if last known species hasn't confirmed evolution status
  const lastEntry=visibleMembers[visibleMembers.length-1];

function revivePokemon(catchId){
  if(state.funds<20){addLog('Not enough funds to revive!','fail');return;}

  state.funds=Math.round((state.funds-20)*100)/100;
  p.currentHP=p.maxHP;
  saveGame();render();
  document.getElementById('poke-modal').remove();
  addLog('💊 '+p.species+' #'+p.id+' revived!','info');
}

function assignToAide(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p)return;
  if(state.missionActive){addLog('Cannot change party during a mission!','fail');return;}
  if(state.party.length>=6){addLog('Party is full (6 max)!','fail');return;}
  p.holder='Carl Oak';
  if(!state.party.find(x=>x.id===catchId)) state.party.push(p);
  sortParty();
  saveGame(); renderDex();
  document.getElementById('poke-modal').remove();
  addLog(p.species+' #'+p.id+' assigned to Carl Oak.','info');
}

function unassignPokemon(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p)return;
  if(state.missionActive){addLog('Cannot change party during a mission!','fail');return;}
  p.holder=null;
  state.party=state.party.filter(x=>x.id!==catchId);
  saveGame(); renderDex(); render();
  document.getElementById('poke-modal').remove();
  addLog(p.species+' #'+p.id+' unassigned.','info');
}

      <div class="dex-header"><span class="dex-name">#${p.pokedexId||'?'} ${p.species}${p.isShiny?'<span class="shiny-badge">✨</span>':''} (catch #${p.id})</span><span class="dex-id">${p.holder?'👤':'📦'}</span></div>
      <div class="dex-details">Lv${p.level} · ${p.gender} · HP ${p.maxHP} · BST ${calcBST(p.species,p.level)}</div>
      <div class="dex-holder">${p.holder?'Held by: '+p.holder:'Unassigned'}</div>`;
    d.onclick=()=>showPokemonDetail(p.id);
    c.appendChild(d);
  });
}

function gameTick(){
  incomeTick();
  if(!state.missionActive){renderParty();return;}
  state.missionElapsed++;state.nextEncounterIn--;
  if(state.currentEncounter){resolveEncounterStep();render();return;}
  if(state.nextEncounterIn<=0){
    checkLocationHeal(); // heal if in healing location between encounters
    // Roll encounter for CURRENT location
    state.currentEncounter=rollEncounter();state.nextEncounterIn=ENC_INTERVAL;
    if(!state.currentEncounter){
      // No encounter here — still advance travel
      advanceTravelPath();
      state.nextEncounterIn=ENC_INTERVAL;updateLocation();return;
    }
    const enc=state.currentEncounter;
    addLog('Wild '+enc.species+' appeared! Lv'+enc.level+' '+enc.gender,'info');
    document.getElementById('enc-body').textContent='Wild '+enc.species+' Lv'+enc.level+' ('+enc.gender+') appeared!';
    state.totalSightings++;document.getElementById('total-sightings').textContent=state.totalSightings;
    render();
  }else{updateLocation();renderParty();}
}

const SAVE_KEY='pokeprof_save';const SAVE_VERSION=7;let saveTimer=0;

function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({version:SAVE_VERSION,savedAt:Date.now(),missionWasActive:state.missionActive,
      state:{funds:state.funds,totalCatches:state.totalCatches,totalSightings:state.totalSightings,
        missionActive:state.missionActive,missionElapsed:state.missionElapsed,nextEncounterIn:state.nextEncounterIn,
        incomeAccumulator:state.incomeAccumulator,potionThreshold:state.potionThreshold,
        dexIdCounter:state.dexIdCounter,currentEncounter:null,party:state.party,dex:state.dex,log:state.log.slice(0,50),researchLog:state.researchLog,missionDestination:state.missionDestination,missionBehavior:state.missionBehavior,missionOrigin:state.missionOrigin,currentLocation:state.currentLocation,autoRepeat:state.autoRepeat||false,bag:state.bag||{},travelPath:state.travelPath||[],travelPathIndex:state.travelPathIndex||0,travelCyclesRemaining:state.travelCyclesRemaining||0}}));
    setSaveIndicator('✔ Saved','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),2000);
  }catch(e){setSaveIndicator('✘ Failed','error');}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;
    const data=JSON.parse(raw);if(!data||data.version!==SAVE_VERSION)return false;
    const s=data.state;
    Object.assign(state,{funds:s.funds??5,totalCatches:s.totalCatches??0,totalSightings:s.totalSightings??0,
      missionActive:s.missionActive??false,missionElapsed:s.missionElapsed??0,
      nextEncounterIn:s.nextEncounterIn??ENC_INTERVAL,incomeAccumulator:s.incomeAccumulator??0,
      potionThreshold:s.potionThreshold??75,dexIdCounter:s.dexIdCounter??1,
      currentEncounter:null,party:s.party??[],dex:s.dex??[],log:s.log??[],
      researchLog:s.researchLog??{},pendingFindings:[],
      missionDestination:s.missionDestination??'route1',missionBehavior:s.missionBehavior??'research',
      missionOrigin:s.missionOrigin??'palletTown',currentLocation:s.currentLocation??'palletTown',autoRepeat:s.autoRepeat??false,
      bag:s.bag??{},travelPath:s.travelPath??[],travelPathIndex:s.travelPathIndex??0,travelCyclesRemaining:s.travelCyclesRemaining??0});
    const secsAway=Math.floor((Date.now()-data.savedAt)/1000);
    let offSum=null;
    if(secsAway>10&&data.missionWasActive)offSum=processOfflineTime(secsAway);
    const logEl=document.getElementById('log');logEl.innerHTML='';
    [...state.log].reverse().forEach(e=>{const d=document.createElement('div');d.className='log-entry '+(e.type||'');d.textContent=e.msg;logEl.appendChild(d);});
    document.getElementById('funds-display').textContent=state.funds.toFixed(2);
    document.getElementById('total-catches').textContent=state.totalCatches;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    document.getElementById('potion-threshold').value=state.potionThreshold;
    document.getElementById('btn-recall').disabled=!state.missionActive;
    document.getElementById('btn-start').disabled=state.missionActive;
    const t=new Date(data.savedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSaveIndicator('⬤ Loaded ('+t+')','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),3000);
    if(offSum)showOfflineBanner(secsAway,offSum);
    return true;
  }catch(e){setSaveIndicator('✘ Load error','error');return false;}
}

function resetGame(){if(!confirm('Wipe ALL progress? This cannot be undone.'))return;localStorage.removeItem(SAVE_KEY);location.reload();}
function setSaveIndicator(msg,cls){const el=document.getElementById('save-indicator');el.textContent=msg;el.className=cls||'';}
function autoSaveTick(){saveTimer++;if(saveTimer>=30){saveTimer=0;saveGame();}}

function init(){
  const s=makePokemon('Rattata',5,Math.random()<0.5?'M':'F','Carl Oak');
  state.party.push(s);state.dex.push(s);
  recordNewSpecies(s.pokedexId,'Rattata');
  recordSighting(s.pokedexId,5);
  addLog('Rattata #1 added to party as starter (your own Rattata).','info');render();
}

const hasSave=loadGame();
if(!hasSave){init();setSaveIndicator('⬤ New game','');}else{render();}
setInterval(gameTick,1000);
setInterval(autoSaveTick,1000);

// Handle tab coming back from sleep/background
let _hiddenAt=null;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    _hiddenAt=Date.now();
    saveGame(); // save when going to background
  } else {
    if(_hiddenAt&&state.missionActive){
      const secsAway=Math.floor((Date.now()-_hiddenAt)/1000);
      if(secsAway>5){
        const summary=processOfflineTime(secsAway);
        if(summary&&(summary.encounters>0||summary.income>0)){
          showOfflineBanner(secsAway,summary);
        }
        render();saveGame();
      }
    }
    _hiddenAt=null;
  }
});
</script>
