<script>
// ── SPECIES LOOKUP ──
const SPECIES = {};
if(typeof POKEDEX_DATA !== 'undefined'){
  POKEDEX_DATA.forEach(p => {
    const existing = SPECIES[p.name];
    if(!p.formName){
      if(!existing || p.growthRate) SPECIES[p.name] = p;
    } else {
      if(!existing) SPECIES[p.name] = p;
    }
  });
}

// ── POKEDEX ENTRY HELPER — handles form-only species like Nidoran M/F ──
// Prefers formName===null; falls back to first entry with that dexId
function getPokemonEntry(dexId){
  if(typeof POKEDEX_DATA==='undefined') return null;
  const nullForm = POKEDEX_DATA.find(x=>x.dexId===dexId&&x.formName===null);
  if(nullForm) return nullForm;
  return POKEDEX_DATA.find(x=>x.dexId===dexId) || null;
}

// ── ENCOUNTER TABLE ──
function buildRouteTable(locationId){
  if(typeof ENCOUNTERS==='undefined'||!ENCOUNTERS.length) return [];
  return ENCOUNTERS
    .filter(e=>e.locationId===locationId)
    .filter(e=>{
      if(!e.requiresItem) return true;
      return !!(state.bag&&state.bag[e.requiresItem]&&state.bag[e.requiresItem]>0);
    })
    .map(e=>({
      dexId:e.dexId,
      minLv:e.minLevel,
      maxLv:e.maxLevel,
      weight:e.encounterRate||10,
      method:e.encounterMethod||'grass'
    }));
}

// ── EVO TREE ──
function getEvolutions(dexId){
  if(typeof EVO_TREE==='undefined') return [];
  return (EVO_TREE[dexId]||[]).filter(Boolean);
}

// ── UNIT CONVERSIONS ──
function metersToFeetStr(m){
  if(!m) return null;
  const totalIn=Math.round(m*39.3701);
  return Math.floor(totalIn/12)+"'"+(totalIn%12)+'"';
}
function kgToLbsStr(kg){
  if(!kg) return null;
  return (kg*2.20462).toFixed(1)+' lbs';
}

// ── TYPE COLORS ──
const typeColors={Normal:'#A8A878',Fire:'#F08030',Water:'#6890F0',Electric:'#F8D030',Grass:'#78C850',Ice:'#98D8D8',Fighting:'#C03028',Poison:'#A040A0',Ground:'#E0C068',Flying:'#A890F0',Psychic:'#F85888',Bug:'#A8B820',Rock:'#B8A038',Ghost:'#705898',Dragon:'#7038F8',Dark:'#705848',Steel:'#B8B8D0',Fairy:'#EE99AC'};

// ── STATE ──
let state={
  funds:5.00, totalCatches:0, totalSightings:0,
  missionActive:false, missionElapsed:0, nextEncounterIn:30,
  incomeAccumulator:0, potionThreshold:75,
  party:[], dex:[], dexIdCounter:1, currentEncounter:null, log:[],
  researchLog:{}, pendingFindings:[],
  missionDestination:'route1', missionBehavior:'research',
  missionOrigin:'palletTown', currentLocation:'palletTown', autoRepeat:false,
  travelPath:[], travelPathIndex:0, travelCyclesRemaining:0,
  bag:{}, discoveredLocations:new Set(['palletTown','route1']),
  locationEncounterLog:{}, lastHealLocation:'palletTown', dexHistory:{}
};
const ENC_INTERVAL=30;

// ── SPRITE URL ──
function getSpriteUrl(dexId,name,isShiny){
  if(!dexId) return '';
  const base='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
  return isShiny?base+'/shiny/'+dexId+'.png':base+'/'+dexId+'.png';
}

// ── MAKE POKEMON ──
function makePokemon(species,level,gender,holder){
  const entry=SPECIES[species]||null;
  const pokedexEntry=entry?getPokemonEntry(entry.dexId):null;
  const dexId=pokedexEntry?pokedexEntry.dexId:(entry?entry.dexId:0);
  const maxHP=calcMaxHP(species,level);
  const isShiny=Math.random()<(1/4096);
  const ability=assignAbility(pokedexEntry||entry);
  return {
    id:state.dexIdCounter++,
    species, level, gender,
    pokedexId:dexId,
    maxHP, currentHP:maxHP,
    exp:0,
    growthRate:(entry?entry.growthRate:null)||'mediumFast',
    holder:holder||null,
    isShiny,
    ability,
    friendship:0
  };
}

// ── BALL HELPERS ──
function getBallCount(){
  if(!state.bag) return 0;
  const ballIds=['master-ball','ultra-ball','great-ball','poke-ball'];
  return ballIds.reduce((t,id)=>t+(state.bag[id]||0),0)+
    Object.entries(state.bag).filter(([id,q])=>q>0&&!ballIds.includes(id)&&(getItem(id)||{}).itemCategory==='ball').reduce((t,[,q])=>t+q,0);
}

function getBestBall(){
  const priority=['master-ball','ultra-ball','great-ball','poke-ball'];
  for(const id of priority){ if(state.bag[id]>0) return id; }
  for(const [id,qty] of Object.entries(state.bag)){
    if(qty>0){ const it=getItem(id); if(it&&it.itemCategory==='ball') return id; }
  }
  return null;
}

// ── ITEM USE ──
function useItemFromBag(itemId,pokemon){
  const item=getItem(itemId); if(!item) return false;
  const eff=item.effect;
  if(eff==='heal-hp'){
    if(pokemon.currentHP<=0||pokemon.currentHP>=pokemon.maxHP) return false;
    pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+(item.effectValue||0));
    state.bag[itemId]--; if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true;
  }
  if(eff==='heal-hp-full'){
    if(pokemon.currentHP<=0||pokemon.currentHP>=pokemon.maxHP) return false;
    pokemon.currentHP=pokemon.maxHP;
    state.bag[itemId]--; if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true;
  }
  if(eff==='revive-half'){
    if(pokemon.currentHP>0) return false;
    pokemon.currentHP=Math.max(1,Math.floor(pokemon.maxHP*0.5));
    state.bag[itemId]--; if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true;
  }
  if(eff==='revive-full'){
    if(pokemon.currentHP>0) return false;
    pokemon.currentHP=pokemon.maxHP;
    state.bag[itemId]--; if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true;
  }
  if(item.itemCategory==='ball'){
    state.bag[itemId]--; if(state.bag[itemId]<=0) delete state.bag[itemId];
    return true;
  }
  return false;
}

// ── POTION LOGIC ──
function tryUsePotion(pokemon){
  if(!state.bag) return false;
  const threshold=state.potionThreshold||75;
  if((pokemon.currentHP/pokemon.maxHP)*100>=threshold) return false;
  const missing=pokemon.maxHP-pokemon.currentHP;
  const healItems=[
    {id:'potion',heal:20},{id:'super-potion',heal:50},{id:'hyper-potion',heal:120},{id:'max-potion',heal:Infinity}
  ];
  healItems.sort((a,b)=>a.heal-b.heal);
  for(const hi of healItems){
    if(!(state.bag[hi.id]>0)) continue;
    const effectiveHeal=hi.heal===Infinity?missing:hi.heal;
    if(hi.id==='max-potion'&&missing<=120) continue;
    if(effectiveHeal<missing&&hi.id!=='max-potion'){ /* try next */ }
    if(effectiveHeal>=missing||hi.id==='max-potion'){
      useItemFromBag(hi.id,pokemon);
      addLog('Used '+hi.id+' on '+pokemon.species,'info');
      return true;
    }
  }
  for(const hi of healItems){
    if(!(state.bag[hi.id]>0)) continue;
    useItemFromBag(hi.id,pokemon);
    addLog('Used '+hi.id+' on '+pokemon.species,'info');
    return true;
  }
  return false;
}

// ── PARTY SORT ──
function sortParty(){
  state.party.sort((a,b)=>{
    const aF=a.currentHP<=0?1:0, bF=b.currentHP<=0?1:0;
    if(aF!==bF) return aF-bF;
    return a.level-b.level;
  });
}

// ── TRAVEL ──
function buildTravelPath(fromId,toId){
  if(typeof CONNECTIONS_DATA!=='undefined'){
    const visited=new Set([fromId]);
    const queue=[[fromId,[]]];
    while(queue.length){
      const [cur,path]=queue.shift();
      const available=(CONNECTIONS_DATA||[]).filter(c=>{
        if(c.fromLocationId!==cur) return false;
        if(!c.requiresItem) return true;
        return (state.bag&&state.bag[c.requiresItem]&&state.bag[c.requiresItem]>0)||
               (state.trainerUnlocks&&state.trainerUnlocks[c.requiresItem]);
      });
      for(const conn of available){
        const n=conn.toLocationId;
        if(visited.has(n)) continue;
        visited.add(n);
        const newPath=[...path,n];
        if(n===toId) return newPath;
        queue.push([n,newPath]);
      }
    }
    return [];
  }
  if(typeof CONNECTIONS!=='undefined'&&typeof getConnectedLocations==='function'){
    const visited=new Set([fromId]);
    const queue=[[fromId,[]]];
    while(queue.length){
      const [cur,path]=queue.shift();
      const neighbors=getConnectedLocations(cur)||[];
      for(const n of neighbors){
        if(visited.has(n)) continue;
        visited.add(n);
        const newPath=[...path,n];
        if(n===toId) return newPath;
        queue.push([n,newPath]);
      }
    }
  }
  return [toId];
}

function getReachableDiscoveredLocations(fromId){
  const reachable=[];
  if(typeof CONNECTIONS_DATA==='undefined') return reachable;
  const visited=new Set([fromId]);
  const queue=[fromId];
  while(queue.length){
    const cur=queue.shift();
    const available=(CONNECTIONS_DATA||[]).filter(c=>{
      if(c.fromLocationId!==cur) return false;
      if(!c.requiresItem) return true;
      return (state.bag&&state.bag[c.requiresItem]&&state.bag[c.requiresItem]>0)||
             (state.trainerUnlocks&&state.trainerUnlocks[c.requiresItem]);
    });
    for(const conn of available){
      const n=conn.toLocationId;
      if(visited.has(n)) continue;
      visited.add(n);
      if(state.discoveredLocations.has(n)) reachable.push(n);
      queue.push(n);
    }
  }
  return reachable;
}

function arriveAtLocation(locId){
  state.currentLocation=locId;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(locId):null;
  const locName=locData?locData.name:locId;
  addLog('📍 Carl Oak arrived at '+locName+'!','info');
  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    state.lastHealLocation=locId;
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party healed at '+locName+'!','info');
    }
  }
  // Discover adjacent locations
  if(typeof CONNECTIONS_DATA!=='undefined'){
    (CONNECTIONS_DATA||[]).forEach(c=>{
      if(c.fromLocationId===locId) state.discoveredLocations.add(c.toLocationId);
    });
  } else if(typeof getConnectedLocations==='function'){
    (getConnectedLocations(locId)||[]).forEach(n=>state.discoveredLocations.add(n));
  }
}

function advanceTravelPath(){
  if(state.travelPath&&state.travelPath.length>0&&state.travelPathIndex<state.travelPath.length){
    if(state.travelCyclesRemaining>0){
      state.travelCyclesRemaining--;
      if(state.travelCyclesRemaining<=0){
        state.travelPathIndex++;
        if(state.travelPathIndex<state.travelPath.length){
          const nextId=state.travelPath[state.travelPathIndex];
          arriveAtLocation(nextId);
          const locData=getLocation(nextId);
          const tt=locData&&locData.travelTime?parseInt(locData.travelTime):0;
          state.travelCyclesRemaining=tt>0?tt:0;
        }
      }
    } else {
      state.travelPathIndex++;
      if(state.travelPathIndex<state.travelPath.length){
        const nextId=state.travelPath[state.travelPathIndex];
        arriveAtLocation(nextId);
        const locData=getLocation(nextId);
        const tt=locData&&locData.travelTime?parseInt(locData.travelTime):0;
        state.travelCyclesRemaining=tt>0?tt:0;
      }
    }
  }
}

// ── WIPE CHECK ──
function checkWipe(){
  if(state.party.every(p=>p.currentHP<=0)){
    addLog('All Pokémon fainted! Returning to '+state.lastHealLocation,'faint');
    state.party.forEach(p=>{ p.currentHP=Math.max(1,Math.floor(p.maxHP*0.1)); });
    state.currentLocation=state.lastHealLocation;
    state.party.forEach(p=>{ p.currentHP=p.maxHP; });
    if(state.autoRepeat){
      addLog('Auto-repeat: starting new mission...','info');
      const dest=state.missionDestination;
      const origin=state.lastHealLocation;
      state.travelPath=buildTravelPath(origin,dest);
      state.travelPathIndex=0;
      state.travelCyclesRemaining=0;
      if(state.travelPath.length>0){
        arriveAtLocation(state.travelPath[0]);
      } else {
        state.missionActive=false;
        document.getElementById('btn-recall').disabled=true;
        document.getElementById('btn-start').disabled=false;
      }
    } else {
      state.missionActive=false;
      state.currentEncounter=null;
      document.getElementById('btn-recall').disabled=true;
      document.getElementById('btn-start').disabled=false;
      addLog('Mission ended.','info');
      showFindings();
    }
    saveGame(); render();
  }
}

// ── CATCH LOGIC ──
function attemptCatch(enc){
  const ballId=getBestBall(); if(!ballId) return false;
  const item=getItem(ballId); if(!item) return false;
  const modifier=item.catchRateModifier||1;
  if(modifier>=255) return true;
  const entry=getPokemonEntry(enc.pokedexId);
  const catchRate=entry?entry.catchRate||45:45;
  const roll=Math.random();
  return roll<(catchRate*modifier)/255;
}

// ── RESOLVE ENCOUNTER ──
function resolveEncounterStep(){
  const enc=state.currentEncounter; if(!enc) return;

  // Revive check first
  const faintedMember=state.party.find(p=>p.currentHP<=0);
  if(faintedMember){
    const reviveIds=['max-revive','revive'];
    for(const rid of reviveIds){
      if(state.bag[rid]>0){ useItemFromBag(rid,faintedMember); addLog('Used '+rid+' on '+faintedMember.species,'info'); break; }
    }
  }

  sortParty();
  const lead=state.party.find(p=>p.currentHP>0);
  if(!lead){ checkWipe(); return; }

  // Shiny check — auto-catch before anything else
  if(Math.random()<(1/4096)){
    const caught=makePokemon(enc.species,enc.level,enc.gender);
    caught.isShiny=true; caught.pokedexId=enc.pokedexId;
    state.dex.push(caught); state.totalCatches++; state.totalSightings++;
    state.dexHistory[caught.pokedexId]=(state.dexHistory[caught.pokedexId]||0)+1;
    if(!state.researchLog[caught.pokedexId]||!state.researchLog[caught.pokedexId].firstSeen)
      recordNewSpecies(caught.pokedexId,enc.species);
    recordSighting(caught.pokedexId,enc.level);
    addLog('✨ SHINY '+enc.species+' auto-caught!','catch');
    document.getElementById('enc-body').textContent='✨ SHINY '+enc.species+' caught!';
    state.currentEncounter=null; advanceTravelPath(); return;
  }

  tryUsePotion(lead);

  // Speed calc (scaled stat)
  const entry=getPokemonEntry(enc.pokedexId);
  const encBaseSpd=entry?entry.baseSpd||50:enc.baseSpd||50;
  const leadSpd=Math.floor((((SPECIES[lead.species]||{}).baseSpd||50)*2*lead.level)/100)+5;
  const encSpd=Math.floor((encBaseSpd*2*enc.level)/100)+5;
  const leadFaster=leadSpd>=encSpd;

  const hasBalls=getBallCount()>0;

  // Pre-attack if slower and throwing
  if(!leadFaster&&hasBalls){
    const preDmg=Math.max(1,Math.floor(0.5*0.25*lead.maxHP));
    lead.currentHP=Math.max(0,lead.currentHP-preDmg);
    addLog(enc.species+' pre-attacks! -'+preDmg+' HP','damage');
    if(lead.currentHP<=0){ checkWipe(); return; }
  }

  if(hasBalls){
    const ballId=getBestBall();
    const caught=attemptCatch(enc);
    useItemFromBag(ballId,lead); // consume ball
    if(caught){
      const p=makePokemon(enc.species,enc.level,enc.gender);
      p.pokedexId=enc.pokedexId;
      // Give exp to lead for catching
      const s_=SPECIES[enc.species];
      const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
      giveExp(lead,exp);
      state.dex.push(p); state.totalCatches++; state.totalSightings++;
      state.dexHistory[p.pokedexId]=(state.dexHistory[p.pokedexId]||0)+1;
      document.getElementById('total-catches').textContent=state.totalCatches;
      document.getElementById('dex-count').textContent=state.totalCatches;
      document.getElementById('total-sightings').textContent=state.totalSightings;
      if(!state.researchLog[p.pokedexId]||!state.researchLog[p.pokedexId].firstSeen)
        recordNewSpecies(p.pokedexId,enc.species);
      recordSighting(p.pokedexId,enc.level);
      addLog('Caught '+enc.species+' Lv'+enc.level+'! ('+ballId+')','catch');
      document.getElementById('enc-body').textContent='Caught '+enc.species+' Lv'+enc.level+'!';
      state.currentEncounter=null; advanceTravelPath();
    } else {
      // Miss — enemy counter-attacks at 25% damage
      const missDmg=Math.max(1,Math.floor(0.5*0.25*lead.maxHP));
      lead.currentHP=Math.max(0,lead.currentHP-missDmg);
      addLog(enc.species+' breaks free! -'+missDmg+' HP','damage');
      document.getElementById('enc-body').textContent=enc.species+' broke free!';
      state.currentEncounter=null; advanceTravelPath();
      if(lead.currentHP<=0) checkWipe();
    }
  } else {
    // Fight — no balls
    if(!leadFaster){
      const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
      lead.currentHP=Math.max(0,lead.currentHP-dmg);
      addLog(enc.species+' attacks! -'+dmg+' HP','damage');
      if(lead.currentHP<=0){ checkWipe(); return; }
    }
    const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
    const playerDmg=Math.max(1,Math.floor((lead.level/enc.level)*0.5*enc.level));
    enc.currentHP=(enc.currentHP||enc.level*5)-playerDmg;
    if(enc.currentHP<=0){
      const s_=SPECIES[enc.species];
      const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
      giveExp(lead,exp);
      addLog('Won vs '+enc.species+' Lv'+enc.level+'! +'+exp+' EXP','win');
      state.currentEncounter=null; advanceTravelPath();
      document.getElementById('enc-body').textContent='Won vs '+enc.species+' Lv'+enc.level+'.';
    } else {
      if(leadFaster){
        lead.currentHP=Math.max(0,lead.currentHP-dmg);
        addLog(enc.species+' attacks! -'+dmg+' HP','damage');
        document.getElementById('enc-body').textContent='Fighting '+enc.species+'... HP:'+lead.currentHP+'/'+lead.maxHP;
        if(lead.currentHP<=0) checkWipe();
      } else {
        document.getElementById('enc-body').textContent='Fighting '+enc.species+'... HP:'+lead.currentHP+'/'+lead.maxHP;
      }
    }
  }
}

// ── INCOME ──
function incomeTick(){
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  state.incomeAccumulator+=perMin/60;
  if(state.incomeAccumulator>=0.01){
    const c=Math.floor(state.incomeAccumulator*100);
    state.funds=Math.max(0,Math.round((state.funds+c/100)*100)/100);
    state.incomeAccumulator-=c/100;
  }
  if(state.funds<0||isNaN(state.funds)) state.funds=0;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  document.getElementById('income-display').textContent=perMin.toFixed(2);
}

// ── GAME TICK ──
function gameTick(){
  incomeTick();
  if(state.missionActive){
    state._friendshipTick=(state._friendshipTick||0)+1;
    if(state._friendshipTick>=180){
      state._friendshipTick=0;
      state.party.forEach(p=>{ if(p.currentHP>0) p.friendship=(p.friendship||0)+1; });
    }
  }
  if(!state.missionActive){ renderParty(); return; }
  state.missionElapsed++; state.nextEncounterIn--;
  if(state.currentEncounter){ resolveEncounterStep(); render(); return; }
  if(state.nextEncounterIn<=0){
    checkLocationHeal();
    state.currentEncounter=rollEncounter(); state.nextEncounterIn=ENC_INTERVAL;
    if(!state.currentEncounter){
      advanceTravelPath();
      state.nextEncounterIn=ENC_INTERVAL; updateLocation(); return;
    }
    const enc=state.currentEncounter;
    // v0.16.1 fix #6: use parseInt to ensure dexId key is always numeric
    const encLocKey=state.currentLocation;
    if(!state.locationEncounterLog[encLocKey]) state.locationEncounterLog[encLocKey]={};
    const encDexKey=parseInt(enc.pokedexId)||0;
    if(encDexKey) state.locationEncounterLog[encLocKey][encDexKey]=(state.locationEncounterLog[encLocKey][encDexKey]||0)+1;
    addLog('Wild '+enc.species+' appeared! Lv'+enc.level+' '+enc.gender,'info');
    document.getElementById('enc-body').textContent='Wild '+enc.species+' Lv'+enc.level+' ('+enc.gender+') appeared!';
    state.totalSightings++;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    render();
  } else { updateLocation(); renderParty(); }
}

function selectMissionDest(locId){
  state.missionDestination=locId;

  const name=locData?locData.name:locId;

      btn.textContent='▶ Confirm Mission';
      btn.onclick=confirmMission;
      modal.querySelector('div').appendChild(btn);
    }
  }
}

function confirmMission(){
  const dest=state.missionDestination;
  const origin=state.currentLocation||'palletTown';
  state.missionOrigin=origin;
  state.lastHealLocation=origin;
  state.missionActive=true;
  state.missionElapsed=0;
  state.nextEncounterIn=ENC_INTERVAL;
  state.currentEncounter=null;
  state.pendingFindings=[];
  sortParty();
  state.travelPath=buildTravelPath(origin,dest);
  state.travelPathIndex=0;
  state.travelCyclesRemaining=0;
  if(state.travelPath.length>0){
    arriveAtLocation(state.travelPath[0]);
  }
  document.getElementById('btn-recall').disabled=false;
  document.getElementById('btn-start').disabled=true;
  const modal=document.getElementById('mission-modal'); if(modal) modal.remove();
  addLog('Mission started → '+dest,'info');
  saveGame(); render();
}

function recallMission(){
  if(!state.missionActive) return;
  state.missionActive=false;
  state.currentEncounter=null;
  document.getElementById('btn-recall').disabled=true;
  document.getElementById('btn-start').disabled=false;

}

// ── SHOP BUY ──
// v0.16.1 fix #1: buyItem now accepts qty, clamps to max affordable
function buyItem(itemId, qty){
  qty=parseInt(qty)||1;
  const item=getItem(itemId);
  if(!item||!item.shopPrice) return;
  const price=parseFloat(item.shopPrice);
  if(state.funds<price){ addLog('Not enough funds for '+item.name+'!','fail'); return; }
  // Clamp qty to max affordable
  const maxCanBuy=Math.floor(state.funds/price);
  if(maxCanBuy<=0){ addLog('Not enough funds for '+item.name+'!','fail'); return; }
  const actualQty=Math.min(qty,maxCanBuy);
  if(!state.bag) state.bag={};
  const totalCost=Math.round(price*actualQty*100)/100;
  state.funds=Math.round((state.funds-totalCost)*100)/100;
  state.bag[itemId]=(state.bag[itemId]||0)+actualQty;
  document.getElementById('funds-display').textContent=state.funds.toFixed(2);
  // Update shop funds display if open
  const shopFunds=document.getElementById('shop-funds-display');
  if(shopFunds) shopFunds.textContent=state.funds.toFixed(2);
  // Update bag qty display in shop if open
  const bagEl=document.getElementById('bag-'+itemId);
  if(bagEl) bagEl.textContent=state.bag[itemId];
  renderBagDisplay();
  if(actualQty<qty){
    addLog('Bought '+actualQty+'x '+item.name+' ($'+totalCost.toFixed(2)+') — could not afford all '+qty,'info');
  } else {
    addLog('Bought '+actualQty+'x '+item.name+' ($'+totalCost.toFixed(2)+')','info');
  }
  saveGame();
}

// ── BAG DISPLAY ──
function renderBagDisplay(){
  const el=document.getElementById('aide-bag-items'); if(!el) return;
  if(!state.bag||!Object.keys(state.bag).length){ el.textContent=''; return; }
  const parts=[];
  Object.entries(state.bag).forEach(([id,qty])=>{
    if(qty>0){ const item=getItem(id); parts.push((item?item.name:id)+' x'+qty); }
  });
  el.textContent=parts.length?'Bag: '+parts.join(', '):'';
}

function renderParty(){
  const c=document.getElementById('party-list'); c.innerHTML='';
  let spritesHtml='<div class="aide-party-sprites">';
  state.party.forEach(p=>{
    const hpPct=Math.max(0,(p.currentHP/p.maxHP)*100);
    const hpColor=hpPct>50?'#2ecc71':hpPct>20?'#f4d03f':'#e63946';
    const entry=getPokemonEntry(p.pokedexId);
    const sprite=getSpriteUrl(p.pokedexId,p.species,p.isShiny);
    spritesHtml+='<img src="'+sprite+'" class="aide-sprite-mini" onerror="this.style.display=\'none\'">';
    const s=SPECIES[p.species];
    const gr=p.growthRate||(s?s.growthRate:null)||'mediumFast';
    const expNeed=expToLevel(p.level+1,gr);
    const expCur=p.exp||0;
    const expPct=p.level>=100?100:Math.min(100,Math.round((expCur/expNeed)*100));
    const div=document.createElement('div');
    div.className='party-slot'+(p.currentHP<=0?' fainted':'');
    div.onclick=()=>showPokemonDetail(p.id);
    div.innerHTML='<div style="display:flex;gap:10px;align-items:center;">'
      +'<img src="'+sprite+'" class="party-sprite" onerror="this.style.display=\'none\'">'
      +'<div style="flex:1;">'
      +'<div class="poke-name">'+(p.isShiny?'✨ ':'')+p.species+(p.gender?' ('+p.gender+')':'')+' <span class="dex-id">#'+p.pokedexId+'</span></div>'
      +'<div class="poke-level">Lv '+p.level+(p.ability?' · '+p.ability:'')+'</div>'
      +'<div class="hp-bar-wrap"><div class="hp-bar" style="width:'+hpPct+'%;background:'+hpColor+';"></div></div>'
      +'<div class="hp-text">HP: '+p.currentHP+'/'+p.maxHP+'</div>'
      +'<div class="exp-bar-wrap"><div class="exp-bar" style="width:'+expPct+'%;"></div></div>'
      +'<div style="font-size:10px;color:#6080a0;">Friendship: '+(p.friendship||0)+'</div>'
      +'</div></div>';
    c.appendChild(div);
  });
  spritesHtml+='</div>';
  const aideEl=document.getElementById('aide-bag-display');
  if(aideEl) aideEl.innerHTML=spritesHtml;
  renderBagDisplay();
}

function updateLocation(){
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation):null;

  document.getElementById('aide-location').textContent='📍 '+locName+(state.missionActive?' — On Mission':' — Idle');
}

function renderDex(){
  const list=document.getElementById('dex-list'); list.innerHTML='';
  document.getElementById('dex-count-detail').textContent=state.totalCatches;
  const families={};
  Object.entries(state.dexHistory||{}).forEach(([dexIdStr,count])=>{
    const dexId=parseInt(dexIdStr);
    const entry=getPokemonEntry(dexId);
    if(!entry) return;
    const famId=entry.familyId||dexId;
    if(!families[famId]) families[famId]={entries:[],count:0};
    families[famId].entries.push({dexId,entry,count});
    families[famId].count+=count;
  });
  document.getElementById('dex-family-count').textContent=Object.keys(families).length;

  if(dexView==='all'){
    const sortSel=document.getElementById('sort-select');
    const filterSel=document.getElementById('filter-select');
    const sortBy=sortSel?sortSel.value:'id';
    const filterBy=filterSel?filterSel.value:'all';
    let list2=[...state.dex];
    if(filterBy==='assigned') list2=list2.filter(p=>p.holder);
    if(filterBy==='unassigned') list2=list2.filter(p=>!p.holder);
    if(filterBy==='shiny') list2=list2.filter(p=>p.isShiny);
    if(sortBy==='dexid') list2.sort((a,b)=>a.pokedexId-b.pokedexId);
    else if(sortBy==='level') list2.sort((a,b)=>b.level-a.level);
    else if(sortBy==='hp') list2.sort((a,b)=>b.maxHP-a.maxHP);
    else if(sortBy==='total') list2.sort((a,b)=>calcBST(b.species,b.level)-calcBST(a.species,a.level));
    else list2.sort((a,b)=>a.id-b.id);
    list2.forEach(p=>{
      const sprite=getSpriteUrl(p.pokedexId,p.species,p.isShiny);
      const hpPct=Math.max(0,(p.currentHP/p.maxHP)*100);
      const hpColor=hpPct>50?'#2ecc71':hpPct>20?'#f4d03f':'#e63946';
      const div=document.createElement('div');
      div.className='dex-entry'+(p.holder?'':' unassigned');
      div.onclick=()=>showPokemonDetail(p.id);
      div.innerHTML='<div style="display:flex;gap:8px;align-items:center;">'
        +'<img src="'+sprite+'" style="width:48px;height:48px;image-rendering:pixelated;" onerror="this.style.display=\'none\'">'
        +'<div style="flex:1;">'
        +'<div class="dex-header"><span class="dex-name">'+(p.isShiny?'✨ ':'')+p.species+'</span><span class="dex-id">#'+p.pokedexId+'</span></div>'
        +'<div class="dex-details">Lv '+p.level+' · '+p.gender+' · HP:'+p.currentHP+'/'+p.maxHP+'</div>'
        +'<div class="hp-bar-wrap" style="margin-top:4px;"><div class="hp-bar" style="width:'+hpPct+'%;background:'+hpColor+';"></div></div>'
        +(p.holder?'<div class="dex-holder">'+p.holder+'</div>':'')
        +'</div></div>';
      list.appendChild(div);
    });
    return;
  }

  if(dexView==='families'){
    const sorted=Object.entries(families).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    sorted.forEach(([famId,fam])=>{
      const baseEntry=fam.entries.sort((a,b)=>a.dexId-b.dexId)[0];
      const sprite=getSpriteUrl(baseEntry.dexId,baseEntry.entry.name,false);
      const div=document.createElement('div');
      div.className='dex-entry';
      div.onclick=()=>{ dexView='species'; dexSelectedFamily=parseInt(famId); document.getElementById('dex-back-btn').style.display='inline-block'; document.getElementById('dex-breadcrumb').textContent='Family #'+famId; renderDex(); };
      div.innerHTML='<div style="display:flex;gap:8px;align-items:center;">'
        +'<img src="'+sprite+'" style="width:48px;height:48px;image-rendering:pixelated;" onerror="this.style.display=\'none\'">'
        +'<div style="flex:1;"><div class="dex-name">Family #'+famId+'</div>'
        +'<div class="dex-details">'+fam.entries.length+' species known · '+fam.count+' total caught</div></div></div>';
      list.appendChild(div);
    });
    return;
  }

  if(dexView==='species'){
    const fam=families[dexSelectedFamily]; if(!fam) return;
    fam.entries.sort((a,b)=>a.dexId-b.dexId).forEach(({dexId,entry,count})=>{
      const sprite=getSpriteUrl(dexId,entry.name,false);
      const evoText=getEvolutionDisplayText(dexId);
      const div=document.createElement('div');
      div.className='dex-entry';
      div.onclick=()=>{ dexView='detail'; dexSelectedDexId=dexId; document.getElementById('dex-back-btn').style.display='inline-block'; document.getElementById('dex-breadcrumb').textContent='#'+dexId+' '+entry.name; renderDexDetail(dexId); };
      div.innerHTML='<div style="display:flex;gap:8px;align-items:center;">'
        +'<img src="'+sprite+'" style="width:48px;height:48px;image-rendering:pixelated;" onerror="this.style.display=\'none\'">'
        +'<div style="flex:1;"><div class="dex-name">#'+dexId+' '+entry.name+(entry.formName?' ('+entry.formName+')':'')+'</div>'
        +'<div class="dex-details">'+count+' caught · '+evoText+'</div></div></div>';
      list.appendChild(div);
    });
    return;
  }

  if(dexView==='detail'&&dexSelectedDexId) renderDexDetail(dexSelectedDexId);
}

  const caughtOfSpecies=state.dex.filter(p=>p.pokedexId===dexId);

  const heightDisplay=entry&&entry.heightM?metersToFeetStr(entry.heightM):null;
  const weightDisplay=entry&&entry.weightKg?kgToLbsStr(entry.weightKg):null;

  let abilityHtml='';

    const abilityCounts={};

    }

    const mCount=caughtOfSpecies.filter(p=>p.gender==='M').length;
    const fCount=caughtOfSpecies.filter(p=>p.gender==='F').length;
    if(mCount+fCount>0){
      genderHtml='<div style="margin-top:8px;font-size:11px;color:#a0a0c0;">Gender: <span style="color:#5dade2;">'+mCount+'M / '+fCount+'F</span></div>';

  const header=document.createElement('div');
  header.className='dex-entry';
  header.innerHTML='<div style="display:flex;gap:12px;align-items:flex-start;">'
    +'<img src="'+sprite+'" style="width:91px;height:91px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display=\'none\'">'
    +'<div style="flex:1;">'
    +'<div style="color:#fff;font-size:14px;font-weight:bold;">#'+dexId+' '+entry.name+(entry.formName?'<span style="color:#a0a0c0;font-size:11px;"> ('+entry.formName+')</span>':'')+'</div>'
    +'<div style="color:#5dade2;font-size:11px;margin-top:1px;">Dex #'+dexId+'</div>'
    +(entry.category?'<div style="color:#a0a0c0;font-size:10px;margin-top:2px;">"'+entry.category+' Pokémon"</div>':'')
    +'<div style="display:flex;gap:5px;margin-top:6px;">'+typeBadge(entry.type1)+typeBadge(entry.type2)+'</div>'
    +'<div style="color:#9090b0;font-size:10px;margin-top:5px;">'+(heightDisplay?'📏 '+heightDisplay:'')+(heightDisplay&&weightDisplay?' · ':'')+(weightDisplay?'⚖️ '+weightDisplay:'')+'</div>'
    +'</div></div>'
    +(entry.flavorText?'<div style="color:#a0c0a0;font-size:11px;font-style:italic;margin-top:10px;padding-top:10px;border-top:1px solid #1a4a80;line-height:1.6;">'+entry.flavorText+'</div>':'')
    +'<div style="margin-top:10px;padding-top:10px;border-top:1px solid #1a4a80;">'
    +'<div style="color:#a0a0c0;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Base Stats</div>'
    +(entry?['HP:'+entry.baseHP,'Atk:'+entry.baseAtk,'Def:'+entry.baseDef,'SpA:'+entry.baseSpatk,'SpD:'+entry.baseSpdef,'Spe:'+entry.baseSpd].map(s=>'<span style="color:#e0e0e0;font-size:10px;margin-right:8px;">'+s+'</span>').join(''):'')
    +'</div>'
    +'<div style="margin-top:8px;font-size:11px;color:#a0a0c0;">Evolution: <span style="color:#f4d03f;">'+getEvolutionDisplayText(dexId)+'</span></div>'
    +genderHtml+abilityHtml

  list.appendChild(header);

// ── PARTY MANAGEMENT ──
function assignToAide(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  if(state.missionActive){ addLog('Cannot change party during a mission!','fail'); return; }
  if(state.party.length>=6){ addLog('Party is full (6 max)!','fail'); return; }
  p.holder='Carl Oak';
  state.party.push(p);
  addLog(p.species+' #'+p.id+' assigned to Carl Oak.','info');
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
}

function unassignPokemon(catchId){
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  if(state.missionActive){ addLog('Cannot change party during a mission!','fail'); return; }
  p.holder=null;
  state.party=state.party.filter(x=>x.id!==catchId);
  addLog(p.species+' #'+p.id+' unassigned.','info');
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
}

function revivePokemon(catchId){
  if(state.funds<20){ addLog('Not enough funds to revive!','fail'); return; }
  const p=state.dex.find(x=>x.id===catchId); if(!p) return;
  state.funds=Math.round((state.funds-20)*100)/100;
  p.currentHP=p.maxHP;
  saveGame(); render();
  const m=document.getElementById('poke-modal'); if(m) m.remove();
  addLog('💊 '+p.species+' #'+p.id+' revived!','info');
}

// ── UI HELPERS ──
function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='map') renderMap();
}

function addLog(msg,type=''){
  state.log.unshift({msg,type});
  if(state.log.length>200) state.log.pop();
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-entry '+type;
  d.textContent=msg;
  el.insertBefore(d,el.firstChild);
  if(el.children.length>200) el.removeChild(el.lastChild);
}

// ── SAVE / LOAD / RESET ──
const SAVE_KEY='pokeprof_save';
const SAVE_VERSION=11; // unchanged — no state structure changes in v0.16.1
let saveTimer=0;

function saveGame(){
  if(window._resetting) return;
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      version:SAVE_VERSION, savedAt:Date.now(), missionWasActive:state.missionActive,
      state:{
        funds:state.funds, totalCatches:state.totalCatches, totalSightings:state.totalSightings,
        missionActive:state.missionActive, missionElapsed:state.missionElapsed,
        nextEncounterIn:state.nextEncounterIn, incomeAccumulator:state.incomeAccumulator,
        potionThreshold:state.potionThreshold, dexIdCounter:state.dexIdCounter,
        currentEncounter:null, party:state.party, dex:state.dex,
        log:state.log.slice(0,50), researchLog:state.researchLog,
        missionDestination:state.missionDestination, missionBehavior:state.missionBehavior,
        missionOrigin:state.missionOrigin, currentLocation:state.currentLocation,
        autoRepeat:state.autoRepeat||false, bag:state.bag||{},
        travelPath:state.travelPath||[], travelPathIndex:state.travelPathIndex||0,
        travelCyclesRemaining:state.travelCyclesRemaining||0,
        discoveredLocations:[...state.discoveredLocations],
        locationEncounterLog:state.locationEncounterLog||{},
        lastHealLocation:state.lastHealLocation||'palletTown',
        dexHistory:state.dexHistory||{}
      }
    }));
    setSaveIndicator('✔ Saved','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),2000);
  } catch(e){ setSaveIndicator('✘ Failed','error'); }
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
    const data=JSON.parse(raw); if(!data||data.version!==SAVE_VERSION) return false;
    const s=data.state;
    Object.assign(state,{
      funds:s.funds??5, totalCatches:s.totalCatches??0, totalSightings:s.totalSightings??0,
      missionActive:s.missionActive??false, missionElapsed:s.missionElapsed??0,
      nextEncounterIn:s.nextEncounterIn??ENC_INTERVAL, incomeAccumulator:s.incomeAccumulator??0,
      potionThreshold:s.potionThreshold??75, dexIdCounter:s.dexIdCounter??1,
      currentEncounter:null, party:s.party??[], dex:s.dex??[], log:s.log??[],
      researchLog:s.researchLog??{}, pendingFindings:[],
      missionDestination:s.missionDestination??'route1', missionBehavior:s.missionBehavior??'research',
      missionOrigin:s.missionOrigin??'palletTown', currentLocation:s.currentLocation??'palletTown',
      autoRepeat:s.autoRepeat??false, bag:s.bag??{},
      travelPath:s.travelPath??[], travelPathIndex:s.travelPathIndex??0,
      travelCyclesRemaining:s.travelCyclesRemaining??0,
      discoveredLocations:new Set(s.discoveredLocations??['palletTown','route1']),
      locationEncounterLog:s.locationEncounterLog??{},
      lastHealLocation:s.lastHealLocation??'palletTown',
      dexHistory:s.dexHistory??{}
    });
    // Backfill missing fields on loaded pokemon
    state.dex.forEach(p=>{
      if(p.ability===undefined) p.ability=null;
      if(p.friendship===undefined) p.friendship=0;
    });
    // Backfill dexHistory from live dex for pre-v11 saves
    if(!s.dexHistory){
      state.dex.forEach(p=>{
        if(p.pokedexId) state.dexHistory[p.pokedexId]=(state.dexHistory[p.pokedexId]||0)+1;
      });
    }
    // Re-link party entries to their canonical dex objects by id (critical — do not remove)
    state.party = state.party.map(pp => state.dex.find(d => d.id === pp.id) || pp);
    const secsAway=Math.floor((Date.now()-data.savedAt)/1000);
    let offSum=null;
    if(secsAway>10&&data.missionWasActive) offSum=processOfflineTime(secsAway);
    const logEl=document.getElementById('log'); logEl.innerHTML='';
    [...state.log].reverse().forEach(e=>{
      const d=document.createElement('div');
      d.className='log-entry '+(e.type||'');
      d.textContent=e.msg;
      logEl.appendChild(d);
    });
    document.getElementById('funds-display').textContent=state.funds.toFixed(2);
    document.getElementById('total-catches').textContent=state.totalCatches;
    document.getElementById('total-sightings').textContent=state.totalSightings;
    document.getElementById('btn-recall').disabled=!state.missionActive;
    document.getElementById('btn-start').disabled=state.missionActive;
    const t=new Date(data.savedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSaveIndicator('⬤ Loaded ('+t+')','saving');
    setTimeout(()=>setSaveIndicator('⬤ Auto-save on',''),3000);
    if(offSum) showOfflineBanner(secsAway,offSum);
    return true;
  } catch(e){ setSaveIndicator('✘ Load error','error'); return false; }
}

function resetGame(){
  if(!confirm('Wipe ALL progress? This cannot be undone.')) return;
  clearInterval(window._gameTickInterval);
  clearInterval(window._autoSaveInterval);
  window._resetting=true;
  localStorage.clear();
  location.reload();
}

function setSaveIndicator(msg,cls){
  const el=document.getElementById('save-indicator');
  el.textContent=msg; el.className=cls||'';
}

function autoSaveTick(){ saveTimer++; if(saveTimer>=30){ saveTimer=0; saveGame(); } }

function init(){
  const s=makePokemon('Rattata',5,Math.random()<0.5?'M':'F','Carl Oak');
  state.party.push(s); state.dex.push(s);
  state.dexHistory[s.pokedexId]=(state.dexHistory[s.pokedexId]||0)+1;
  recordNewSpecies(s.pokedexId,'Rattata');
  recordSighting(s.pokedexId,5);
  addLog('Rattata #1 added to party as starter.','info');
  render();
}

let mapSelectedLoc=null;

function renderMap(){
  const svg=document.getElementById('map-svg'); if(!svg) return;
  svg.innerHTML='';
  const W=svg.clientWidth||300, H=svg.clientHeight||300;
  const cols=16, rows=16;
  const cellW=W/cols, cellH=H/rows;

  const discovered=[...state.discoveredLocations].filter(id=>MAP_NODES[id]);

  // Draw connections
  if(typeof CONNECTIONS_DATA!=='undefined'){
    CONNECTIONS_DATA.forEach(c=>{
      const a=MAP_NODES[c.fromLocationId], b=MAP_NODES[c.toLocationId];
      if(!a||!b) return;
      if(!state.discoveredLocations.has(c.fromLocationId)||!state.discoveredLocations.has(c.toLocationId)) return;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',(a.col+0.5)*cellW); line.setAttribute('y1',(a.row+0.5)*cellH);
      line.setAttribute('x2',(b.col+0.5)*cellW); line.setAttribute('y2',(b.row+0.5)*cellH);
      line.setAttribute('stroke',c.requiresItem?'#7a3fa0':'#1a4a80');
      line.setAttribute('stroke-width','2');
      if(c.requiresItem) line.setAttribute('stroke-dasharray','4 3');
      svg.appendChild(line);
    });
  }

  // Draw nodes
  discovered.forEach(locId=>{
    const node=MAP_NODES[locId]; if(!node) return;
    const x=(node.col+0.5)*cellW, y=(node.row+0.5)*cellH;
    const isSelected=mapSelectedLoc===locId;
    const isCurrent=state.currentLocation===locId;
    const colors={city:'#e63946',town:'#f4d03f',route:'#2ecc71',dungeon:'#9b59b6'};
    const c=colors[node.type]||'#5dade2';
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x); circle.setAttribute('cy',y);
    circle.setAttribute('r',isSelected?9:6);
    circle.setAttribute('fill',isSelected?c:'#16213e');
    circle.setAttribute('stroke',c);
    circle.setAttribute('stroke-width',isCurrent?3:1.5);
    g.appendChild(circle);
    if(isCurrent){
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x); dot.setAttribute('cy',y);
      dot.setAttribute('r',3); dot.setAttribute('fill','#f4d03f');
      g.appendChild(dot);
    }
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',x); text.setAttribute('y',y+18);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('font-size','8');
    text.setAttribute('font-family','Courier New,monospace');
    text.setAttribute('fill',isSelected?'#fff':isCurrent?'#f4d03f':c);
    text.textContent=node.label;
    g.appendChild(text);
    g.onclick=(e)=>{ e.stopPropagation(); selectMapLocation(locId); };
    svg.appendChild(g);
  });
}

    document.getElementById('map-detail').style.display='none';
    renderMap();

// ── LOCATION HELPERS ──
function getLocation(locId){
  if(typeof LOCATIONS==='undefined') return null;
  return LOCATIONS.find?LOCATIONS.find(l=>l.locationId===locId):LOCATIONS[locId]||null;
}

function getShopItems(locId){
  if(typeof ITEMS_DATA==='undefined') return [];
  const loc=getLocation(locId);
  if(!loc||!loc.shopTier) return [];
  const tierOrder=['basic','full'];
  const tierIdx=tierOrder.indexOf(loc.shopTier);
  if(tierIdx<0) return [];
  return ITEMS_DATA.filter(i=>i.shopPrice&&i.shopTier&&tierOrder.indexOf(i.shopTier)<=tierIdx);
}

// ── ABILITY ASSIGNMENT ──
function assignAbility(entry){
  if(!entry) return null;
  const roll=Math.random();
  if(roll<0.45&&entry.ability1) return entry.ability1;
  if(roll<0.90&&entry.ability2) return entry.ability2;
  if(entry.hiddenAbility) return entry.hiddenAbility;
  if(entry.ability1) return entry.ability1;
  return null;
}

// ── EXP / LEVEL ──
function expToLevel(lv,r){
  if(lv<=1) return 0;
  if(r==='mediumFast') return Math.floor(Math.pow(lv,3));
  if(r==='mediumSlow') return Math.max(0,Math.floor((6/5)*Math.pow(lv,3)-(15*Math.pow(lv,2))+(100*lv)-140));
  if(r==='fast') return Math.floor((4*Math.pow(lv,3))/5);
  if(r==='slow') return Math.floor((5*Math.pow(lv,3))/4);
  if(r==='erratic') return lv<50?Math.floor((Math.pow(lv,3)*(100-lv))/50):lv<68?Math.floor((Math.pow(lv,3)*(150-lv))/100):lv<98?Math.floor((Math.pow(lv,3)*Math.floor((1911-10*lv)/3))/500):Math.floor((Math.pow(lv,3)*(160-lv))/100);
  if(r==='fluctuating') return lv<15?Math.floor((Math.pow(lv,3)*(Math.floor((lv+1)/3)+24))/50):lv<36?Math.floor((Math.pow(lv,3)*(lv+14))/50):Math.floor((Math.pow(lv,3)*(Math.floor(lv/2)+32))/50);
  return Math.floor(Math.pow(lv,3));
}

function calcMaxHP(sp,lv){
  const s=SPECIES[sp]; if(!s) return lv+10;
  return Math.floor((s.baseHP*2*lv)/100)+lv+10;
}

function calcBST(sp,lv){
  const s=SPECIES[sp]; if(!s) return 0;
  const st=(b)=>Math.floor(((b||0)*2*lv)/100)+5;
  return calcMaxHP(sp,lv)+st(s.baseAtk)+st(s.baseDef)+st(s.baseSpatk)+st(s.baseSpdef)+st(s.baseSpd);
}

// ── RESEARCH ──
function getResearch(dexId){
  if(!state.researchLog[dexId]) state.researchLog[dexId]={
    evolutionConfirmed:false, nonEvolutionConfirmed:false,
    confirmedMethod:null, confirmedIntoId:null,
    testedMethods:[], highestLevelObserved:0,
    knownSince:Date.now()
  };
  return state.researchLog[dexId];
}
function recordSighting(dexId,level){
  const r=getResearch(dexId);
  if(level>r.highestLevelObserved) r.highestLevelObserved=level;
}
function recordEvolution(fromDexId,toDexId,method,level){
  const r=getResearch(fromDexId);
  if(!r.evolutionConfirmed){
    r.evolutionConfirmed=true; r.confirmedMethod=method; r.confirmedIntoId=toDexId;
    if(method==='level') r.testedMethods.push('level');
    const fromEntry=getPokemonEntry(fromDexId);
    const toEntry=getPokemonEntry(toDexId);
    addFinding('evolution',fromEntry?fromEntry.name:'#'+fromDexId,toEntry?toEntry.name:'#'+toDexId,method,level);
  }
}
function recordNewSpecies(dexId,name){
  const r=getResearch(dexId);
  if(!r.firstSeen){ r.firstSeen=true; addFinding('species',name); }
}
function addFinding(type,...args){ state.pendingFindings.push({type,args,time:Date.now()}); }
function isSpeciesKnown(dexId){ return !!state.researchLog[dexId]; }

// v0.16.1 fix #5: "Evolved into" format showing the observed level, not a rule
function getEvolutionDisplayText(dexId){
  const r=state.researchLog[dexId];
  if(!r) return 'Evolves into: ???';
  if(r.nonEvolutionConfirmed) return 'Does not evolve';
  if(r.evolutionConfirmed){
    const toEntry=getPokemonEntry(r.confirmedIntoId);
    const toName=toEntry?toEntry.name:'#'+r.confirmedIntoId;
    return 'Evolved into: #'+r.confirmedIntoId+' '+toName+' at Lv '+r.highestLevelObserved;
  }
  return 'Evolves into: ??? (unconfirmed)';
}

// ── EVOLUTION ──
function checkEvolution(p){
  // Path 1: SPECIES lookup — active for all Gen 1
  const s=SPECIES[p.species];
  if(s&&s.evolveMethod==='level'&&s.evolvesIntoId&&p.level>=s.evolveLevel){
    const newEntry=getPokemonEntry(s.evolvesIntoId);
    if(newEntry){
      const old=p.species; const prevDexId=p.pokedexId;
      p.species=newEntry.name; p.pokedexId=newEntry.dexId;
      const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      if(!SPECIES[p.species]) SPECIES[p.species]=newEntry;
      recordEvolution(prevDexId,newEntry.dexId,'level',p.level);
      recordNewSpecies(newEntry.dexId,p.species);
      state.dexHistory[newEntry.dexId]=(state.dexHistory[newEntry.dexId]||0)+1;
      addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
      document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
      return;
    }
  }
  // Path 2: EVO_TREE lookup — no-op for Gen 1, kept for future generations
  if(typeof EVO_TREE!=='undefined'){
    const branches=getEvolutions(p.pokedexId).filter(b=>b.toDexId&&b.evolveMethod==='level'&&p.level>=b.evolveLevel);
    if(branches.length>0){
      const branch=branches[Math.floor(Math.random()*branches.length)];
      const newEntry=getPokemonEntry(branch.toDexId);
      if(newEntry){
        const old=p.species; const prevDexId=p.pokedexId;
        p.species=newEntry.name; p.pokedexId=newEntry.dexId;
        const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
        p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
        if(!SPECIES[p.species]) SPECIES[p.species]=newEntry;
        recordEvolution(prevDexId,newEntry.dexId,'level',p.level);
        recordNewSpecies(newEntry.dexId,p.species);
        state.dexHistory[newEntry.dexId]=(state.dexHistory[newEntry.dexId]||0)+1;
        addLog(old+' #'+p.id+' evolved into '+p.species+'!','evolve');
        document.getElementById('enc-body').textContent=old+' evolved into '+p.species+'!';
      }
    }
  }
}

function giveExp(pokemon,amount){
  pokemon.exp+=amount;
  addLog(pokemon.species+' #'+pokemon.id+' +'+amount+' EXP','exp');
  let levelled=false;
  while(true){
    const s=SPECIES[pokemon.species];
    const gr=pokemon.growthRate||(s?s.growthRate:null)||'mediumFast';
    const need=expToLevel(pokemon.level+1,gr);
    if(pokemon.exp>=need&&pokemon.level<100){
      pokemon.level++; levelled=true;
      const om=pokemon.maxHP; pokemon.maxHP=calcMaxHP(pokemon.species,pokemon.level);
      pokemon.currentHP=Math.min(pokemon.maxHP,pokemon.currentHP+(pokemon.maxHP-om));
      addLog(pokemon.species+' #'+pokemon.id+' -> Lv'+pokemon.level+'!','evolve');
      checkEvolution(pokemon); saveGame();
    } else break;
  }
  if(levelled) renderDex();
}

function giveExpSilent(p,amount){
  p.exp+=amount;
  while(true){
    const s=SPECIES[p.species];
    const gr=p.growthRate||(s?s.growthRate:null)||'mediumFast';
    if(p.exp>=expToLevel(p.level+1,gr)&&p.level<100){
      p.level++;
      const om=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
      p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om));
      const evolveS=SPECIES[p.species];
      if(evolveS&&evolveS.evolveMethod==='level'&&evolveS.evolvesIntoId&&p.level>=evolveS.evolveLevel){
        const ne=getPokemonEntry(evolveS.evolvesIntoId);
        if(ne){
          const prevDexId=p.pokedexId;
          p.species=ne.name; p.pokedexId=ne.dexId;
          if(!SPECIES[p.species]) SPECIES[p.species]=ne;
          const om2=p.maxHP; p.maxHP=calcMaxHP(p.species,p.level);
          p.currentHP=Math.min(p.maxHP,p.currentHP+(p.maxHP-om2));
          state.dexHistory[ne.dexId]=(state.dexHistory[ne.dexId]||0)+1;
          recordEvolution(prevDexId,ne.dexId,'level',p.level);
          recordNewSpecies(ne.dexId,p.species);
        }
      }
    } else break;
  }
}

// ── OFFLINE PROCESSING ──
function processOfflineTime(secsAway){
  if(secsAway<10||!state.missionActive) return null;
  const summary={encounters:0,catches:0,wins:0,income:0,evolutions:[]};
  const perMin=1.00+Math.floor(state.totalCatches/100)*0.01;
  const income=Math.round((perMin/60)*secsAway*100)/100;
  state.funds=Math.round((state.funds+income)*100)/100;
  summary.income=income;

  // v0.16.1 fix #4: apply offline friendship ticks
  const friendshipTicks=Math.floor(secsAway/180);
  if(friendshipTicks>0){
    state.party.forEach(p=>{ if(p.currentHP>0) p.friendship=(p.friendship||0)+friendshipTicks; });
  }

  let remaining=secsAway, nextIn=state.nextEncounterIn;
  while(remaining>=nextIn){
    remaining-=nextIn; nextIn=ENC_INTERVAL; summary.encounters++;
    const enc=rollEncounter(); const lead=getLeadPokemon(); if(!lead) break;
    if(enc){
      // v0.16.1 fix #3: write to locationEncounterLog during offline processing
      const encLocKey=state.currentLocation;
      if(!state.locationEncounterLog[encLocKey]) state.locationEncounterLog[encLocKey]={};
      const encDexKey=parseInt(enc.pokedexId)||0;
      if(encDexKey) state.locationEncounterLog[encLocKey][encDexKey]=(state.locationEncounterLog[encLocKey][encDexKey]||0)+1;

      const hasBalls=getBallCount()>0;
      if(hasBalls){
        const s_=SPECIES[enc.species];
        const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
        giveExpSilent(lead,exp);
        const caught=makePokemon(enc.species,enc.level,enc.gender);
        caught.pokedexId=enc.pokedexId;
        state.dex.push(caught); state.totalCatches++; state.totalSightings++;
        summary.catches++;
        state.dexHistory[caught.pokedexId]=(state.dexHistory[caught.pokedexId]||0)+1;
        if(!isSpeciesKnown(caught.pokedexId)||!state.researchLog[caught.pokedexId].firstSeen)
          recordNewSpecies(caught.pokedexId,enc.species);
        recordSighting(enc.pokedexId||caught.pokedexId,enc.level);
      } else {
        const dmg=Math.max(1,Math.floor((enc.level/lead.level)*0.5*lead.maxHP));
        lead.currentHP=Math.max(0,lead.currentHP-dmg);
        if(lead.currentHP>0){
          const s_=SPECIES[enc.species];
          const exp=Math.floor(((s_?s_.baseExpYield||s_.baseExp:51)*enc.level)/7);
          giveExpSilent(lead,exp); summary.wins++;
        }
      }
    }
    advanceTravelPath();
  }
  state.nextEncounterIn=Math.max(1,nextIn-remaining);
  return summary;
}

function showOfflineBanner(secsAway,summary){
  const mins=Math.floor(secsAway/60), secs=secsAway%60;
  document.getElementById('offline-summary').innerHTML=
    'Away for '+mins+'m '+secs+'s · '+summary.encounters+' encounters · '+
    summary.catches+' catches · +$'+summary.income.toFixed(2);
  document.getElementById('offline-banner').style.display='block';
}

// ── ENCOUNTER ──
function rollEncounter(){
  const table=buildRouteTable(state.currentLocation);
  if(!table.length) return null;
  const hasGrass=table.some(e=>e.method==='grass'||!e.method);
  if(!hasGrass) return null;
  const grassTable=table.filter(e=>e.method==='grass'||!e.method);
  const totalW=grassTable.reduce((s,e)=>s+(e.weight||10),0);
  let r=Math.random()*totalW;
  for(const e of grassTable){
    r-=(e.weight||10);
    if(r<=0){
      const lv=Math.floor(Math.random()*(e.maxLv-e.minLv+1))+e.minLv;
      const entry=getPokemonEntry(e.dexId);
      const name=entry?entry.name:'#'+e.dexId;
      const genderMalePct=entry?entry.genderMalePct:50;
      let gender='M';
      if(genderMalePct===null||genderMalePct===undefined) gender='—';
      else if(genderMalePct===0) gender='F';
      else if(genderMalePct===100) gender='M';
      else gender=Math.random()*100<genderMalePct?'M':'F';
      // v0.16.1 fix #6: always use parseInt(e.dexId) to ensure numeric key
      return {species:name,level:lv,gender,pokedexId:parseInt(e.dexId),baseSpd:entry?entry.baseSpd||50:50};
    }
  }
  return null;
}

function getLeadPokemon(){
  sortParty();
  return state.party.find(p=>p.currentHP>0)||null;
}

function checkLocationHeal(){
  if(!state.missionActive) return;
  const locData=typeof LOCATIONS!=='undefined'?getLocation(state.currentLocation):null;
  if(locData&&(locData.heals==='TRUE'||locData.heals===true||locData.heals==='true')){
    const needsHeal=state.party.some(p=>p.currentHP<p.maxHP||p.currentHP<=0);
    if(needsHeal){
      state.party.forEach(p=>{ p.currentHP=p.maxHP; });
      addLog('🏥 Party fully healed at '+locData.name+'!','info');
    }
  }
}

// ── FINDINGS ──
function showFindings(){
  if(!state.pendingFindings||!state.pendingFindings.length) return;
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  let html='<div style="background:#16213e;border:1px solid #f4d03f;border-radius:8px;padding:16px;width:100%;max-width:340px;font-family:\'Courier New\',monospace;max-height:90vh;overflow-y:auto;">'
    +'<div style="color:#f4d03f;font-size:13px;font-weight:bold;margin-bottom:12px;">📋 Research Findings</div>';
  state.pendingFindings.forEach(f=>{
    if(f.type==='species') html+='<div style="color:#2ecc71;font-size:11px;margin-bottom:4px;">🆕 New species: '+f.args[0]+'</div>';
    if(f.type==='evolution') html+='<div style="color:#f4d03f;font-size:11px;margin-bottom:4px;">🔬 '+f.args[0]+' → '+f.args[1]+' ('+f.args[2]+', Lv'+f.args[3]+')</div>';
  });
  html+='<button onclick="this.closest(\'div\').parentElement.remove()" style="width:100%;padding:10px;margin-top:10px;">✔ Got it</button></div>';
  modal.innerHTML=html;
  document.body.appendChild(modal);
  state.pendingFindings=[];
}

// Boot intervals — set AFTER loadGame/init completes, never inside confirmMission
window._autoSaveInterval=setInterval(autoSaveTick,1000);
window._gameTickInterval=setInterval(gameTick,1000);

let _hiddenAt=null;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    _hiddenAt=Date.now();
    saveGame();
  } else {
    if(_hiddenAt&&state.missionActive){
      const secsAway=Math.floor((Date.now()-_hiddenAt)/1000);
      if(secsAway>5){
        const summary=processOfflineTime(secsAway);
        if(summary&&(summary.encounters>0||summary.income>0)) showOfflineBanner(secsAway,summary);
        render(); saveGame();
      }
    }
    _hiddenAt=null;
  }
});
</script>
